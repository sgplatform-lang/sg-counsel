<script>
let CU=null, DATA={student:null,tests:[],students:[]}, curTab='timetable';
// 초기 history state 등록 (페이지 로드 즉시)
history.replaceState({tab:'timetable', loggedIn:false, ts:Date.now()}, '');
function toast(msg,d=2000){const e=document.getElementById('toast');if(!e)return;e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),d);}
const FB=()=>window._fbReady&&window._fb;
function fmtMock(val){
  if(!val) return '–';
  if(typeof val==='string') return val;
  if(typeof val==='object'){
    const parts=[];
    if(val.grade) parts.push(val.grade+'등급');
    if(val.raw) parts.push(val.raw+'점');
    if(val.pct) parts.push(val.pct+'%');
    if(val.std) parts.push('표'+val.std);
    return parts.join(' / ')||'–';
  }
  return String(val);
}
function fmtMockShort(val){
  if(!val) return '–';
  if(typeof val==='string') return val;
  if(typeof val==='object') return val.grade||val.raw||val.pct||'–';
  return String(val);
}

// 해당 월의 최대 주차 수
function getMaxWeeks(y, m){ const d=new Date(y,m,0).getDate(); const fd=new Date(y,m-1,1).getDay(); return Math.ceil((d+fd)/7); }
// 주차 키 생성
function getWeekNum(y,m,w){ return y+'-'+String(m).padStart(2,'0')+'-w'+w; }
// 주차 시작/종료 날짜 계산
function getWeekRange(year, month, week){
  // 해당 월 1일의 요일 (0=일, 1=월~6=토)
  const firstDay = new Date(year, month-1, 1).getDay();
  // 1주차 시작: 1일이 속한 주의 월요일
  const firstMonday = 1 - (firstDay===0?6:firstDay-1);
  const startDate = new Date(year, month-1, firstMonday + (week-1)*7);
  const endDate = new Date(year, month-1, firstMonday + (week-1)*7 + 6);
  const fmt = (d) => `${d.getMonth()+1}/${d.getDate()}`;
  return `${fmt(startDate)}~${fmt(endDate)}`;
}

function getWeekOfMonth(year, month, day){
  const firstDay = new Date(year, month-1, 1).getDay();
  const firstMonStart = 1 - (firstDay===0?6:firstDay-1);
  return Math.ceil((day - firstMonStart + 1) / 7);
}

function fmtGrade(val){if(!val&&val!==0)return null;if(typeof val==='object')return val.grade??null;return +val;}
function fmtGradeRaw(val){if(!val||typeof val!=='object')return null;return val.raw??null;}
function fmtGradeDisplay(val){const g=fmtGrade(val);const r=fmtGradeRaw(val);if(!g&&!r)return'–';let s=g?String(g):'';if(r)s+=(s?'<br>':'')+`<small style="font-size:9px;color:#888">${r}점</small>`;return s||'–';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gc(v){return v<=1.5?'#3b82f6':v<=2.5?'#10b981':v<=3.5?'#f59e0b':'#ef4444';}
function pc(p){return p>=80?'#0f9d58':p>=60?'#f59e0b':'#e53935';}
function pbg(p){return p>=80?'#f0fdf4':p>=60?'#fffbeb':'#fff5f5';}
function pbd(p){return p>=80?'#86efac':p>=60?'#fde68a':'#fecaca';}

async function fbAll(col){
  if(!FB())return[];
  try{
    return await window._fb.getAll(col);
  }catch(e){console.warn('fbAll error:',e.message);return[];}
}

// ── 개인정보동의 ──
function showConsentModal(student){
  if(student.consent && student.consent.agreed) return;
  const ov = document.createElement('div');
  ov.id = 'consent-modal';
  ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  ov.innerHTML = `
    <div style="background:#fff;border-radius:16px;max-width:460px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.35)">
      <div style="background:linear-gradient(135deg,#1e3a8a,#3b5bdb);color:#fff;padding:18px 22px;border-radius:16px 16px 0 0">
        <div style="font-size:17px;font-weight:900;margin-bottom:3px">📋 개인정보 수집·이용 동의</div>
        <div style="font-size:11px;color:#bfdbfe">SG상담플랫폼 서비스 이용을 위해 동의가 필요합니다</div>
      </div>
      <div style="padding:18px 20px">
        <div style="background:#f8fafc;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1px solid #e2e8f0;font-size:11px;color:#334155;line-height:1.8">
          <div style="font-size:12px;font-weight:700;color:#1e3a8a;margin-bottom:6px">📌 개인정보 수집·이용 동의서</div>
          <b>1. 수집 항목:</b> 이름, 학교, 학년, 성적 정보, 상담 내용, 수시 지원 정보<br>
          <b>2. 수집 목적:</b> 학생 맞춤형 수시 상담 및 학습 관리 서비스 제공<br>
          <b>3. 보유 기간:</b> 서비스 이용 종료 후 3년<br>
          <b>4. 제3자 제공:</b> 원칙적으로 외부 제공 없음<br>
          <b>5. 동의 거부:</b> 거부 가능하나 서비스 이용이 제한될 수 있습니다
        </div>
        <div style="background:#f0fdf4;border-radius:10px;padding:12px 14px;margin-bottom:14px;border:1px solid #86efac;font-size:11px;color:#334155;line-height:1.8">
          <div style="font-size:12px;font-weight:700;color:#15803d;margin-bottom:6px">📋 서비스 이용약관</div>
          <b>1. 서비스 목적:</b> 수시 입시 상담 및 학습 관리 목적으로 운영됩니다<br>
          <b>2. 이용자 의무:</b> 정확한 정보 입력 및 타인 계정 도용 금지<br>
          <b>3. 서비스 변경:</b> 사전 공지 후 서비스를 변경·중단할 수 있습니다<br>
          <b>4. 면책 조항:</b> AI 분석 결과는 참고용이며 최종 판단은 상담사와 협의하세요
        </div>
        <!-- 체크박스 1: 개인정보 -->
        <div id="chk_privacy_box" onclick="toggleConsent('privacy')" style="display:flex;align-items:center;gap:12px;margin-bottom:10px;cursor:pointer;padding:12px 14px;background:#eef1ff;border-radius:10px;border:2px solid #c5cae9;transition:all .2s;user-select:none">
          <div id="chk_privacy_icon" style="width:22px;height:22px;border-radius:5px;border:2px solid #3b5bdb;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;color:#3b5bdb;font-weight:900"></div>
          <span style="font-size:13px;font-weight:600;color:#1e3a8a">[필수] 개인정보 수집·이용에 동의합니다</span>
        </div>
        <!-- 체크박스 2: 약관 -->
        <div id="chk_terms_box" onclick="toggleConsent('terms')" style="display:flex;align-items:center;gap:12px;margin-bottom:18px;cursor:pointer;padding:12px 14px;background:#f0fdf4;border-radius:10px;border:2px solid #86efac;transition:all .2s;user-select:none">
          <div id="chk_terms_icon" style="width:22px;height:22px;border-radius:5px;border:2px solid #15803d;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;color:#15803d;font-weight:900"></div>
          <span style="font-size:13px;font-weight:600;color:#15803d">[필수] 서비스 이용약관에 동의합니다</span>
        </div>
        <button onclick="submitConsent('${student.id}')" id="consent_submit_btn" style="width:100%;background:#3b5bdb;color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer">
          ✅ 동의하고 시작하기
        </button>
        <div style="font-size:11px;color:#aaa;text-align:center;margin-top:10px">모든 필수 항목에 동의해야 서비스를 이용할 수 있습니다</div>
      </div>
    </div>`;
  document.body.appendChild(ov);

// 커스텀 체크박스 토글
const _consentState = {privacy: false, terms: false};
function toggleConsent(type){
  _consentState[type] = !_consentState[type];
  const icon = document.getElementById('chk_'+type+'_icon');
  const box  = document.getElementById('chk_'+type+'_box');
  if(!icon || !box) return;
  if(_consentState[type]){
    icon.textContent = '✓';
    icon.style.background = type==='privacy'?'#3b5bdb':'#15803d';
    icon.style.color = '#fff';
    icon.style.border = '2px solid '+(type==='privacy'?'#3b5bdb':'#15803d');
    box.style.border = '2px solid '+(type==='privacy'?'#3b5bdb':'#15803d');
    box.style.background = type==='privacy'?'#eef1ff':'#dcfce7';
  } else {
    icon.textContent = '';
    icon.style.background = '#fff';
    icon.style.color = type==='privacy'?'#3b5bdb':'#15803d';
    icon.style.border = '2px solid '+(type==='privacy'?'#3b5bdb':'#86efac');
    box.style.border = '2px solid '+(type==='privacy'?'#c5cae9':'#86efac');
    box.style.background = type==='privacy'?'#eef1ff':'#f0fdf4';
  }
}

async function submitConsent(studentId){
  if(!_consentState.privacy || !_consentState.terms){
    // 미동의 항목 강조
    if(!_consentState.privacy){
      const b=document.getElementById('chk_privacy_box');
      if(b){b.style.border='2px solid #e53935';setTimeout(()=>b.style.border='2px solid #c5cae9',1500);}
    }
    if(!_consentState.terms){
      const b=document.getElementById('chk_terms_box');
      if(b){b.style.border='2px solid #e53935';setTimeout(()=>b.style.border='2px solid #86efac',1500);}
    }
    alert('모든 필수 항목에 동의해주세요.');
    return;
  }
  const consentData = {
    agreed: true,
    agreedAt: new Date().toISOString(),
    privacy: true,
    terms: true
  };
  try{
    if(FB()){
      const db = window._fb.db;
      await db.collection('students').doc(String(studentId)).update({ consent: consentData });
    }
  }catch(e){ console.warn('동의 저장 실패:', e.message); }
  if(CU) CU.consent = consentData;
  if(DATA && DATA.student) DATA.student.consent = consentData;
  document.getElementById('consent-modal')?.remove();
}

// ── 모바일 뒤로가기 History API ──
let _histPushing = false;

function _getHist(){
  return { tab: curTab || 'timetable', loggedIn: !!CU, ts: Date.now() };
}

function _pushHist(){
  if(_histPushing) return;
  const state = _getHist();
  const cur = history.state;
  if(cur && cur.tab === state.tab && cur.loggedIn === state.loggedIn) return;
  history.pushState(state, '');
}

window.addEventListener('popstate', function(e){
  const st = e.state;

  // 로그인 상태 + 첫화면(기본탭)인지 판단
  const isFirstScreen = !!CU && (curTab === 'timetable' || curTab === 'test');

  if(isFirstScreen){
    if(window.confirm('SG상담플랫폼을 종료하시겠습니까?')){
      // 확인 → 히스토리 완전 소진해서 이탈
      history.go(-(history.length));
      setTimeout(function(){ window.close(); }, 300);
    } else {
      // 취소 → 현재 상태 재등록해서 유지
      history.pushState(_getHist(), '');
    }
    return;
  }

  _histPushing = true;

  if(st && CU && st.tab){
    // 이전 탭으로 복원
    curTab = st.tab;
  }

  // 현재 상태 재등록 (이탈 방지)
  history.pushState(_getHist(), '');

  _histPushing = false;
  render();
});

function render(){
  const app=document.getElementById('app');
  if(!app)return;
  if(!CU){app.innerHTML=renderLogin();return;}
  // 상태 변화 시 history push

async function doLogin(){
  const id=(document.getElementById('stu_id')?.value||'').trim();
  const pw=(document.getElementById('stu_pw')?.value||'').trim();
  const err=document.getElementById('login_err');
  if(!id||!pw){if(err)err.textContent='아이디와 비밀번호를 입력하세요.';return;}
  if(!FB()){if(err)err.textContent='Firebase가 연결되지 않았습니다.';return;}
  if(err)err.textContent='⏳ 로그인 중...';
  try{
    const students=await fbAll('students');
    const student=students.find(s=>String(s.studentLoginId||'').trim()===id&&String(s.studentPassword||'').trim()===pw);
    if(!student){if(err)err.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';return;}
    const tests=await fbAll('tests');
    CU=student;
    // 세션 저장 (F5 새로고침 시 유지)
    try{ sessionStorage.setItem('sg_stu_session', JSON.stringify({id:student.id, loginId:student.studentLoginId||''})); }catch(e){}
    DATA={student,tests:tests.filter(function(t){
      if(t.orgId && student.orgId && t.orgId!==student.orgId) return false;
      // studentIds로 특정 학생 지정된 경우 - 해당 학생만 표시
      if(t.studentIds && t.studentIds.length>0){
        return t.studentIds.includes(String(student.id));
      }
      // 반 이름으로 필터
      if(!t.classNames||t.classNames.length===0) return true;
      return t.classNames.includes(student.className);
    }),students};
    render();
    toast(`${student.name}님 환영합니다 👋`);
    // 실시간 동기화 시작 - 관리자 변경사항 자동 반영
    startStudentRealtimeSync(String(student.id));
    // 개인정보동의 팝업 (미동의 시)
    setTimeout(()=>showConsentModal(student), 800);
  }catch(e){if(err)err.textContent='오류: '+e.message;}
}

      const pct=totalScore?Math.round(myScore/totalScore*100):0;const c=pc(pct);
      const unitM={};t.questions.forEach(q=>{if(!q.unit)return;if(!unitM[q.unit])unitM[q.unit]={t:0,g:0};unitM[q.unit].t+=+q.score;const a=res.answers.find(x=>x.no===q.no);unitM[q.unit].g+=+(a?.score||0);});
      const weak=Object.entries(unitM).filter(([,v])=>v.t&&v.g/v.t<0.6).map(([k])=>k);

  </div>`;
}

window.addBook=function(subj){
  const inp=document.getElementById('book_input_'+subj);
  if(!inp) return;
  const v=inp.value.trim();
  if(!v) return;
  if(!CU._books) CU._books={};
  if(!CU._books[subj]) CU._books[subj]=[];
  if(CU._books[subj].includes(v)){alert('이미 있는 교재입니다.');return;}
  CU._books[subj].push(v);
  inp.value='';
  // 팝업 새로고침
  document.querySelector('[id="sm_book_list"]') && (()=>{
    const el=document.getElementById('sm_book_list');
    if(el){
      const books=getMyBooks(subj);

window.removeCustomSubj=function(subj){

// 셀 변경 후 Firebase 즉시 저장 (debounce 500ms)
var _stuSaveTimer=null;
function _stuSaveNow(){
  clearTimeout(_stuSaveTimer);
  _stuSaveTimer=setTimeout(async function(){
    if(!CU||!CU.id) return;
    try{
      const now=new Date();
      const y=now.getFullYear(),m=now.getMonth()+1;
      const w=getWeekOfMonth(y,m,now.getDate());
      const wKey=y+'-'+String(m).padStart(2,'0')+'-w'+w;
      const partial={
        weeklyPlan: CU.weeklyPlan||{},
        weeklyBookMap: CU.weeklyBookMap||{},
        _planWeek: wKey,
        weeklyPlanWeek: wKey,
        _t: Date.now()
      };
      window._studentSaving=true;
      if(FB()){
        const ref=window._db.collection('students').doc(String(CU.id));
        try{
          await ref.update(partial); // update: weeklyPlan 내부 키 삭제 반영
        }catch(e2){
          if(e2.code==='not-found'||e2.message.includes('NOT_FOUND')||e2.message.includes('No document')){
            await ref.set(partial); // 문서 없으면 생성
          }
        }
      }
      setTimeout(function(){window._studentSaving=false;},2000);
    }catch(e){ console.warn('stuSave error:',e.message); window._studentSaving=false; }
  },500);
}

  const td=document.querySelector('td[data-key="'+key+'"]');
  if(td){

async function saveTimetable(){
  try{
    window._studentSaving = true;  // onSnapshot 일시 차단
    // 현재 주차 키 계산
    const now=new Date();
    const y=now.getFullYear(),m=now.getMonth()+1;
    const w=getWeekOfMonth(y,m,now.getDate());
    const wKey=`${y}-${String(m).padStart(2,'0')}-w${w}`;
    // 이력 저장
    const hist=(CU._weeklyHistory||{});
    hist[wKey]={plan:{...CU.weeklyPlan||{}},ttBookMap:{...CU.weeklyBookMap||{}},savedAt:Date.now()};
    // 관리자 weeklyHistory(배열) 형식으로도 변환해서 저장
    const adminHist = Object.entries(hist).map(([k,v])=>{
      const parts=k.split('-');
      const yr=+parts[0], mo=+parts[1], wk=+k.split('w')[1];
      return {
        id: k,
        date: yr+'-'+String(mo).padStart(2,'0')+'-01',
        label: yr+'년 '+mo+'월 '+wk+'주차',
        year:yr, month:mo, weekNum:wk,
        plan:v.plan||{},
        bookMap:v.ttBookMap||{},
        subjPlans:{},
        memo:''
      };
    }).sort((a,b)=>a.date.localeCompare(b.date));

    const saveData={
      weeklyPlan:CU.weeklyPlan||{},
      weeklyBookMap:CU.weeklyBookMap||{},
      weeklyPlanWeek:wKey,
      _planWeek:wKey,
      _customSubjs:CU._customSubjs||[],
      _books:CU._books||{},
      _subjColors:CU._subjColors||{},
      _customNames:CU._customNames||{},
      _weeklyHistory:hist,
      weeklyHistory:adminHist  // 관리자 형식으로도 저장
    };
    CU={...CU,...saveData};
    if(FB()){
      const sRef=window._db.collection('students').doc(String(CU.id));
      const sData={...saveData,_t:Date.now()};
      try{ await sRef.update(sData); }
      catch(e3){ if(e3.code==='not-found'||e3.message.includes('NOT_FOUND')||e3.message.includes('No document')){ await sRef.set(sData); } }
    }
    DATA.student=CU;
    render(); // 화면 갱신
    toast('✅ 저장되었습니다!');
    setTimeout(()=>{ window._studentSaving = false; }, 2000);
  }catch(e){
    window._studentSaving = false;
    toast('저장 실패: '+e.message);
  }
}

      ${t.questions.map((q,i)=>`
        <div style="background:#f8f9ff;border-radius:10px;padding:12px 14px;margin-bottom:10px;border:1.5px solid #e8eaf6">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

            <span style="font-size:11px;color:#888">${esc(q.unit||'')} · ${q.score}점</span>
          </div>
          ${q.type==='서술형'
            ?`<textarea id="sa_ans_${i}" rows="3" placeholder="답안을 입력하세요"
                style="width:100%;border:1.5px solid #e0e3ef;border-radius:8px;padding:10px;font-size:14px;resize:vertical;font-family:inherit;outline:none;-webkit-appearance:none;box-sizing:border-box"></textarea>`
            :`<input id="sa_ans_${i}" type="${q.type==='객관식'?'number':'text'}" placeholder="${q.type==='객관식'?'번호 입력 (예: 3)':'답안 입력'}"
                style="width:100%;border:1.5px solid #e0e3ef;border-radius:8px;padding:12px;font-size:16px;outline:none;-webkit-appearance:none;box-sizing:border-box">`

      <button id="sa_submit" style="width:100%;background:#e53935;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px">📤 답안 제출</button>
    </div>

  document.body.appendChild(ov);

  ov.querySelector('#sa_submit').addEventListener('click',async()=>{

      const raw=(ov.querySelector('#sa_ans_'+i)?.value||'').trim();
      let sc=0;
      if(q.type==='객관식'||q.type==='단답형'){
        sc=raw===String(q.answer||'').trim()?+q.score:0;
      }
      return{no:q.no,answer:raw,score:sc};
    });
    const total=answers.reduce((a,x)=>a+x.score,0);
    const newRes={studentId:CU.id,answers,total,aiComment:''};

    // Firebase 저장
    try{
      const updatedResults=[(t.results||[]).filter(r=>String(r.studentId)!==String(CU.id)),newRes].flat();
      const updatedTest={...t,results:updatedResults};
      if(FB()) await window._fb.set('tests',t.id,updatedTest);
      // 로컬 DATA 업데이트
      DATA.tests=DATA.tests.map(x=>String(x.id)===String(t.id)?updatedTest:x);

  });
};

window.openGradeEdit=function(){

    const allSubjs=[...BASE_SUBJS.map(([k,lb])=>mergedCustomNames[lb]||lb), ...window._stuExtraSubjs];

    ov.innerHTML=`<div style="background:#fff;border-radius:16px;width:100%;max-width:600px;margin:auto;overflow:hidden">
      <div style="padding:14px 16px;border-bottom:1px solid #e8eaf6;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1">
        <div style="font-size:15px;font-weight:800">📚 내신 성적 입력</div>
        <button id="sg_close" style="background:transparent;border:none;font-size:22px;color:#777;cursor:pointer">×</button>
      </div>
      <div style="padding:14px 16px;overflow-y:auto;max-height:calc(100vh - 120px)">

        <!-- 대표 등급 자동계산 (숨김) -->
        ${BASE_SUBJS.map(([k,lb])=>`<input type="hidden" id="sg_${k}" value="${s.subjects?.[k]??''}">`).join('')}
        <div style="font-size:11px;color:#888;background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:14px;border:1px solid #86efac">💡 학기별 세부 내신을 입력하면 <strong style="color:#0f9d58">대표 등급이 자동으로 계산</strong>됩니다</div>

        <!-- 학기별 세부 내신 -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:#f59e0b">
            학기별 세부 내신 <span style="font-size:10px;font-weight:400;color:#888">(선택 – 소수점 가능)</span>
          </div>
          <button id="sg_add_subj" style="background:#eef1ff;color:#3b5bdb;border:1.5px solid #c5cae9;border-radius:7px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer">+ 과목 추가</button>
        </div>

        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px">
          <table style="border-collapse:collapse;min-width:380px;width:100%;font-size:12px">
            <tr style="background:#f4f6fb">
              <th style="border:1px solid #e8eaf6;padding:7px 10px;text-align:left;min-width:90px">과목</th>
              ${SEMS.map(sem=>`<th colspan="2" style="border:1px solid #e8eaf6;padding:5px 4px;text-align:center;min-width:100px;background:#f4f6fb">${sem}<div style="display:flex;gap:2px;justify-content:center;font-size:9px;color:#aaa;font-weight:400;margin-top:2px"><span style="background:#fce7f3;padding:1px 3px;border-radius:3px">등급</span><span style="background:#dbeafe;padding:1px 3px;border-radius:3px">원점수</span></div></th>`).join('')}
              <th style="border:1px solid #e8eaf6;min-width:30px"></th>
            </tr>
            ${allSubjs.map((lb,idx)=>{
              const isExtra=idx>=BASE_SUBJS.length;
              const origKey=isExtra?lb:BASE_SUBJS[idx][0];
              const dispLb=isExtra?lb:(customNames[BASE_SUBJS[idx][1]]||BASE_SUBJS[idx][1]);
              return`<tr>
                <td style="border:1px solid #e8eaf6;padding:5px 8px;background:#f8f9ff;font-weight:600">
                  ${isExtra
                    ?`<input id="sg_name_${idx}" value="${esc(lb)}" placeholder="과목명"
                        style="border:1.5px solid #dde1f0;border-radius:6px;padding:4px 6px;font-size:12px;width:80px;outline:none;font-weight:600"
                        oninput="window._stuExtraSubjs[${idx-BASE_SUBJS.length}]=this.value">`
                    :dispLb}
                </td>
                ${SEMS.map(sem=>{
                  const cv=(gd[isExtra?lb:(BASE_SUBJS[idx]?.[1]||lb)]||{})[sem];
                  const gradeV=cv?(typeof cv==='object'?cv.grade??'':cv):'';
                  const rawV=cv&&typeof cv==='object'?cv.raw??'':'';
                  return`<td style="border:1px solid #e8eaf6;padding:2px;border-right:none">
                    <input id="sg_${idx}_${sem}_grade" type="number" min="1" max="9" step="0.01" placeholder="등급"
                      value="${gradeV}"
                      style="width:100%;border:1px solid #f9a8d4;background:#fff0f9;text-align:center;font-size:12px;font-weight:700;padding:4px 1px;outline:none;border-radius:3px">
                  </td><td style="border:1px solid #e8eaf6;padding:2px">
                    <input id="sg_${idx}_${sem}_raw" type="number" min="0" max="100" placeholder="원점"

                      style="width:100%;border:1px solid #93c5fd;background:#eff6ff;text-align:center;font-size:12px;font-weight:700;padding:4px 1px;outline:none;border-radius:3px">

                }).join('')}
                <td style="border:1px solid #e8eaf6;padding:2px;text-align:center">
                  ${isExtra?`<button onclick="window._stuExtraSubjs.splice(${idx-BASE_SUBJS.length},1);renderGradeModal()"
                    style="background:#fff0f0;color:#e53935;border:1px solid #fecaca;border-radius:5px;padding:2px 6px;font-size:11px;cursor:pointer">✕</button>`:''}
                </td>
              </tr>`;
            }).join('')}
          </table>
        </div>

        ${window._stuExtraSubjs.length===0?`<div style="background:#f8f9ff;border:1px dashed #c5cae9;border-radius:8px;padding:10px 14px;font-size:11px;color:#888;margin-bottom:14px">
          💡 <strong style="color:#3b5bdb">+ 과목 추가</strong> 버튼으로 한국사, 물리, 화학 등 모든 과목을 추가할 수 있습니다.

        <div style="display:flex;gap:8px;justify-content:flex-end">

          <button id="sg_save" style="background:#3b5bdb;color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer">💾 저장</button>
        </div>

    document.body.appendChild(ov);

    ov.querySelector('#sg_add_subj').addEventListener('click',()=>{
      window._stuExtraSubjs.push('');
      renderGradeModal();
      const idx=BASE_SUBJS.length+window._stuExtraSubjs.length-1;
      setTimeout(()=>document.getElementById(`sg_name_${idx}`)?.focus(),50);
    });

    ov.querySelector('#sg_save').addEventListener('click',async()=>{
      // 학기별 세부 - 등급+원점수 객체로 저장
      const newGd={};
      BASE_SUBJS.forEach(([k,lb],idx)=>{
        newGd[lb]={};
        SEMS.forEach(sem=>{
          const g=ov.querySelector(`#sg_${idx}_${sem}_grade`)?.value?.trim();
          const r=ov.querySelector(`#sg_${idx}_${sem}_raw`)?.value?.trim();
          if(g||r) newGd[lb][sem]={grade:g?+g:null,raw:r?+r:null};
        });
      });
      window._stuExtraSubjs.forEach((lb,ei)=>{
        if(!lb) return;
        const idx=BASE_SUBJS.length+ei;
        newGd[lb]={};
        SEMS.forEach(sem=>{
          const g=ov.querySelector(`#sg_${idx}_${sem}_grade`)?.value?.trim();
          const r=ov.querySelector(`#sg_${idx}_${sem}_raw`)?.value?.trim();
          if(g||r) newGd[lb][sem]={grade:g?+g:null,raw:r?+r:null};
        });
      });

      // 대표 등급 자동 계산 (3-1 → 2-2 → ... 최신 학기)
      const newSubjs={};
      BASE_SUBJS.forEach(([k,lb])=>{
        let autoGrade=null;
        for(const sem of ['3-1','2-2','2-1','1-2','1-1']){
          const cv=newGd[lb]?.[sem];
          const g=fmtGrade(cv);
          if(g!==null){autoGrade=g;break;}
        }
        // 학기 입력 있으면 그 값, 없으면 null (기존 hidden input 값 무시)
        newSubjs[k]=autoGrade;
      });

      const saveData={subjects:newSubjs, gradeDetail:newGd, extraSubjs:[...window._stuExtraSubjs.filter(Boolean)]};
      CU={...CU,...saveData};
      try{
        if(FB()){
      const sRef=window._db.collection('students').doc(String(CU.id));
      const sData={...saveData,_t:Date.now()};
      try{ await sRef.update(sData); }
      catch(e3){ if(e3.code==='not-found'||e3.message.includes('NOT_FOUND')||e3.message.includes('No document')){ await sRef.set(sData); } }
    }
        ov.remove(); render();
        toast('✅ 내신 성적이 저장되었습니다!');
      }catch(e){alert('저장 실패: '+e.message);}
    });
  }

  renderGradeModal();
};

  ov.innerHTML=`<div style="background:#fff;border-radius:16px;width:100%;max-width:700px;margin:auto;overflow:visible;display:flex;flex-direction:column;max-height:95vh">
    <div style="padding:14px 16px;border-bottom:1px solid #e8eaf6;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1">
      <div style="font-size:15px;font-weight:800">📝 모의고사 성적 입력</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button id="me_save_top" style="background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer">💾 저장</button>
        <button id="me_close" style="background:transparent;border:none;font-size:22px;color:#777;cursor:pointer">×</button>
      </div>
    </div>
    <div style="padding:14px;overflow-y:auto">
      <div style="font-size:11px;color:#888;margin-bottom:12px">시험별로 원점수·등급·백분위·표준점수를 각각 입력하세요</div>
      ${MOCK_TESTS_L.map(test=>`
        <div style="margin-bottom:14px;background:#f8f9ff;border-radius:12px;padding:12px;border:1.5px solid #e8eaf6">
          <div style="font-size:13px;font-weight:800;color:#3b5bdb;margin-bottom:10px">📅 ${test}</div>
          <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
            <table style="border-collapse:collapse;width:100%;min-width:380px">
              <tr style="background:#eef1ff">
                <th style="border:1px solid #e0e3ef;padding:6px 8px;font-size:11px;text-align:left;min-width:80px">과목</th>
                ${FIELDS.map(([,lb])=>`<th style="border:1px solid #e0e3ef;padding:6px;font-size:11px;text-align:center;min-width:62px">${lb}</th>`).join('')}
              </tr>
              ${MOCK_SUBJ_L.map(sb=>{
                const isTanku=sb==='탐구1'||sb==='탐구2';
                const prevVal=(field)=>(mg[sb]||{})[test]?.[field]||'';
                return`<tr>
                  <td style="border:1px solid #e0e3ef;padding:4px 6px;font-weight:700;font-size:12px;background:#fafbff">
                    ${isTanku?`<div style="font-size:10px;color:#888;margin-bottom:2px">${sb}</div>
                    <input id="me_subj_${sb}_${test}" type="text" placeholder="과목명 입력" value="${esc((exSubj[sb]||{})[test]||'')}"
                      style="border:1px solid #e0e3ef;border-radius:5px;padding:3px 5px;font-size:11px;width:80px;outline:none">`:sb}
                  </td>
                  ${FIELDS.map(([fk])=>`<td style="border:1px solid #e0e3ef;padding:2px">
                    <input id="me_${sb}_${test}_${fk}" type="text" placeholder="–" value="${esc(prevVal(fk))}"
                      style="width:100%;border:none;text-align:center;font-size:13px;font-weight:700;padding:5px;outline:none;background:transparent">
                  </td>`).join('')}
                </tr>`;
              }).join('')}
            </table>
          </div>
        </div>`).join('')}
      <button id="me_save" style="width:100%;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px">💾 저장</button>
    </div>
  </div>`;

  document.body.appendChild(ov);
  ov.querySelector('#me_close').addEventListener('click',()=>ov.remove());
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});

  // 상단 저장 버튼도 연결
  const mockSaveFn = async ()=>{
    const newMg={};
    const newExSubj={};
    MOCK_SUBJ_L.forEach(sb=>{
      newMg[sb]={};
      MOCK_TESTS_L.forEach(t=>{
        const entry={};
        ['raw','grade','pct','std'].forEach(fk=>{
          const v=ov.querySelector(`#me_${sb}_${t}_${fk}`)?.value?.trim();
          if(v) entry[fk]=v;
        });
        if(Object.keys(entry).length) newMg[sb][t]=entry;
        if(sb==='탐구1'||sb==='탐구2'){
          const nm=ov.querySelector(`#me_subj_${sb}_${t}`)?.value?.trim();
          if(nm){ if(!newExSubj[sb]) newExSubj[sb]={}; newExSubj[sb][t]=nm; }
        }
      });
    });
    CU={...CU,mockGrades:newMg,mockExtraSubjs:newExSubj};
    try{
      if(FB()) await window._fb.set('students',CU.id,{mockGrades:newMg,mockExtraSubjs:newExSubj});
      ov.remove(); render();
      toast('✅ 모의고사 성적이 저장되었습니다!');
    }catch(e){alert('저장 실패: '+e.message);}
  };
  ov.querySelector('#me_save')?.addEventListener('click', mockSaveFn);
  ov.querySelector('#me_save_top')?.addEventListener('click', mockSaveFn);
};

  const s=CU;
  const rows=[['🏢 기관',s.orgName],['🏫 학교',s.school],['📚 학년',s.grade],['🏷️ 반',s.className],['📱 연락처',s.phone],['👨‍🏫 담당 선생님',s.counselor]].filter(([,v])=>v);
  return`<div>
    <div class="stitle">👤 내 정보</div>

        <div style="width:54px;height:54px;border-radius:14px;background:#3b5bdb;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;flex-shrink:0">${(s.name||'?')[0]}</div>
        <div><div style="font-size:20px;font-weight:900">${esc(s.name)}</div><div style="font-size:12px;color:#888;margin-top:3px">${esc(s.school||'')} ${esc(s.grade||'')}</div></div>

        <span style="font-size:12px;color:#888;min-width:90px;flex-shrink:0">${l}</span>
        <span style="font-size:13px;font-weight:600">${esc(v)}</span>
      </div>`).join('')}
    </div></div>
    <div class="card"><div class="card-body">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">데이터 관리</div>
      <p style="font-size:12px;color:#888;margin-bottom:12px;line-height:1.6">선생님이 플랜이나 성적을 업데이트하면 새로고침으로 최신 내용을 받아올 수 있어요</p>
      <button class="btn-sm" style="width:100%;min-height:44px;font-size:13px" onclick="refreshData()">🔄 최신 데이터 불러오기</button>

  </div>`;
}

// 실시간 동기화 - 관리자가 변경하면 자동으로 학생 화면 갱신
let _unsubscribeStudent = null;
// ── 학생용: 지난주 플랜 가져오기 ──
function copyPrevWeekPlanStudent(selYear, selMonth, selWeek){
  if(!CU) return;
  // 이전 주차 계산
  var py=selYear, pm=selMonth, pw=selWeek-1;
  if(pw<1){
    pm-=1;
    if(pm<1){ pm=12; py-=1; }
    pw=getMaxWeeks(py,pm);
  }
  var prevKey=py+'-'+String(pm).padStart(2,'0')+'-w'+pw;
  // 현재 주차
  var now=new Date();
  var curYear=now.getFullYear(), curMonth=now.getMonth()+1;
  var curWeek=getWeekOfMonth(curYear,curMonth,now.getDate());
  var curKey=curYear+'-'+String(curMonth).padStart(2,'0')+'-w'+curWeek;
  var isCurrentSel=(selYear===curYear&&selMonth===curMonth&&selWeek===curWeek);
  // 이전 주차 플랜 조회
  var hist=CU._weeklyHistory||{};
  var srcPlan={}, srcBm={};
  if(hist[prevKey]&&Object.keys(hist[prevKey].plan||{}).length>0){
    srcPlan=hist[prevKey].plan||{};
    srcBm=hist[prevKey].ttBookMap||hist[prevKey].bookMap||{};
  } else if((CU._planWeek||'')===prevKey){
    srcPlan=CU.weeklyPlan||{};
    srcBm=CU.weeklyBookMap||{};
  }
  if(!Object.keys(srcPlan).length){
    alert('이전 주차('+py+'년 '+pm+'월 '+pw+'주차)에 저장된 플랜이 없습니다.');
    return;
  }
  var pLabel=py+'년 '+pm+'월 '+pw+'주차';
  var wLabel=selYear+'년 '+selMonth+'월 '+selWeek+'주차';
  if(!confirm(pLabel+' 플랜을 '+wLabel+'로 가져올까요?\n기존 내용은 덮어쓰입니다.')) return;
  if(isCurrentSel){
    CU.weeklyPlan=Object.assign({},srcPlan);
    CU.weeklyBookMap=Object.assign({},srcBm);
    CU._planWeek=curKey;
  } else {
    if(!CU._weeklyHistory) CU._weeklyHistory={};
    var wKey=selYear+'-'+String(selMonth).padStart(2,'0')+'-w'+selWeek;
    if(!CU._weeklyHistory[wKey]) CU._weeklyHistory[wKey]={plan:{},ttBookMap:{}};
    CU._weeklyHistory[wKey].plan=Object.assign({},srcPlan);
    CU._weeklyHistory[wKey].ttBookMap=Object.assign({},srcBm);
    CU._weeklyHistory[wKey].savedAt=Date.now();
  }
  // Firebase 저장
  if(typeof fbRef==='function'&&fbRef()){
    fbRef().update({
      weeklyPlan: CU.weeklyPlan||{},
      weeklyBookMap: CU.weeklyBookMap||{},
      _planWeek: CU._planWeek||'',
      _weeklyHistory: CU._weeklyHistory||{}
    }).catch(function(e){ console.warn('저장 오류:', e); });
  }
  render();
  alert('✅ 지난주 플랜을 가져왔습니다!');
}

function startStudentRealtimeSync(studentId){
  if(!FB() || !window._db) return;
  // 기존 리스너 해제
  if(_unsubscribeStudent){ try{_unsubscribeStudent();}catch(e){} _unsubscribeStudent=null; }
  try{
    _unsubscribeStudent = window._db.collection('students').doc(String(studentId))
      .onSnapshot(function(snap){
        if(!snap || !snap.exists) return;
        if(window._studentSaving) return; // 학생이 저장 중이면 무시
        const incoming = Object.assign({}, snap.data(), {id: snap.id});
        // [학생용 onSnapshot] 데이터 수신
        // 타임테이블 관련 필드만 업데이트 (UI 상태 보존)
        const planFields = ['weeklyPlan','weeklyBookMap','_planWeek','weeklyPlanWeek',
          'weeklyHistory','weeklySubjPlans','weeklyAchieve'];
        planFields.forEach(function(field){
          if(incoming[field] !== undefined) CU[field] = incoming[field];
        });
        DATA.student = CU;
        // 항상 화면 갱신 (어떤 탭이든 최신 데이터 표시)
        render();
        // 토스트 알림
        if(curTab !== 'timetable'){
          const toastEl=document.getElementById('toast');
          if(toastEl){toastEl.textContent='📅 플랜이 업데이트됨';toastEl.classList.add('show');setTimeout(function(){toastEl.classList.remove('show');},2000);}
        }
      }, function(err){ console.warn('Student onSnapshot error:', err.message); });
    // 테스트 실시간 동기화
    window._db.collection('tests').onSnapshot(function(snap){
      if(!snap) return;
      const allTests = snap.docs.map(function(d){ return Object.assign({}, d.data(), {id:d.id}); });
      // 학생 기관/반 기준 필터링
      DATA.tests = allTests.filter(function(t){
        // 기관 필터
        if(t.orgId && CU.orgId && t.orgId !== CU.orgId) return false;
        // 반 필터: classNames 없으면 전체 공개
        if(!t.classNames || t.classNames.length===0) return true;
        return t.classNames.includes(CU.className);
      });
      if(curTab==='test') render();
    }, function(err){ console.warn('Tests onSnapshot error:', err.message); });

    console.log('✅ 학생 실시간 동기화 시작:', studentId);
  }catch(e){ console.warn('실시간 동기화 실패:', e.message); }
}

async function refreshData(){
  if(!FB()||!CU){toast('Firebase 미연결 상태입니다');return;}
  toast('⏳ 업데이트 중...');
  try{
    const [students,tests]=await Promise.all([fbAll('students'),fbAll('tests')]);
    const student=students.find(s=>String(s.id)===String(CU.id));
    if(student){CU={...CU,...student};DATA={student:CU,tests:tests.filter(t=>!t.classNames?.length||t.classNames.includes(student.className)),students};render();toast('✅ 최신 데이터로 업데이트됨');}
  }catch(e){toast('오류: '+e.message);}
}

// ── F5 세션 복원 ──
(async function(){
  try{
    const sess = JSON.parse(sessionStorage.getItem('sg_stu_session')||'null');
    if(sess && sess.id){
      // 세션 있으면 자동 로그인 시도
      const students = await fbAll('students').catch(()=>null);
      const tests = await fbAll('tests').catch(()=>[]);
      const student = students && students.find(s=>String(s.id)===String(sess.id));
      if(student){
        CU = student;
        DATA = {student, tests:(tests||[]).filter(function(t){
          if(t.orgId && student.orgId && t.orgId!==student.orgId) return false;
          if(!t.classNames||!t.classNames.length) return true;
          return t.classNames.includes(student.className);
        }), students:students||[]};
        render();
        startStudentRealtimeSync(String(student.id));
        return;
      }
    }
  }catch(e){}
  render(); // 세션 없으면 로그인 화면
})();
</script>
