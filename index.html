function loadApexIframe(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid));
  if(!s) return;
  const wrap = document.getElementById('apex_iframe_wrap_'+sid);
  if(!wrap) return;
  if(wrap.querySelector('iframe')){ wrap.style.display=wrap.style.display==='none'?'block':'none'; return; }

  wrap.style.display = 'block';
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:900px;border:1.5px solid #e0e3ef;border-radius:8px;';
  // textarea에서 APEX HTML 로드 (Blob URL 방식 - CSP/null-origin 문제 방지)
  const _apexEl = document.getElementById('apex_html_store');
  const _apexHtml = _apexEl ? _apexEl.value : '<p>APEX 로딩 실패</p>';
  const _blob = new Blob([_apexHtml], {type:'text/html;charset=utf-8'});
  const _blobUrl = URL.createObjectURL(_blob);
  iframe.src = _blobUrl;
  // blob URL 정리 (로드 후)
  wrap.appendChild(iframe);

  iframe.onload = () => {
    try {
      const iw = iframe.contentWindow;
      const nameEl = iw.document.getElementById('inName'); if(nameEl) nameEl.value = s.name||'';
      const schoolEl = iw.document.getElementById('inSchool'); if(schoolEl) schoolEl.value = s.school||'';
      const gradeEl = iw.document.getElementById('inGrade');
      if(gradeEl && s.grade){
        const g = s.grade;
        if(g.includes('초5')||g.includes('초6')) gradeEl.value='elem';
        else if(g.includes('중1')||g.includes('중2')) gradeEl.value='mid12';
        else if(g.includes('중3')) gradeEl.value='mid3';
        iw.renderQuestions && iw.renderQuestions();
      }
      iw._apexSaveCallback = (result) => apexSaveToStudent(sid, result);
    } catch(e){ console.warn('APEX iframe init error:', e); }
  };
}

window.addEventListener('message', (e) => {
  if(e.data?.type === 'APEX_SAVE'){
    const activeSid = (ST.sel||ST.adminSel)?.id;
    if(activeSid) apexSaveToStudent(activeSid, e.data.result);
  }
});

async function apexSaveToStudent(sid, result){
  const s = ST.students.find(x=>String(x.id)===String(sid));
  if(!s){ alert('학생을 찾을 수 없습니다.'); return; }
  const existing = JSON.parse(JSON.stringify(s.apexResults||[]));
  const idx = existing.findIndex(r=>r.session===String(result.session));
  if(idx>=0){
    if(!confirm(`${result.session}차 진단 결과가 이미 있습니다. 덮어쓸까요?`)) return;
    existing[idx] = result;
  } else {
    existing.push(result);
    existing.sort((a,b)=>+a.session - +b.session);
  }
  upd({...s, apexResults: existing});
  alert(`✅ APEX ${result.session}차 진단 결과 저장 완료!\n총점: ${result.totalAdj}점 (보정 후)`);
  render();
}

// 스냅샷 저장
function saveJeongsiSnapshot(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid));
  if(!s){ alert('학생을 찾을 수 없습니다.'); return; }

  const jst = ST.jeongsi||{};
  // calc 없거나 std합 0이면 경고 후 계속 진행 (성적 없이도 저장 허용)
  const calc = calcCsatScores(jst, s) || {_std합:0,_pct합:0,_pct평균:0};
  const hasScore = calc._std합 && calc._std합 > 0;
  if(!hasScore){
    const proceed = confirm('수능 성적이 입력되지 않았습니다.\n성적 없이 필터 설정만 저장할까요?');
    if(!proceed) return;
  }

  // 지원 가능 대학 계산
  const ALL_AREAS=['서울','경기·인천','대전·충남','충북','대구·경북','부산·울산·경남','광주·전남','전북','강원','제주'];
  const selAreas = jst.areas&&jst.areas.length ? jst.areas : ALL_AREAS;
  let filtered = JEONGSI_DB.filter(u=>selAreas.some(a=>{
    const aKey=a.split('·')[0]; return u.area.includes(aKey)||a.includes(u.area.split('·')[0]);
  }));
  if(jst.tier&&jst.tier!=='전체') filtered=filtered.filter(u=>u.tier===jst.tier);
  filtered = _filterBy계열(filtered, jst.계열);
  const std합 = calc._std합||0;
  const classified = filtered.map(u=>({...u, chance: std합>0?classifyChance(std합,u.cut50std,u.cut70std):'–'}));

  // 가능성별 집계
  const summary = {};
  ['도전','상향','적정','안정','하향'].forEach(g=>{ summary[g] = classified.filter(u=>u.chance===g).length; });

  // 대학 목록 (성적 있을 때만 가능성 기준, 없으면 전체 목록)
  const topUnivs = std합>0
    ? ['도전','상향','적정','안정','하향']
        .flatMap(g=>classified.filter(u=>u.chance===g))
        .map(u=>({univ:u.univ, dept:u.dept, chance:u.chance, cut50std:u.cut50std}))
    : classified.slice(0,30).map(u=>({univ:u.univ, dept:u.dept, chance:'–', cut50std:u.cut50std}));

  // 날짜 라벨 설정 팝업
  const today = new Date();
  const defaultLabel = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')} 정시분석`;
  const labelInput = prompt(
    '저장 라벨을 입력하세요.\n(지난주 토요일 진행분이면 날짜를 수정해 주세요)',
    defaultLabel
  );
  if(labelInput === null) return; // 취소

  const snap = {
    label: labelInput || defaultLabel,
    savedAt: new Date().toLocaleString('ko-KR'),
    // 입력 방식
    mockSrc: jst.mockSrc,
    mockTests: jst.mockTests||[],
    manualScores: jst.mockSrc==='manual' ? JSON.parse(JSON.stringify(jst.manualScores||{})) : {},
    // 과목 선택
    국어선택: jst.국어선택,
    수학선택: jst.수학선택,
    탐구1과목: jst.탐구1과목,
    탐구2과목: jst.탐구2과목,
    // 필터
    areas: [...(jst.areas||[])],
    tier: jst.tier,
    계열: jst.계열,
    // 환산 성적
    calc: {
      국어: (calc&&calc['국어'])||null,
      수학: (calc&&calc['수학'])||null,
      탐구1: (calc&&calc['탐구1'])||null,
      탐구2: (calc&&calc['탐구2'])||null,
      영어: (calc&&calc['영어'])||null,
      _std합: Math.round((calc&&calc._std합)||0),
      _pct합: Math.round((calc&&calc._pct합)||0),
      _pct평균: Math.round((calc&&calc._pct평균)||0),
    },
    std합: Math.round(calc._std합||0),
    pct합: Math.round(calc._pct합||0),
    // 결과
    summary,
    topUnivs,
    tests: jst.mockTests&&jst.mockTests.length ? [...jst.mockTests] : [],
    totalCount: classified.length,
  };

  const existing = JSON.parse(JSON.stringify(s.jeongsiSnapshots||[]));
  existing.push(snap);
  upd({...s, jeongsiSnapshots: existing});
  const summaryTxt = Object.entries(summary).filter(([,v])=>v>0).map(([k,v])=>k+' '+v+'개').join(' / ');
  alert(`✅ 정시 분석 결과가 저장되었습니다!\n라벨: ${snap.label}\n총 ${classified.length}개 대학${summaryTxt?' · '+summaryTxt:''}`);
  render();
}

    lines.push(esc(t)+(hasT?'':' <span style="font-size:9px">(미입력)</span>'));
    lines.push('</label>');
  });
  lines.push('<button onclick="ST.jeongsi.mockTests=[];render()" style="padding:4px 10px;border-radius:14px;border:1.5px solid #e53935;background:#fff;color:#e53935;font-size:10px;font-weight:700;cursor:pointer">초기화</button>');
  lines.push('</div>');
  // 선택 상태 메시지
  const s2 = ST.sel||ST.adminSel;
  const latestSrc2 = s2 ? getLatestMockScores(s2, null) : null;
  if(selectedTests.length>0){
    lines.push('<div style="font-size:10px;color:#3b5bdb;margin-top:4px">✅ '+selectedTests.join(' + ')+(selectedTests.length>1?' 평균으로 환산':' 데이터 로드됨')+'</div>');
  } else if(latestSrc2){
    lines.push('<div style="font-size:10px;color:#888;margin-top:4px">✅ 최근 데이터: '+esc(latestSrc2.testName)+'</div>');
  } else {
    lines.push('<div style="font-size:10px;color:#e53935;margin-top:4px">⚠️ 모의고사 성적 미입력</div>');
  }
  lines.push('</div>');
  return lines.join('');
}

function _filterBy계열(arr, k){
  if(!k||k==='전체') return arr;
  const m={
    '인문·사회': function(u){return u.계열==='인문';},
    '인문':      function(u){return u.계열==='인문';},
    '상경':      function(u){return u.계열==='상경';},
    '자연':      function(u){return u.계열==='자연';},
    '공학':      function(u){return u.계열==='공학';},
    '의학':      function(u){return u.계열==='의학';},
    '교육':      function(u){return u.계열==='교육';},
  };
  const fn=m[k];
  return fn ? arr.filter(fn) : arr.filter(function(u){return u.계열===k;});
}

// 직접입력 폼 헬퍼
function _renderJeongsiManualForm(jst){
  const sbs=[['국어','국어'],['수학','수학'],['탐구1','탐구1'],['탐구2','탐구2'],['영어','영어(등급)'],['한국사','한국사(등급)']];

      h+='<td style="border:1px solid #e0e3ef;padding:2px 4px;text-align:center"><input type="number" value="'+val+'" placeholder="–" style="width:60px;border:1px solid #e8eaf6;border-radius:4px;padding:3px;text-align:center;font-size:12px;font-weight:700" oninput="if(!ST.jeongsi.manualScores[\''+sb+'\'])ST.jeongsi.manualScores[\''+sb+'\']={}; ST.jeongsi.manualScores[\''+sb+'\'][\''+fk+'\']=this.value;"></td>';
    });

  h+='</table></div>';

  return h;
}


// ── 정시 인쇄 ──
function printJeongsi(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid));if(!s)return;
  const jst = ST.jeongsi||{};
  const calc = calcCsatScores(jst, s);
  const ALL_AREAS = ['서울','경기·인천','대전·충남','충북','대구·경북','부산·울산·경남','광주·전남','전북','강원','제주'];
  const selAreas = jst.areas&&jst.areas.length ? jst.areas : ALL_AREAS;
  let filtered = JEONGSI_DB.filter(u=>selAreas.some(a=>{
    // 지역 매칭: 선택된 지역 키워드가 DB area에 포함되거나, DB area 키워드가 선택된 지역에 포함
    const aKey=a.split('·')[0];
    return u.area.includes(aKey)||a.includes(u.area.split('·')[0]);
  }));
  if(jst.tier&&jst.tier!=='전체') filtered=filtered.filter(u=>u.tier===jst.tier);
  if(jst.계열&&jst.계열!=='전체') filtered=filtered.filter(u=>u.계열===jst.계열);
  const std합 = calc?._std합||0;
  const chanceColors={하향:'#10b981',안정:'#3b82f6',적정:'#f59e0b',상향:'#ef4444',도전:'#8b5cf6','–':'#aaa',SKY:'#1967d2',서성한:'#3b5bdb',중경외시:'#0f9d58',인서울:'#f59e0b',경인권:'#8b5cf6',지거국:'#e53935',지방사립:'#777'};
  const classified = filtered.map(u=>({...u,chance:std합>0?classifyChance(std합,u.cut50std,u.cut70std):'–'}));

  const latestSrc = getLatestMockScores(s, jst.mockTest);
  const t1subj = jst.탐구1과목||(latestSrc?.탐구1?.subjName)||'탐구1';
  const t2subj = jst.탐구2과목||(latestSrc?.탐구2?.subjName)||'탐구2';

  const calcTableHtml = calc?`<h3>📈 수능 환산 성적</h3>
    <table><tr style="background:#f4f6fb">
      <th style="text-align:left">과목</th><th>원점수</th><th>표준점수</th><th>백분위</th><th>등급</th>
    </tr>
    ${[['국어','국어',calc['국어']],['수학','수학',calc['수학']],
       ['탐구1',t1subj,calc['탐구1']],['탐구2',t2subj,calc['탐구2']],
       ['영어','영어(절대)',calc['영어']]].map(([,lb,c])=>`<tr>
      <td class="lbl">${lb}</td>
      ${c?`<td>${c.raw||'–'}</td><td style="font-weight:900;color:#3b5bdb">${c.std||c.grade+'등급'||'–'}</td>
        <td style="color:#f59e0b">${c.pct!=null?c.pct+'%':'–'}</td>
        <td><span style="background:${c.grade<=2?'#1967d2':c.grade<=3?'#0f9d58':c.grade<=4?'#e37400':'#c5221f'};color:#fff;border-radius:4px;padding:1px 7px;font-size:10px">${c.grade||'–'}등급</span></td>`
      :`<td colspan="4" style="color:#bbb">미입력</td>`}
    </tr>`).join('')}
    <tr style="background:#eef1ff;font-weight:800">
      <td class="lbl">표준점수 합<br><span style="font-size:9px;font-weight:400;color:#888">(국+수+탐평균)</span></td>
      <td colspan="2" style="font-size:15px;font-weight:900;color:#3b5bdb">${Math.round(std합)}</td>
      <td colspan="2" style="font-size:10px;color:#888">지원 가능 대학 판정 기준</td>
    </tr>
    <tr style="background:#fff9e6;font-weight:800">
      <td class="lbl">백분위 합산<br><span style="font-size:9px;font-weight:400;color:#888">(국+수+탐평균)</span></td>
      <td colspan="2" style="font-size:15px;font-weight:900;color:#f59e0b">${Math.round(calc._pct합||0)}</td>
      <td style="color:#888;font-size:10px">평균 ${Math.round(calc._pct평균||0)}%</td>
      <td style="font-size:10px;color:#888">국·수·탐평균 합산</td>
    </tr></table>`:'<p style="color:#aaa">성적 미입력</p>';

  const univTableHtml = ['도전','상향','적정','안정','하향']
    .filter(g=>classified.some(u=>u.chance===g))
    .map(g=>{
      const list = classified.filter(u=>u.chance===g);
      return `<h3 style="color:${chanceColors[g]}">${g} (${list.length}개)</h3>
      <table>
        <tr style="background:#f4f6fb">
          <th style="text-align:left">대학</th><th>계열</th><th style="text-align:left">학과</th>
          <th>50%컷</th><th>70%컷</th><th>수능최저</th>
          <th style="text-align:left">반영비율</th><th style="text-align:left">활용지표</th><th style="text-align:left">비고</th>
        </tr>
        ${list.map(u=>`<tr>
          <td class="lbl">${u.univ}</td><td style="text-align:center"><span style="background:${u.계열==='의학'?'#fee2e2':u.계열==='자연'?'#dbeafe':'#dcfce7'};color:${u.계열==='의학'?'#dc2626':u.계열==='자연'?'#2563eb':'#059669'};border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700">${u.계열}</span></td><td>${u.dept}</td>
          <td style="font-weight:900;color:#3b5bdb">${u.cut50std}</td>
          <td style="color:#888">${u.cut70std}</td>
          <td style="font-size:10px">${u.수능최저||'–'}</td>
          <td style="font-size:9px">${Object.entries(u.ratio).filter(([,v])=>v>0).map(([k,v])=>k+' '+v+'%').join(', ')}</td>
          <td style="font-size:9px">${Object.entries(u.활용||{}).map(([k,v])=>k+':'+v).join('/')}</td>
          <td style="font-size:9px;color:#888">${u.비고||'–'}</td>
        </tr>`).join('')}
      </table>`;
    }).join('');

  const body = calcTableHtml + univTableHtml
    + '<p style="font-size:10px;color:#aaa;margin-top:16px">⚠️ 2025학년도 기준 참고용 · 실제 입결은 adiga.kr 확인 필수</p>';

  const now = new Date();
  popPrint(`${s.name} - 정시 지원 분석`, body, {
    year: now.getFullYear(), month: now.getMonth()+1,
    reportKo: now.getFullYear()+'년 '+( now.getMonth()+1)+'월 정시 분석 리포트',
  });
}

// ── 정시 엑셀 변환 ──
function exportJeongsiXls(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid));if(!s)return;
  const jst = ST.jeongsi||{};
  // 저장된 calc 우선 사용, 없으면 재계산
  const calc = (jst.calc && jst.calc._std합!=null) ? jst.calc : calcCsatScores(jst, s);
  const ALL_AREAS=['서울','경기·인천','대전·충남','충북','대구·경북','부산·울산·경남','광주·전남','전북','강원','제주'];
  const selAreas = jst.areas&&jst.areas.length?jst.areas:ALL_AREAS;
  let filtered = JEONGSI_DB.filter(u=>selAreas.some(a=>{
    // 지역 매칭: 선택된 지역 키워드가 DB area에 포함되거나, DB area 키워드가 선택된 지역에 포함
    const aKey=a.split('·')[0];
    return u.area.includes(aKey)||a.includes(u.area.split('·')[0]);
  }));
  if(jst.tier&&jst.tier!=='전체') filtered=filtered.filter(u=>u.tier===jst.tier);
  if(jst.계열&&jst.계열!=='전체') filtered=filtered.filter(u=>u.계열===jst.계열);
  const std합 = calc?._std합||0;
  const classified = filtered.map(u=>({...u,chance:std합>0?classifyChance(std합,u.cut50std,u.cut70std):'–'}));

  let csv = '\uFEFF'; // BOM
  csv += `정시 지원 분석 - ${s.name} (${s.school} ${s.grade})\r\n\r\n`;
  csv += `[수능 환산 성적]\r\n`;
  csv += `과목,원점수,표준점수,백분위,등급\r\n`;
  if(calc){
    const latestSrc = getLatestMockScores(s, jst.mockTest);
    const t1n = jst.탐구1과목||(latestSrc?.탐구1?.subjName)||'탐구1';
    const t2n = jst.탐구2과목||(latestSrc?.탐구2?.subjName)||'탐구2';
    const scoreRows = [
      ['국어',calc['국어']],['수학',calc['수학']],
      [t1n,calc['탐구1']],[t2n,calc['탐구2']],
      ['영어(절대평가)',calc['영어']],['한국사',calc['한국사']]
    ];
    scoreRows.forEach(function(row){
      const lb=row[0], c=row[1];
      if(!c) return;
      const rawV  = (c.raw!=null&&c.raw!=='') ? c.raw : '';
      const stdV  = c.std!=null ? c.std : (c.grade!=null ? c.grade+'등급' : '');
      const pctV  = c.pct!=null ? c.pct+'%' : '';
      const grV   = c.grade!=null ? c.grade+'등급' : '';
      csv += lb+','+rawV+','+stdV+','+pctV+','+grV+'\r\n';
    });
    csv += `표준점수합,,,${Math.round(std합)},\r\n`;
    csv += `백분위합산,,,${Math.round(calc._pct합||0)},평균${Math.round(calc._pct평균||0)}%\r\n\r\n`;
  }

    csv += `${u.chance},${u.univ},${u.dept},${u.tier},${u.cut50std},${u.cut70std},${u.수능최저||'없음'},`;

  });
  csv += `\r\n⚠️ 2025학년도 기준 참고용 - 실제 입결은 adiga.kr 확인 필수\r\n`;

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `정시분석_${s.name}_${new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','-')}.csv`;
  a.click();
}

// 개별 전형 삭제 (전형명 기준)
function delJeon(tid, jeonName){
  const stu=ST.sel||ST.adminSel;
  if(!stu) return;
  const targets=(stu.targets||[]).map(x=>{
    if(x.id!==tid) return x;
    const deleted=[...(x._deletedJeons||[])];
    if(!deleted.includes(jeonName)) deleted.push(jeonName);
    // 모든 전형 삭제 시 aiResults도 초기화
    const remaining=(x.aiResults||[]).filter(r=>!deleted.includes(r.jeonName));
    return {...x, _deletedJeons:deleted, aiResults:remaining.length>0?remaining:x.aiResults};
  });
  upd({...stu, targets});
}

// ══ Claude API 호출 ══
async function callClaude(userPrompt){
  const apiKey=(window.ANTHROPIC_API_KEY||window._sharedApiKey||localStorage.getItem('apiKey')||'').trim();
  if(!apiKey) throw new Error('API_KEY_MISSING');

  // Anthropic 공식 브라우저 직접 호출 헤더 (2024.08 공식 지원)
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'x-api-key': apiKey
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });

  const data = await res.json();

  if(data.error){
    const t = data.error.type||'';
    const m = data.error.message||JSON.stringify(data.error);
    if(t==='authentication_error') throw new Error('AUTH:' + m);
    throw new Error(m);
  }

  const text = (data.content||[])
    .filter(b => b.type==='text')
    .map(b => b.text)
    .join('')
    .replace(/^```json\s*/im,'').replace(/^```\s*/im,'').replace(/\s*```$/im,'')
    .trim();

  if(!text) throw new Error('빈 응답');
  return text;
}

function _parseAiJson(raw){
  if(!raw) return null;
  // 1단계: 마크다운 코드블록 제거
  let s = raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  // 2단계: 직접 파싱 시도
  try{ return JSON.parse(s); }catch(e1){}
  // 3단계: {…} 블록 추출 후 파싱
  const objM = s.match(/\{[\s\S]*\}/);
  if(objM){ try{ return JSON.parse(objM[0]); }catch(e2){} }
  // 4단계: 문제 문자 정제 후 재시도
  function cleanJson(str){
    return str
      .replace(/[\x00-\x09\x0b\x0c\x0e-\x1f\x7f]/g,'')  // 제어문자
      .replace(/\r\n|\r|\n/g,' ')                           // 줄바꿈→공백
      .replace(/,\s*([}\]])/g,'$1')                         // 후행쉼표
      .replace(/\/\/[^\n"']*(?=\s)/g,'')                    // 한줄주석
      .replace(/\/\*[\s\S]*?\*\//g,'');                     // 블록주석
  }
  const cleaned = cleanJson(s);
  try{ return JSON.parse(cleaned); }catch(e3){}
  const objM2 = cleaned.match(/\{[\s\S]*\}/);
  if(objM2){ try{ return JSON.parse(objM2[0]); }catch(e4){} }
  // 5단계: results 배열만 선별 추출
  const resM = s.match(/"results"\s*:\s*(\[[\s\S]*?\])\s*[,}]/);
  if(resM){
    try{ const arr=JSON.parse(cleanJson(resM[1])); return {results:arr}; }
    catch(e5){}
  }
  // 6단계: 개별 전형 객체 추출 (최후 수단)
  const objMatches = s.match(/\{[^{}]*"jeonName"[^{}]*\}/g)||
                     s.match(/\{[^{}]*"chance"[^{}]*\}/g);
  if(objMatches && objMatches.length){
    const results = objMatches.map(o=>{
      try{ return JSON.parse(cleanJson(o)); }catch(e){ return null; }
    }).filter(Boolean);
    if(results.length) return {results};
  }
  return null;
}

function getMaxWeeks(y,m){ const d=new Date(y,m,0).getDate();const fd=new Date(y,m-1,1).getDay();return Math.ceil((d+fd)/7); }

  // 현재 주차 계산
  var now2 = new Date();
  var cy2 = now2.getFullYear(), cm2 = now2.getMonth()+1;
  var cw2 = getWeekOfMonth(cy2, cm2, now2.getDate());

  if(ST._eraseMode){

    } else {

      var hist = (s.weeklyHistory||[]).slice();

      upd(Object.assign({}, s, {weeklyPlan:p3, weeklyBookMap:b3, _planWeek:curKey2}));
    } else {
      var hist2 = (s.weeklyHistory||[]).slice();
      var hi2 = hist2.findIndex(function(x){return x.year===wy&&x.month===wm&&x.weekNum===ww;});

function printAiPlan(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid));
  if(!s){ alert('학생을 찾을 수 없습니다.'); return; }
  const aiMap = window._lastAiPlanMap || {};
  if(!Object.keys(aiMap).length){ alert('먼저 AI 플랜을 생성해주세요.'); return; }

  const DAYS = ['월','화','수','목','금','토','일'];
  const SC_COLORS = {국어:'#e53935',수학:'#3b5bdb',영어:'#0f9d58',과학:'#f59e0b',사회:'#8b5cf6'};
  function getCellColor(subj){
    for(const [k,v] of Object.entries(SC_COLORS)){ if(subj&&subj.includes(k)) return v; }
    return '#64748b';
  }

  // 시간 범위 계산
  const hours = Object.keys(aiMap).map(k=>parseInt(k.split('-')[1])).filter(h=>!isNaN(h));
  const minH = hours.length ? Math.min(...hours) : 6;
  const maxH = hours.length ? Math.max(...hours) : 22;

  // 시간표 HTML 생성
  let ttHtml = '<table class="tt" style="width:100%;border-collapse:collapse;font-size:10px">';
  ttHtml += '<tr><th class="tt-th" style="width:30px">시간</th>';
  DAYS.forEach(d=>{ ttHtml += `<th class="tt-th" style="${d==='토'||d==='일'?'color:#e53935':''}">${d}</th>`; });
  ttHtml += '</tr>';

  for(let h=minH; h<=maxH; h++){
    ttHtml += `<tr><td class="tt-td tt-time">${h}시</td>`;
    DAYS.forEach(d=>{
      const key = d+'-'+h;
      const subj = aiMap[key]||'';
      const col = subj ? getCellColor(subj) : '';
      ttHtml += subj
        ? `<td class="tt-td" style="background:${col}20;color:${col};font-weight:700;text-align:center">${subj.length>3?subj.slice(0,3)+'..':subj}</td>`
        : `<td class="tt-td"></td>`;
    });
    ttHtml += '</tr>';
  }
  ttHtml += '</table>';

  // 과목별 시간 통계
  const stats = {};
  Object.values(aiMap).forEach(subj=>{ if(subj) stats[subj]=(stats[subj]||0)+1; });
  const total = Object.values(stats).reduce((a,v)=>a+v,0);
  const statsHtml = Object.entries(stats).sort((a,b)=>b[1]-a[1]).map(([subj,cnt])=>{
    const col = getCellColor(subj);
    const pct = total ? Math.round(cnt/total*100) : 0;
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="font-weight:700;color:${col}">${subj}</span>
        <span>${cnt}시간 (${pct}%)</span>
      </div>
      <div style="background:#e2e8f0;height:8px;border-radius:4px;overflow:hidden">
        <div style="background:${col};height:8px;width:${pct}%;border-radius:4px"></div>
      </div>
    </div>`;
  }).join('');

  const body = `
    <div class="info-box" style="margin-bottom:18px">
      <div class="info-box-main">
        <div class="info-box-name">${esc(s.name)}</div>
        <div class="info-box-sub">${esc(s.school||'')} · ${esc(s.grade||'')} · 담당: ${esc(s.counselor||'')} </div>
      </div>
    </div>
    <h3>📅 AI 추천 주간 시간표</h3>
    <div style="overflow-x:auto;margin-bottom:16px" class="tt-page-safe">${ttHtml}</div>
    <h3>📊 과목별 학습 시간 배분</h3>
    <div style="margin-bottom:16px">${statsHtml}</div>
    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;font-size:11px;color:#475569;line-height:1.8">
      <strong style="color:#1e40af">💡 AI 추천 안내</strong><br>
      본 시간표는 학생의 내신 성적, 지원 대학 목표 및 학습 조건을 분석하여 AI가 자동 생성한 추천 플랜입니다.<br>
      실제 학습 상황에 맞게 담당 선생님과 조율하여 활용하세요.
    </div>
  `;

  const _now=new Date(); popPrint(`${esc(s.name)} - AI 추천 주간 학습 플랜`, body, {weekLabel: `${_now.getFullYear()}년 ${_now.getMonth()+1}월 AI 추천 플랜`, year: _now.getFullYear(), month: _now.getMonth()+1});
}

  if(!apiKey){ openApiModal(); return; }

  if(el) el.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:16px;background:#eff6ff;border-radius:12px;font-size:13px;color:#1e40af;border:1px solid #bfdbfe">
    <div style="width:18px;height:18px;border:2.5px solid #bfdbfe;border-top-color:#3b5bdb;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0"></div>
    학생 정보를 분석하여 최적의 주간 플랜을 생성 중...

  const extraReq = document.getElementById('ai_extra_req')?.value||'';

  const extraSubjs = s.extraSubjs||[];
  const subjectList = [
    ...Object.entries(s.subjects).map(([k,v])=>({korean:'국어',math:'수학',english:'영어',science:'과학',social:'사회'}[k]||null).replace?({korean:'국어',math:'수학',english:'영어',science:'과학',social:'사회'}[k])+`(내신${v}등급)`:null).filter(Boolean),
    ...extraSubjs.map(sb=>`${sb}(추가과목)`),
    ...(ST.customSubjs||[]).map(sb=>`${sb}(추가과목)`)
  ];

  const targetList = (s.targets||[]).map(t=>`${t.univ} ${t.dept} [${t.jeon}]`).join(', ')||'미정';
  const weekendText = {yes:'주말 포함 (토·일 학습)', half:'주말 절반 (토 학습, 일 휴식)', no:'주말 제외 (평일만)'}[weekend];

  const prompt=`당신은 대한민국 입시 전문 학습 플래너입니다. 아래 학생 정보를 바탕으로 최적의 주간 학습 시간표를 만들어주세요.

[학생 정보]

function saveWeeklyHistory(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  if(!Object.keys(s.weeklyPlan||{}).length){ alert('학습플랜이 비어있습니다. 먼저 학습플랜을 입력해주세요.'); return; }

  const dateStr = prompt('저장할 주간 날짜를 입력하세요 (예: 2026-05-05)', new Date().toISOString().slice(0,10));
  if(!dateStr) return;

  const memo = prompt('이번 주 메모 (선택사항)', '') || '';

  // 날짜 → 월/주차 자동 계산
  const d = new Date(dateStr);
  if(isNaN(d.getTime())){ alert('날짜 형식이 올바르지 않습니다.'); return; }
  const month = d.getMonth()+1;
  const year = d.getFullYear();
  // 해당 월의 첫째 날 기준 주차
  const firstDay = new Date(year, d.getMonth(), 1);
  const weekNum = getWeekOfMonth(d.getFullYear(),d.getMonth()+1,d.getDate());
  const label = `${year}년 ${month}월 ${weekNum}주차`;

  const entry = {
    id: Date.now(),
    date: dateStr,
    label,
    year, month, weekNum,
    plan: {...(s.weeklyPlan||{})},
    bookMap: {...(s.weeklyBookMap||{})},
    subjPlans: JSON.parse(JSON.stringify(s.weeklySubjPlans||{})),
    memo,
  };

  const history = [...(s.weeklyHistory||[])];
  // 같은 날짜 덮어쓰기 여부 확인
  const existIdx = history.findIndex(h=>h.date===dateStr);
  if(existIdx>=0){
    if(!confirm(`${dateStr} 이력이 이미 있습니다. 덮어쓸까요?`)) return;
    history[existIdx] = entry;
  } else {
    history.push(entry);
    history.sort((a,b)=>a.date.localeCompare(b.date));
  }

  upd({...s, weeklyHistory: history});
  alert(`✅ "${label}" 이력이 저장되었습니다.\n📆 주간 이력 탭에서 확인하세요.`);
}

                style="background:#eef1ff;color:#3b5bdb;border:1px solid #c5cae9;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer">📥 불러오기</button>
              <button onclick="event.stopPropagation();printWeeklyHistoryOne(${s.id},${h.id})"

              <button onclick="event.stopPropagation();deleteWeeklyHistory('${s.id}','${h.id}')"

            }).join('')}
          </div>
          ${ST._historyOpen===h.id?`

              ${printHours.map(hh=>`<tr>

                  const subj=(h.plan||{})[`${d}-${hh}`];
                  const _plan_subj_pwh=(h.plan||{})[`${d}-${hh}`];
              const bk=(h.bookMap||{})[`${d}-${hh}`]||
                ((h.subjPlans||{})[_plan_subj_pwh]?.books||[]).filter(Boolean)[0]||'';
                  const col=subj?(SC[subj]||'#3b5bdb'):null;

    <div style="text-align:center;margin-top:10px">

}

  
// ══ 플랜점검 탭 ══
function renderAchieve(s){
  const now=new Date();
  const cy=now.getFullYear(),cm=now.getMonth()+1,cw=getWeekOfMonth(cy,cm,now.getDate());
  const wy=ST.weekYear||cy,wm=ST.weekMonth||cm,ww=ST.weekWeek||cw;
  const wKey=getWeekNum(wy,wm,ww);
  const wLabel=getWeekLabel(wy,wm,ww);
  const isCurrentWeek=wy===cy&&wm===cm&&ww===cw;
  const history=s.weeklyHistory||[];
  const hEntry=history.find(h=>h.date&&getWeekNum(h.year,h.month,h.weekNum)===wKey);
  const _rwCurKey=getWeekNum(cy,cm,cw);
  const _rwPlanOk=(s._planWeek||'')===_rwCurKey;
  const plan=isCurrentWeek?(_rwPlanOk?(s.weeklyPlan||{}):{}):(hEntry?.plan||{});
  const subjPlans=isCurrentWeek?(_rwPlanOk?(s.weeklySubjPlans||{}):{}):(hEntry?.subjPlans||{});
  const stats={};Object.values(plan).forEach(x=>{stats[x]=(stats[x]||0)+1;});
  const studySubjs=Object.keys(stats).filter(x=>x!=='휴식'&&x!=='자습');
  const inspect=(s.weeklyInspect||{})[wKey]||{};
  const tots=studySubjs.reduce((a,subj)=>{const v=inspect[subj]||{};a.p+=(stats[subj]||0);a.r+=(+v.actual||0);return a;},{p:0,r:0});
  const overallPct=tots.p&&tots.r?Math.round(tots.r/tots.p*100):null;

  window._saveInspect=(wk,subj,field,val)=>{
    const s2=ST.sel||ST.adminSel;
    const wi=JSON.parse(JSON.stringify(s2.weeklyInspect||{}));
    if(!wi[wk])wi[wk]={};if(!wi[wk][subj])wi[wk][subj]={};
    wi[wk][subj][field]=val;
    const u={...s2,weeklyInspect:wi};
    ST.students=ST.students.map(x=>x.id===s2.id?u:x);
    if(String(ST.sel?.id)===String(s2.id))ST.sel=u;
    if(ST.adminSel?.id===s2.id)ST.adminSel=u;
    save();
  };

  // 작은 방향 버튼 (상향/유지/하향)
  const dirBtns=(field,cur,colors)=>['상향','유지','하향'].map(opt=>{
    const c=colors?.[opt]||(opt==='상향'?'#0f9d58':opt==='하향'?'#e53935':'#3b5bdb');
    const icon=opt==='상향'?'▲':opt==='하향'?'▼':'━';
    const isAct=cur===opt;
    return`<button onclick="event.stopPropagation();window._saveInspect('${field.wk}','${field.subj}','${field.key}','${opt}');render()"
      style="flex:1;background:${isAct?c:'#fff'};color:${isAct?'#fff':c};border:1.5px solid ${isAct?c:c+'44'};border-radius:6px;padding:5px 2px;font-size:10px;font-weight:700;cursor:pointer;text-align:center">
      ${icon} ${opt}</button>`;
  }).join('');

  return`<div>
    <!-- 주차 선택 -->
    <div style="background:#fff;border-radius:12px;border:1.5px solid #e8eaf6;padding:14px 16px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:10px">📅 점검할 주차 선택 <span style="font-size:10px;color:#aaa;font-weight:400">(저장된 이력 있는 주차만 표시)</span></div>
      ${history.length===0?`<div style="background:#f8f9ff;border-radius:8px;padding:12px;text-align:center;font-size:12px;color:#aaa">저장된 이력이 없습니다.</div>`:`
      ${(()=>{
        const byYear={};
        history.slice().sort((a,b)=>b.date.localeCompare(a.date)).forEach(h=>{
          if(!byYear[h.year])byYear[h.year]=[];byYear[h.year].push(h);
        });
        return Object.entries(byYear).sort(([a],[b])=>b-a).map(([yr,hs])=>`
          <div style="margin-bottom:10px">
            <div style="font-size:11px;font-weight:600;color:#999;margin-bottom:6px">${yr}년</div>
            <div style="display:flex;flex-wrap:wrap;gap:5px">
              ${hs.map(h=>{
                const hk=getWeekNum(h.year,h.month,h.weekNum);
                const isAct=wKey===hk;
                const done=Object.keys((s.weeklyInspect||{})[hk]||{}).length>0;
                return`<button onclick="ST.weekYear=${h.year};ST.weekMonth=${h.month};ST.weekWeek=${h.weekNum};render()"
                  style="background:${isAct?'#8b5cf6':done?'#f0fdf4':'#fff'};color:${isAct?'#fff':done?'#166534':'#555'};border:1.5px solid ${isAct?'#8b5cf6':done?'#86efac':'#e0e3ef'};border-radius:8px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;line-height:1.5;text-align:left">
                  <div style="font-weight:800">${h.year}년 ${h.month}월 ${h.weekNum}주차${done&&!isAct?' ✅':''}</div>
                  <div style="font-size:10px;opacity:.7">${h.date}</div>
                </button>`;
              }).join('')}
            </div>
          </div>`).join('');
      })()}
      ${(!history.find(h=>getWeekNum(h.year,h.month,h.weekNum)===getWeekNum(cy,cm,cw)) && _rwPlanOk)?`
        <div style="border-top:1px dashed #e8eaf6;padding-top:8px">
          <div style="font-size:10px;color:#aaa;margin-bottom:6px">현재 주차 (이력 미저장)</div>
          <button onclick="ST.weekYear=${cy};ST.weekMonth=${cm};ST.weekWeek=${cw};render()"
            style="background:${isCurrentWeek?'#8b5cf6':'#fff'};color:${isCurrentWeek?'#fff':'#8b5cf6'};border:2px solid ${isCurrentWeek?'#8b5cf6':'#c4b5fd'};border-radius:8px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;line-height:1.5">
            <div style="font-weight:800">${cy}년 ${cm}월 ${cw}주차 (현재)</div>
          </button>
        </div>`:``}
      `}
    </div>

    <!-- 타이틀 + 버튼 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <div style="font-size:14px;font-weight:900;color:#8b5cf6">🔍 ${wLabel} 플랜점검</div>
      <div style="display:flex;gap:5px">
        <button onclick="printAchieve(${s.id})" style="background:#8b5cf6;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer">🖨️ 인쇄/PDF</button>
        <button onclick="exportAchieveXls(${s.id})" style="background:#f0fdf4;color:#0f9d58;border:1.5px solid #86efac;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer">📊 엑셀</button>
      </div>
    </div>

    ${studySubjs.length===0?`<div style="background:#f8f9ff;border-radius:12px;border:2px dashed #dde1f0;padding:32px;text-align:center;color:#aaa">
      <div style="font-size:28px;margin-bottom:8px">📅</div>
      <div style="font-size:13px;font-weight:700">이 주차에 학습플랜 데이터가 없습니다</div>
    </div>`:`

    <!-- 과목 요약 칩 -->
    <div style="background:#fff;border-left:4px solid #3b5bdb;border-radius:10px;border:1.5px solid #e8eaf6;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:#3b5bdb;margin-bottom:8px">📅 ${wLabel} 플랜 요약</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${studySubjs.map(subj=>{
          const col=SC[subj]||'#3b5bdb';
          const h=stats[subj];
          const ins=inspect[subj]||{};
          const actual=ins.actual!=null&&ins.actual!==''?+ins.actual:null;
          const pct=actual!=null&&h?Math.round(actual/h*100):null;
          const pcol=pct!=null?(pct>=90?'#0f9d58':pct>=70?'#f59e0b':'#e53935'):col;
          return`<div style="background:${col}10;border:1.5px solid ${col}33;border-radius:20px;padding:4px 14px;display:flex;align-items:center;gap:6px">
            <span style="font-size:13px;font-weight:800;color:${col}">${esc(subj)} ${h}h</span>
            ${actual!=null?`<span style="font-size:11px;font-weight:700;color:${pcol}">· ${actual}h 순공</span>`:`<span style="font-size:10px;color:#ccc">· 미입력</span>`}
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- 과목별 점검 카드 -->
    ${studySubjs.map(subj=>{
      const col=SC[subj]||'#8b5cf6';
      const planned=stats[subj]||0;
      const sp=subjPlans[subj]||{};
      const books=(sp.books||[]).filter(Boolean);
      const ins=inspect[subj]||{};
      const actual=ins.actual!=null&&ins.actual!==''?String(ins.actual):'';
      const pct=actual!==''&&planned?Math.round(+actual/planned*100):null;
      const achPct=ins.achievementPct!=null?ins.achievementPct:null;
      const pctCol=pct!=null?(pct>=90?'#0f9d58':pct>=70?'#f59e0b':'#e53935'):col;
      const sv=(field,val)=>`event.stopPropagation();window._saveInspect('${wKey}','${esc(subj)}','${field}',${typeof val==='string'?`'${val}'`:val});render()`;

      return`<div style="background:#fff;border-radius:12px;border:1.5px solid #e8eaf6;border-top:3px solid ${col};margin-bottom:12px;overflow:hidden">

        <!-- 헤더 -->

          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:38px;height:38px;border-radius:10px;background:${col};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0">${subj[0]}</div>
            <div>
              <div style="font-size:15px;font-weight:900;color:#1a1a2e">${esc(subj)}</div>
              <div style="font-size:10px;color:#999;margin-top:1px">계획 ${planned}h${books.length?' · '+books.join(', '):''}</div>
            </div>
          </div>
          ${pct!==null?`<div style="background:${pct>=90?'#f0fdf4':pct>=70?'#fffbeb':'#fff5f5'};border:1.5px solid ${pct>=90?'#86efac':pct>=70?'#fde68a':'#fecaca'};border-radius:10px;padding:7px 14px;text-align:center">
            <div style="font-size:18px;font-weight:900;color:${pctCol}">${pct}% ${pct>=90?'🔥':pct>=70?'👍':'💪'}</div>
            <div style="font-size:9px;color:#999;margin-top:1px">순공 달성률</div>
          </div>`:''}
        </div>

        <!-- 사용 교재 표시 (유지/추가 없이) -->
        ${books.length?`<div style="padding:8px 16px;background:#fafbff;border-bottom:1px solid #f0f0f8;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:700;color:#3b5bdb">📚 사용 교재</span>
          ${books.map(b=>`<span style="background:#fff;border:1.5px solid ${col}33;color:${col};border-radius:20px;padding:3px 11px;font-size:11px;font-weight:600">📖 ${esc(b)}</span>`).join('')}
        </div>`:''}

        <!-- 본문: 2열 그리드 -->
        <div style="padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px">

          <!-- ① 달성도 (전체 2열) -->
          <div style="grid-column:1/-1;background:#f4f6fb;border-radius:8px;padding:10px 12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <div style="font-size:11px;font-weight:700;color:#1a1a2e">✅ 플랜 달성도</div>
              <span style="font-size:16px;font-weight:900;color:${achPct!=null?(achPct>=80?'#0f9d58':achPct>=60?'#f59e0b':'#e53935'):'#ddd'}" id="ach_d_${esc(subj)}">${achPct!=null?achPct+'%':'–'}</span>
            </div>
            <input type="range" min="1" max="100" step="1" value="${achPct!=null?achPct:50}"
              style="width:100%;accent-color:${achPct!=null?(achPct>=80?'#0f9d58':achPct>=60?'#f59e0b':'#e53935'):'#8b5cf6'};cursor:pointer"
              oninput="event.stopPropagation();const v=+this.value;window._saveInspect('${wKey}','${esc(subj)}','achievementPct',v);const el=document.getElementById('ach_d_${esc(subj)}');if(el){el.textContent=v+'%';el.style.color=v>=80?'#0f9d58':v>=60?'#f59e0b':'#e53935';}this.style.accentColor=v>=80?'#0f9d58':v>=60?'#f59e0b':'#e53935';">
            <div style="display:flex;justify-content:space-between;font-size:9px;color:#bbb;margin-top:2px"><span>1%</span><span>100%</span></div>
          </div>

          <!-- ② 이번주 순공 -->
          <div style="background:#f4f6fb;border-radius:8px;padding:10px 12px">
            <div style="font-size:10px;font-weight:700;color:#555;margin-bottom:8px">⏱ 이번 주 순공시간</div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="background:#eef1ff;border-radius:6px;padding:5px 10px;text-align:center;flex-shrink:0">
                <div style="font-size:9px;color:#888">계획</div>
                <div style="font-size:16px;font-weight:900;color:#3b5bdb">${planned}h</div>
              </div>
              <span style="color:#ccc;font-size:12px">→</span>

                <div style="font-size:9px;color:#888;margin-bottom:3px">실제</div>

                  <input type="number" min="0" max="24" step="0.5" placeholder="0" value="${esc(actual)}"

                    style="width:55px;background:#fff;border:1.5px solid #ddd6fe;color:#1a1a2e;border-radius:7px;padding:5px 6px;font-size:15px;font-weight:700;outline:none;text-align:center">

// ── 플랜점검 인쇄 ──
function printAchieve(sid){
  const s=ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  const now0=new Date();
  const cy0=now0.getFullYear(),cm0=now0.getMonth()+1,cw0=getWeekOfMonth(cy0,cm0,now0.getDate());
  const wy=ST.weekYear||cy0,wm=ST.weekMonth||cm0,ww=ST.weekWeek||cw0;
  const wKey=getWeekNum(wy,wm,ww);
  const wLabel=getWeekLabel(wy,wm,ww);
  const now=new Date();
  const isCurrentWeek=wy===now.getFullYear()&&wm===now.getMonth()+1&&ww===getWeekOfMonth(wy,wm,now.getDate());
  const hEntry=(s.weeklyHistory||[]).find(h=>h.date&&getWeekNum(h.year,h.month,h.weekNum)===wKey);
  const _paCurKey=getWeekNum(cy0,cm0,cw0);
  const _paPlanOk=(s._planWeek||'')===_paCurKey;
  const plan=isCurrentWeek?(_paPlanOk?(s.weeklyPlan||{}):{}):(hEntry?.plan||{});
  const subjPlans=isCurrentWeek?(_paPlanOk?(s.weeklySubjPlans||{}):{}):(hEntry?.subjPlans||{});
  const bm=isCurrentWeek?(_paPlanOk?(s.weeklyBookMap||{}):{}):(hEntry?.bookMap||{});
  const stats={};Object.values(plan).forEach(x=>{stats[x]=(stats[x]||0)+1;});
  const studySubjs=Object.keys(stats).filter(x=>x!=='휴식'&&x!=='자습');
  const inspect=(s.weeklyInspect||{})[wKey]||{};
  const tots=studySubjs.reduce((a,subj)=>{const v=inspect[subj]||{};a.p+=stats[subj]||0;a.r+=(+v.actual||0);return a;},{p:0,r:0});
  const overallPct=tots.p&&tots.r?Math.round(tots.r/tots.p*100):null;

  // 시간표 미니뷰
  const usedH=[...new Set(Object.keys(plan).map(k=>+k.split('-')[1]))].filter(n=>!isNaN(n)).sort((a,b)=>a-b);
  const minH=usedH[0]??6,maxH=usedH[usedH.length-1]??23;
  const ph=[];for(let h=minH;h<=maxH;h++)ph.push(h);

  let body=`<div class="info-box" style="margin-bottom:18px">
    <div class="info-box-main">
      <div class="info-box-name">${esc(s.name)} <span style="font-size:14px;font-weight:600;color:#888">${wLabel}</span></div>
      <div class="info-box-sub">${esc(s.school)} · ${esc(s.grade)}${s.className?' · '+esc(s.className):''} · 담당: ${esc(s.counselor)}</div>
      <div class="info-box-stats">
        <div class="info-stat-item"><div class="info-stat-v">${studySubjs.length}개</div><div class="info-stat-l">총 과목</div></div>
        <div class="info-stat-item"><div class="info-stat-v">${tots.p}h</div><div class="info-stat-l">계획시간</div></div>
        <div class="info-stat-item"><div class="info-stat-v">${tots.r}h</div><div class="info-stat-l">순공시간</div></div>
        <div class="info-stat-item"><div class="info-stat-v">${overallPct!==null?overallPct+'%':'–'}</div><div class="info-stat-l">전체달성</div></div>
      </div>
    </div>
  </div>`;

  // 시간표
  if(ph.length){
    body+=`<h3>📅 주간 학습플랜</h3><div class="tt-page-safe"><table class="tt" style="margin-bottom:14px">
      <tr><th style="width:24px;font-size:8px">시간</th>${DAYS.map(d=>`<th style="${d==='토'||d==='일'?'color:#e53935':''}">${d}</th>`).join('')}</tr>
      ${ph.map(h=>`<tr><td class="th-time">${h===0?"자정":h===1?"1시":h+"시"}</td>${DAYS.map(d=>{
        const subj=plan[`${d}-${h}`];const bk=bm[`${d}-${h}`]||'';const col=subj?(SC[subj]||'#3b5bdb'):null;
        return subj?`<td style="background:${col}20;color:${col};font-weight:800;font-size:9px;border:1px solid ${col}44;padding:2px 3px;text-align:center"><div>${esc(subj)}</div>${bk?`<div style="font-size:7px;opacity:.7">📖${esc(bk)}</div>`:''}</td>`:`<td></td>`;
      }).join('')}</tr>`).join('')}
    </table></div>`;
  }

  // 과목별 점검표
  body+=`<h3>🔍 과목별 플랜 점검</h3>`;
  if(!studySubjs.length){
    body+=`<p style="color:#888;text-align:center">이 주차에 학습플랜 데이터가 없습니다.</p>`;
  } else {
    studySubjs.forEach(subj=>{
      const col=SC[subj]||'#8b5cf6';
      const planned=stats[subj]||0;
      const sp=subjPlans[subj]||{};
      const books=(sp.books||[]).filter(Boolean);
      const ins=inspect[subj]||{};
      const actual=ins.actual!==undefined&&ins.actual!==''?ins.actual:'–';
      const pct=ins.actual!==undefined&&ins.actual!==''&&planned?Math.round(+ins.actual/planned*100):null;
      const achPct=ins.achievementPct!=null?ins.achievementPct:null;
      // 다음주 난이도: nextDiffDir + nextDiffNote
      const nextDiffStr=ins.nextDiffDir||'–';
      const nextDiffNote=ins.nextDiffNote||'';
      // 다음주 분량: nextAmountDir + nextAmountVal + nextAmountUnit
      const nextAmtStr=ins.nextAmountVal!=null
        ?`${ins.nextAmountDir||''} ${ins.nextAmountVal}${ins.nextAmountUnit||'문제'}`
        :(ins.nextAmountDir||'–');
      // 다음주 학습시간: nextTimeDir + nextTimeVal
      const nextTimeStr=ins.nextTimeVal!=null
        ?`${ins.nextTimeDir||''} ${ins.nextTimeVal}h/주`
        :(ins.nextTimeDir||'–');
      // 사용교재 (표시만)
      const bookStr=books.join(', ')||'–';

      body+=`<div class="card" style="border-left:4px solid ${col};margin-bottom:12px;page-break-inside:avoid">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-size:14px;font-weight:900;color:${col}">${esc(subj)}</div>
          ${pct!==null?`<span style="font-size:13px;font-weight:900;color:${pct>=90?'#0f9d58':pct>=70?'#e37400':'#c5221f'}">${pct}% ${pct>=90?'🔥':pct>=70?'👍':'💪'}</span>`:''}
        </div>
        <table style="margin-bottom:0">
          <tr><th style="width:80px">항목</th><th>이번 주 점검</th><th>다음 주 계획</th></tr>
          <tr>
            <td class="lbl">사용 교재</td>
            <td>${esc(bookStr)}</td>
            <td>–</td>
          </tr>
          <tr>
            <td class="lbl">플랜 달성도</td>
            <td>${achPct!=null?achPct+'%':'–'}</td>
            <td>–</td>
          </tr>
          <tr>
            <td class="lbl">순공시간</td>
            <td>계획 ${planned}h → 실제 ${actual}${actual!=='–'?'h':''} ${pct!==null?'('+pct+'%)':''}</td>
            <td>${esc(nextTimeStr)}</td>
          </tr>
          <tr>
            <td class="lbl">난이도</td>
            <td>${ins.difficulty||'–'}</td>
            <td>${esc(nextDiffStr)}${nextDiffNote?' · '+esc(nextDiffNote):''}</td>
          </tr>
          <tr>
            <td class="lbl">분량</td>
            <td>${ins.amount||'–'}</td>
            <td>${esc(nextAmtStr)}</td>
          </tr>
          <tr>
            <td class="lbl">특이사항</td>
            <td colspan="2" style="color:#444;line-height:1.6">${esc(ins.note||'')}</td>
          </tr>
        </table>
      </div>`;
    });

    if(overallPct!==null){
      body+=`<div style="background:#f5f3ff;border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border:1.5px solid #ddd6fe">
        <strong style="color:#6d28d9">📊 전체 순공 달성률</strong>
        <span style="font-size:18px;font-weight:900;color:${overallPct>=90?'#0f9d58':overallPct>=70?'#e37400':'#c5221f'}">${overallPct}%</span>
      </div>`;
    }
  }
  popPrint(`${s.name} - ${wLabel} 플랜점검`, body, {weekLabel: wLabel, year: wy, month: wm, week: ww});
}

function exportAchieveXls(sid){
  const s=ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  const wy=ST.weekYear,wm=ST.weekMonth,ww=ST.weekWeek;
  const wKey=getWeekNum(wy,wm,ww);
  const wLabel=getWeekLabel(wy,wm,ww);
  const now=new Date();
  const isCurrentWeek=wy===now.getFullYear()&&wm===now.getMonth()+1&&ww===getWeekOfMonth(wy,wm,now.getDate());
  const hEntry=(s.weeklyHistory||[]).find(h=>h.date&&getWeekNum(h.year,h.month,h.weekNum)===wKey);
  const _exNow=new Date();
  const _exCy=_exNow.getFullYear(),_exCm=_exNow.getMonth()+1,_exCw=getWeekOfMonth(_exCy,_exCm,_exNow.getDate());
  const _exCurKey=getWeekNum(_exCy,_exCm,_exCw);
  const _exPlanOk=(s._planWeek||'')===_exCurKey;
  const plan=isCurrentWeek?(_exPlanOk?(s.weeklyPlan||{}):{}):(hEntry?.plan||{});
  const subjPlans=isCurrentWeek?(_exPlanOk?(s.weeklySubjPlans||{}):{}):(hEntry?.subjPlans||{});
  const stats={};Object.values(plan).forEach(x=>{stats[x]=(stats[x]||0)+1;});
  const studySubjs=Object.keys(stats).filter(x=>x!=='휴식'&&x!=='자습');
  const inspect=(s.weeklyInspect||{})[wKey]||{};

  let c=`학생,${s.name}\r\n주차,${wLabel}\r\n담당,${s.counselor}\r\n점검일,${td()}\r\n\r\n`;
  c+=`과목,사용교재,계획(h),실제순공(h),순공달성률(%),플랜달성도(%),이번주난이도,다음주난이도,다음난이도메모,이번주분량,다음주분량방향,다음분량값,다음분량단위,다음주학습시간방향,다음학습시간(h),특이사항\r\n`;
  studySubjs.forEach(subj=>{
    const planned=stats[subj]||0;
    const sp=subjPlans[subj]||{};
    const books=(sp.books||[]).filter(Boolean).join('+');
    const ins=inspect[subj]||{};
    const actual=ins.actual!==undefined&&ins.actual!==''?ins.actual:'';
    const pct=actual!==''&&planned?Math.round(+actual/planned*100):'';
    c+=[
      subj,
      books,
      planned,
      actual,
      pct,
      ins.achievementPct!=null?ins.achievementPct:'',
      ins.difficulty||'',
      ins.nextDiffDir||'',
      (ins.nextDiffNote||'').replace(/,/g,' '),
      ins.amount||'',
      ins.nextAmountDir||'',
      ins.nextAmountVal!=null?ins.nextAmountVal:'',
      ins.nextAmountUnit||'',
      ins.nextTimeDir||'',
      ins.nextTimeVal!=null?ins.nextTimeVal:'',
      (ins.note||'').replace(/,/g,' ')
    ].join(',')+'\r\n';
  });
  csv_dl(c,`${s.name}_${wLabel}_플랜점검`);
}



// ── 이력 엑셀 ──
function exportHistoryXls(sid){
  const s=ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  const fy=ST.histFilterYear||new Date().getFullYear();
  const fm=ST.histFilterMonth;
  const fw=ST.histFilterWeek;
  const history=(s.weeklyHistory||[]).filter(h=>{
    if(h.year!==fy) return false;
    if(fm&&h.month!==fm) return false;
    if(fw&&h.weekNum!==fw) return false;
    return true;
  }).sort((a,b)=>a.date.localeCompare(b.date));

  let c=`학생,${s.name}\r\n학년,${s.grade}\r\n담당,${s.counselor}\r\n\r\n주차,날짜,과목,시간(h),비율(%)\r\n`;
  history.forEach(h=>{
    const hStats={};Object.values(h.plan||{}).forEach(x=>{hStats[x]=(hStats[x]||0)+1;});
    const tot=Object.values(hStats).reduce((a,v)=>a+v,0);
    Object.entries(hStats).forEach(([subj,hrs])=>{
      c+=`${h.label},${h.date},${subj},${hrs},${tot?Math.round(hrs/tot*100):0}\r\n`;
    });
  });
  csv_dl(c,`${s.name}_주간이력`);
}

  const isCurrentWeek=(wy===cy0&&wm===cm0&&ww===cw0);

  const wLabel=getWeekLabel(wy,wm,ww);

  // 현재 주차면 weeklyPlan, 이전 주차면 이력에서

  const _pw=s._planWeek||'';

  const plan=isCurrentWeek?(planOk?(s.weeklyPlan||{}):{}):(hEntry&&hEntry.plan||{});
  const bm=isCurrentWeek?(planOk?(s.weeklyBookMap||{}):{}):(hEntry&&hEntry.bookMap||{});

  const stats={};Object.values(plan).forEach(x=>{stats[x]=(stats[x]||0)+1;});

    return`<div style="background:#fff;border-radius:13px;padding:14px;margin-bottom:12px;border:1.5px solid #e8eaf6;border-top:3px solid ${col}">

          <div>
            <div style="font-size:14px;font-weight:800">${esc(subj)}</div>
            <div style="font-size:10px;color:#777">주간 ${hrs}h 배정${sp.weeklyHours?` / 목표 ${sp.weeklyHours}h`:''}</div>
          </div>
        </div>
        <button onclick="openSubjModal('${esc(subj)}')" style="background:${col};color:#fff;border:none;border-radius:7px;padding:6px 13px;font-size:11px;font-weight:700">${sp.weeklyHours||books.length?'✏️ 수정':'+ 조건 입력'}</button>
      </div>

              </div>
            </div>`)([lv,c,pct]);
          }).join('')}

      ${(sp.units||[]).filter(Boolean).length?`<div style="margin-bottom:7px;font-size:10px;color:#777">
        📖 <span style="font-weight:600">학습 단원</span>

}

          <button id="sp_aq" onclick="this.style.background='#3b5bdb';this.style.color='#fff';document.getElementById('sp_ap').style.background='#f4f6fb';document.getElementById('sp_ap').style.color='#888'"
            style="flex:1;background:${(sp.amountType||'문제수')==='문제수'?'#3b5bdb':'#f4f6fb'};color:${(sp.amountType||'문제수')==='문제수'?'#fff':'#888'};border:1.5px solid ${(sp.amountType||'문제수')==='문제수'?'#3b5bdb':'#e8eaf6'};border-radius:7px;padding:6px 4px;font-size:10px;font-weight:600">문제수</button>
          <button id="sp_ap" onclick="this.style.background='#3b5bdb';this.style.color='#fff';document.getElementById('sp_aq').style.background='#f4f6fb';document.getElementById('sp_aq').style.color='#888'"
            style="flex:1;background:${(sp.amountType||'문제수')==='페이지'?'#3b5bdb':'#f4f6fb'};color:${(sp.amountType||'문제수')==='페이지'?'#fff':'#888'};border:1.5px solid ${(sp.amountType||'문제수')==='페이지'?'#3b5bdb':'#e8eaf6'};border-radius:7px;padding:6px 4px;font-size:10px;font-weight:600">페이지</button>

    </div>

    <!-- 난이도 (최상/상/중/하 순, 합계 100% 연동 제한) -->
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:11px;color:#777;font-weight:600">⭐ 난이도별 비율 <span style="font-size:9px;font-weight:400">(합계 100%)</span></div>
        <span id="sp_diff_total" style="font-size:11px;font-weight:700;color:${(()=>{const d=sp.difficultyMap||{최상:0,상:0,중:0,하:0};const tot=Object.values(d).reduce((a,v)=>a+(+v||0),0);return tot===100?'#0f9d58':tot>100?'#e53935':'#f59e0b';})()}">${(()=>{const d=sp.difficultyMap||{최상:0,상:0,중:0,하:0};return Object.values(d).reduce((a,v)=>a+(+v||0),0);})()}%</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${[['최상','#8b5cf6'],['상','#ef4444'],['중','#f59e0b'],['하','#10b981']].map(([lv,c],idx)=>{
          const dm=sp.difficultyMap||{최상:0,상:0,중:0,하:0};
          const val=dm[lv]??0;
          const allLevels=['최상','상','중','하'];
          // 현재 레벨의 max = 100 - 앞 레벨들의 합
          const prevSum=allLevels.slice(0,idx).reduce((a,k)=>a+(dm[k]||0),0);
          const maxVal=Math.max(0,100-prevSum);
          return`<div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="font-size:12px;font-weight:800;color:${c}">${lv}</span>
              <span id="sp_dv_${lv}" style="font-size:12px;font-weight:700;color:${c}">${val}%</span>
            </div>
            <input type="range" min="0" max="${maxVal}" step="5" value="${Math.min(val,maxVal)}"
              style="width:100%;accent-color:${c};cursor:pointer;height:6px"
              data-dlv="${lv}"
              oninput="
                const allLvs=['최상','상','중','하'];
                const myIdx=allLvs.indexOf('${lv}');
                const v=+this.value;
                document.getElementById('sp_dv_${lv}').textContent=v+'%';
                document.getElementById('sp_dbar2_${lv}').style.width=v+'%';
                document.getElementById('sp_dbar2_${lv}').style.background=v>0?'${c}':'#e8eaf6';
                // 남은 % 계산 → 이후 슬라이더 max 제한
                let used=0;
                for(let i=0;i<=myIdx;i++){
                  const el=document.querySelector('[data-dlv='+allLvs[i]+']');
                  if(el) used+=+el.value;
                }
                let remaining=100-used;
                for(let i=myIdx+1;i<allLvs.length;i++){
                  const sl=document.querySelector('[data-dlv='+allLvs[i]+']');
                  if(!sl) continue;
                  const newMax=Math.max(0,remaining);
                  sl.max=newMax;
                  if(+sl.value>newMax){sl.value=newMax;document.getElementById('sp_dv_'+allLvs[i]).textContent=newMax+'%';document.getElementById('sp_dbar2_'+allLvs[i]).style.width=newMax+'%';}
                  remaining-=Math.min(+sl.value,newMax);
                }
                // 합계 갱신
                let tot=allLvs.reduce((a,k)=>{const el=document.querySelector('[data-dlv='+k+']');return a+(el?+el.value:0);},0);
                const totEl=document.getElementById('sp_diff_total');
                if(totEl){totEl.textContent=tot+'%';totEl.style.color=tot===100?'#0f9d58':tot>100?'#e53935':'#f59e0b';}
              ">
            <div style="background:#e8eaf6;border-radius:3px;height:8px;margin-top:4px;overflow:hidden">
              <div id="sp_dbar2_${lv}" style="height:100%;border-radius:3px;background:${val>0?c:'#e8eaf6'};width:${Math.min(val,maxVal)}%;transition:width .1s"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- 선생님 메모 -->
    <div style="margin-bottom:18px">
      <div style="font-size:11px;color:#777;margin-bottom:4px;font-weight:600">📝 선생님 메모</div>
      <textarea id="sp_memo" class="inp" rows="2" style="resize:none" placeholder="학습 방향, 학부모 전달사항 등">${esc(sp.memo||'')}</textarea>
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-g" onclick="this.closest('.overlay').remove()">취소</button>
      <button style="background:${col};color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer" onclick="
        const wh=document.getElementById('sp_wh').value;
        const dh=document.getElementById('sp_dh').value;
        const books=Array.from({length:window._books.length},(v,i)=>document.getElementById('sp_book_'+i)?.value?.trim()||'').filter(Boolean);
        const units=document.getElementById('sp_units').value.split(',').map(x=>x.trim()).filter(Boolean);
        const isPage=document.getElementById('sp_ap')?.style.background.includes('rgb(59')||document.getElementById('sp_ap')?.style.color==='rgb(255, 255, 255)';
        const typeMap=['과제학습','셀프학습','인터넷강의','직접입력'];
        const selType=typeMap.find((_,i)=>{const el=document.getElementById('sp_t'+i);return el&&(el.style.background.includes('rgb')||el.style.color==='rgb(255, 255, 255)');}) || '셀프학습';
        const typeDetail=selType==='직접입력'?(document.getElementById('sp_direct_text')?.value||''):'';
        const diffSlVal=0;
        const selDiff='';
        const difficultyMap={};
        ['최상','상','중','하'].forEach(lv=>{
          const el=document.querySelector('[data-dlv='+lv+']');
          difficultyMap[lv]=el?+el.value:0;
        });
        const av=document.getElementById('sp_av').value;
        const memo=document.getElementById('sp_memo').value;
        const newSp={subj:'${esc(subj)}',weeklyHours:wh,dailyHours:dh,books,units,type:selType,typeDetail,difficultyMap,amountType:isPage?'페이지':'문제수',amountVal:av,memo};
        const stu=ST.sel||ST.adminSel;
        // 교재 첫 번째 항목으로 weeklyBookMap 동기화
        const _newBm = Object.assign({}, stu.weeklyBookMap||{});
        const _planNow = stu.weeklyPlan||{};
        const _firstBook = books[0]||'';
        // 현재 플랜에서 이 과목이 배정된 모든 셀에 교재 적용
        Object.keys(_planNow).forEach(function(k){ if(_planNow[k]==='${esc(subj)}'){ if(_firstBook)_newBm[k]=_firstBook; else delete _newBm[k]; } });
        upd({...stu, weeklySubjPlans:{...(stu.weeklySubjPlans||{}),'${esc(subj)}':newSp}, weeklyBookMap:_newBm});
        this.closest('.overlay').remove();
      ">💾 저장</button>
    </div>
  </div></div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

function saveConsult(sid){
  const ctype = document.getElementById('c_type')?.value||'기타';
  const date = document.getElementById('c_date')?.value;
  const counselor = document.getElementById('c_counselor')?.value;
  const topic = document.getElementById('c_topic')?.value?.trim();
  const memo = document.getElementById('c_memo')?.value?.trim();
  if(!ctype||ctype===''){alert('상담 유형을 선택해주세요.');return;}
  if(!topic){alert('상담 주제를 입력해주세요.');return;}
  if(!memo){alert('상담 내용을 입력해주세요.');return;}
  const aiAnalysis = document.getElementById('ai_consult_result')?.textContent?.trim()||'';
  const s = ST.students.find(x=>String(x.id)===String(sid));
  upd({...s, consultations:[...(s.consultations||[]),{date,counselor,topic,memo,ctype,aiAnalysis}]});
  ST.consultAdding = null;
}

function updateConsult(sid, idx){
  const ctype = document.getElementById(`ce_type_${idx}`)?.value||'기타';
  const date = document.getElementById(`ce_date_${idx}`)?.value;
  const counselor = document.getElementById(`ce_counselor_${idx}`)?.value;
  const topic = document.getElementById(`ce_topic_${idx}`)?.value?.trim();
  const memo = document.getElementById(`ce_memo_${idx}`)?.value?.trim();
  if(!topic||!memo){alert('주제와 내용을 입력해주세요.');return;}
  const s = ST.students.find(x=>String(x.id)===String(sid));
  const newList = s.consultations.map((c,i)=>i===idx?{...c,date,counselor,topic,memo,ctype}:c);
  upd({...s, consultations:newList});
  ST.consultEditId = null;
}

// AI 상담 분석
async function runAiConsultAnalysis(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid));
  if(!s) return;
  const topic = document.getElementById('c_topic')?.value?.trim();
  const memo = document.getElementById('c_memo')?.value?.trim();
  const ctype = document.getElementById('c_type')?.value||'기타';
  if(!topic||!memo){alert('상담 주제와 내용을 먼저 입력해주세요.');return;}
  const apiKey=(window.ANTHROPIC_API_KEY||window._sharedApiKey||localStorage.getItem('apiKey')||'').trim();
  if(!apiKey){alert('API 키를 먼저 설정해주세요.');return;}
  const el = document.getElementById('ai_consult_result');
  if(el) el.textContent='⏳ AI 분석 중...';
  const prompt=`학원 상담 기록을 분석해주세요.

학생: ${s.name} (${s.grade}, ${s.school})
상담 유형: ${ctype}
상담 주제: ${topic}
상담 내용: ${memo}

아래 항목으로 간결하게 분석해주세요 (총 200자 이내):
1. 핵심 파악: 학생의 주요 상황
2. 주요 이슈: 개선이 필요한 점
3. 권장 조치: 다음 상담 전 실행 사항`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = data.content?.[0]?.text||'분석 실패';
    if(el) el.textContent = text;
  }catch(e){
    if(el) el.textContent = '오류: '+e.message;
  }
}

    const _planOk=(s._planWeek||'')=== _curKey;
    // 플랜/교재맵/과목플랜: 현재 주차(planOk일때만) or 이력
    const plan = _printIsCurrentWeek ? (_planOk?(s.weeklyPlan||{}):{}) : ((_printHEntry&&_printHEntry.plan)||{});
    const _printBm = _printIsCurrentWeek ? (_planOk?(s.weeklyBookMap||{}):{}) : ((_printHEntry&&_printHEntry.bookMap)||{});
    const sp = _printIsCurrentWeek ? (_planOk?(s.weeklySubjPlans||{}):{}) : ((_printHEntry&&_printHEntry.subjPlans)||{});
    const ws = {}; Object.values(plan).forEach(x=>{ws[x]=(ws[x]||0)+1;});
    const wt = Object.values(plan).length;
    const studyT = Object.entries(ws).filter(([x])=>x!=='휴식').reduce((a,[,v])=>a+v,0);
    const achieve = (s.weeklyAchieve||{})[wKey]||{};

    // ── 1. 통계 요약 ──
    const sortedHist2=(s.weeklyHistory||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
    const curH2=sortedHist2.find(h=>getWeekNum(h.year,h.month,h.weekNum)===wKey);
    let prevTotal2=null;
    if(curH2){
      const prevList=sortedHist2.filter(h=>h.date<curH2.date);
      if(prevList.length>0) prevTotal2=Object.values(prevList[prevList.length-1].plan||{}).length;
    } else if(sortedHist2.length>0){
      prevTotal2=Object.values(sortedHist2[sortedHist2.length-1].plan||{}).length;
    }
    body += `<h3>📅 주간 플랜 · ${wLabel}</h3>
    <div class="g3" style="margin-bottom:14px">
      ${[
        ['총 시간',  wt+'h',  '#3b5bdb'],
        ['일 평균',  Math.round(wt/7)+'h','#e37400'],
        ['지난주 총',prevTotal2!==null?prevTotal2+'h':'–','#888'],
      ].map(([l,v,c])=>`<div class="stat"><div class="sv" style="color:${c}">${v}</div><div class="sl">${l}</div></div>`).join('')}
    </div>`;

    // ── 2. 과목별 시간 배분 바 차트 ──
    if(Object.keys(ws).length){
      body += `<div style="margin-bottom:16px">`;
      Object.entries(ws).sort((a,b)=>b[1]-a[1]).forEach(([subj,hrs])=>{
        const col=SC[subj]||'#3b5bdb'; const pct=wt?Math.round(hrs/wt*100):0;
        body+=`<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:${col};font-weight:700">${esc(subj)}</span><span style="color:#555">${hrs}h (${pct}%)</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div></div>`;
      });
      body += `</div>`;
    }

    // ── 2-1. 과목별 사용 교재 (plan에 있는 과목만) ──
    // plan에 실제 배정된 과목 집합 (휴식·자습 제외)
    const _bPlanSubjs = new Set(Object.values(plan).filter(v=>v&&v!=='휴식'&&v!=='자습'));
    const bookEntries = Object.entries(sp)
      .map(([k,v])=>[k,{...(v||{}),subj:(v?.subj||k)}])
      .filter(([,p])=>p.subj && _bPlanSubjs.has(p.subj) && (p.books||[]).filter(Boolean).length > 0);
    // 시간표 셀 개별 교재도 수집 (plan에 있는 과목만)
    const bm = _printBm;
    const cellBookMap = {}; // 과목 → Set(교재)
    Object.entries(bm).forEach(([k,b])=>{
      const subj = plan[k];
      if(subj && b && _bPlanSubjs.has(subj)){ if(!cellBookMap[subj]) cellBookMap[subj]=new Set(); cellBookMap[subj].add(b); }
    });
    // allBookSubjs: plan에 있는 과목 중 교재가 있는 것만
    const allBookSubjs = [..._bPlanSubjs].filter(subj=>
      (sp[subj]?.books||[]).filter(Boolean).length > 0 || cellBookMap[subj]?.size > 0
    );

    if(allBookSubjs.length){
      body += `<h3>📚 과목별 사용 교재</h3>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
        ${allBookSubjs.map(subj=>{
          const spData = sp[subj]||{};
          const regBooks = (spData.books||[]).filter(Boolean);
          const cellBooks = [...(cellBookMap[subj]||[])].filter(b=>!regBooks.includes(b));
          const col = SC[subj]||'#3b5bdb';
          return `<div style="background:#f8fafc;border-radius:8px;padding:10px 12px;border:1.5px solid #e2e8f0;border-top:3px solid ${col}">
            <div style="font-size:12px;font-weight:800;color:${col};margin-bottom:7px">${esc(subj)}</div>
            ${regBooks.map(b=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:11px;color:#333">
              <span style="color:${col};font-size:9px">●</span> ${esc(b)}
            </div>`).join('')}
            ${cellBooks.map(b=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:10px;color:#888">
              <span style="font-size:9px">○</span> ${esc(b)} <span style="font-size:8px">(개별)</span>
            </div>`).join('')}
            ${!regBooks.length&&!cellBooks.length?`<div style="font-size:10px;color:#bbb">미등록</div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    }

    // ── 3. 주간 시간표 (타임테이블) ──
    const usedHours = Object.keys(plan).map(k=>+k.split('-')[1]).filter(h=>!isNaN(h));
    if(usedHours.length){
      const minH = Math.min(...usedHours);
      const maxH = Math.max(...usedHours);
      const printH = [];
      for(let h=minH; h<=maxH; h++) printH.push(h);

      body += `<h3>📋 주간 학습플랜</h3>
      <div class="tt-wrap tt-page-safe">
        <table class="tt">
          <tr>
            <th style="width:28px;font-size:8px">시간</th>
            ${DAYS.map(d=>`<th style="${d==='토'||d==='일'?'color:#e53935':''}">${d}</th>`).join('')}
          </tr>
          ${printH.map(h=>`<tr>
            <td class="th-time">${h===0?"자정":h===1?"1시":h+"시"}</td>
            ${DAYS.map(d=>{
              const subj=plan[`${d}-${h}`];
              const cellBook=_printBm[`${d}-${h}`]||
                (sp[subj]?.books||[]).filter(Boolean)[0]||'';
              const col=subj?(SC[subj]||'#3b5bdb'):null;
              const isSat=d==='토'||d==='일';
              if(!subj) return`<td style="${isSat?'background:#fff9f9':''}"></td>`;
              return`<td style="background:${col}20;border:1px solid ${col}44;padding:2px 3px;vertical-align:middle">
                <div style="font-weight:800;font-size:9px;color:${col};line-height:1.4;text-align:center">${esc(subj)}</div>
                ${cellBook?`<div style="font-size:8px;color:${col};opacity:.8;text-align:center;border-top:1px solid ${col}33;padding-top:1px;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:52px">📖 ${esc(cellBook)}</div>`:''}
              </td>`;
            }).join('')}
          </tr>`).join('')}
        </table>
      </div>`;
    } else {
      body += `<div style="padding:14px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;text-align:center;color:#888;font-size:12px;margin-bottom:14px">학습플랜 데이터가 없습니다</div>`;
    }

    // ── 4. 과목별 학습 조건 (plan에 존재하고 실제 데이터 있는 과목만) ──
    const _planSubjs = new Set(Object.values(plan).filter(v=>v&&v!=='휴식'&&v!=='자습'));
    // sp의 키가 과목명, 값에 subj 필드가 없는 구버전 데이터도 처리
    const spEntries = Object.entries(sp)
      .map(([k,v])=>({...(v||{}), subj: v?.subj||k}))
      .filter(p=>
        p.subj                                                   // 과목명 존재
        && _planSubjs.has(p.subj)                                // 이번 주 플랜에 있는 과목
        && (                                                     // 실제 입력된 데이터 최소 1개 이상
          (p.books||[]).filter(Boolean).length > 0
          || (p.weeklyHours && +p.weeklyHours > 0)
          || (p.dailyHours && +p.dailyHours > 0)
          || (p.type && p.type !== '미설정')
          || (p.units||[]).filter(Boolean).length > 0
          || p.memo
          || (p.amountVal && +p.amountVal > 0)
          || p.difficultyMap
        )
      );
    if(spEntries.length){
      body += `<h3>📚 과목별 학습 조건</h3>`;
      spEntries.forEach(p=>{
        const col=SC[p.subj]||'#3b5bdb';
        const dm=p.difficultyMap||null;
        const typeText=p.type||'미설정';
        const typeDisplay=typeText==='직접입력'&&p.typeDetail?`직접입력: ${p.typeDetail}`:typeText;
        body += `<div class="card" style="border-left:4px solid ${col};margin-bottom:10px">
          <div style="font-size:13px;font-weight:800;color:${col};margin-bottom:8px">${esc(p.subj)}</div>
          <div class="cond-grid">
            ${[
              ['주간 목표', p.weeklyHours?p.weeklyHours+'h/주':'미설정'],
              ['일일 목표', p.dailyHours?p.dailyHours+'h/일':'미설정'],
              ['학습 형태', typeDisplay],
              ['분량', p.amountVal?(p.amountVal+(p.amountType==='문제수'?'문제':'p')):'미설정'],
              ['교재', (p.books||[]).filter(Boolean).join(', ')||'미설정'],
              ['단원', (p.units||[]).filter(Boolean).join(', ')||'미설정'],
            ].map(([l,v])=>`<div class="cond-item"><div class="cond-label">${l}</div><div class="cond-val">${esc(v)}</div></div>`).join('')}
          </div>
          ${dm?`<div style="margin-top:8px">
            <div style="font-size:9px;color:#888;font-weight:600;margin-bottom:4px">⭐ 난이도별 비율</div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">
              ${[['최상','#8b5cf6'],['상','#ef4444'],['중','#f59e0b'],['하','#10b981']].map(([lv,c])=>{
                const pct=dm[lv]||0;
                return (([lv2,c2,pct2])=>`<div>
                  <div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:2px">
                    <span style="font-weight:700;color:${c2}">${lv2}</span><span style="color:#555;font-weight:600">${pct2}%</span>
                  </div>
                  <div style="background:#e2e8f0;border-radius:2px;height:6px">
                    <div style="height:100%;border-radius:2px;background:${pct2>0?c2:'#e2e8f0'};width:${pct2}%"></div>
                  </div>
                </div>`)([lv,c,pct]);
              }).join('')}
            </div>
          </div>`:''}
          ${p.memo?`<div style="margin-top:8px;padding:7px 9px;background:#fff;border-radius:5px;border-left:3px solid ${col};font-size:11px;color:#444;line-height:1.6">${esc(p.memo)}</div>`:''}
        </div>`;
      });
    }
  } else if(tab==='consult'){
    const CCOLORS3={'입학상담':'#3b82f6','학습상담':'#10b981','성적상담':'#f59e0b','입시상담':'#8b5cf6','퇴원상담':'#ef4444','기타':'#64748b'};
    const consultList=(s.consultations||[]);
    const cardsHtml=consultList.map(c=>{
      const cc=CCOLORS3[c.ctype]||'#334155';
      return`<div style="margin-bottom:14px;border-left:4px solid ${cc};border-radius:0 8px 8px 0;overflow:hidden;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)">
        <div style="background:linear-gradient(135deg,${cc},${cc}cc);color:#fff;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="background:rgba(255,255,255,.25);border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700">${esc(c.ctype||'기타')}</span>
            <strong style="font-size:13px">${esc(c.topic)}</strong>
          </div>
          <div style="font-size:9px;color:rgba(255,255,255,.8);white-space:nowrap">📅 ${c.date}</div>
        </div>
        <div style="background:${cc}18;padding:5px 14px;display:flex;gap:10px;align-items:center;font-size:9px;border-bottom:1px solid ${cc}22">
          <span style="font-weight:700;color:${cc}">${esc(s.name)}</span>
          <span style="color:#666">${esc(s.school)} · ${esc(s.grade)}${s.className?' · '+esc(s.className):''}</span>
          <span style="color:#666">담당: ${esc(c.counselor)}</span>
        </div>
        <div style="padding:10px 14px">
          <div style="font-size:11px;font-weight:700;color:#333;margin-bottom:4px">상담 내용</div>
          <div style="font-size:11px;line-height:1.8;white-space:pre-wrap;background:#f4f6fb;border-radius:6px;padding:10px;margin-bottom:${c.aiAnalysis?'8px':'0'}">${esc(c.memo)}</div>
          ${c.aiAnalysis?`<div style="font-size:11px;font-weight:700;color:#7c3aed;margin-bottom:4px">상담 상세 내용</div><div style="font-size:11px;line-height:1.8;white-space:pre-wrap;background:#f5f3ff;border-radius:6px;padding:10px">${esc(c.aiAnalysis)}</div>`:''}
        </div>
      </div>`;
    }).join('');

    // popPrint로 통일
    const consultBody = `<div class="info-box" style="margin-bottom:18px">
      <div class="info-box-main">
        <div class="info-box-name">${esc(s.name)} 상담이력</div>
        <div class="info-box-sub">${esc(s.school)} · ${esc(s.grade)}${s.className?' · '+esc(s.className):''} · 담당: ${esc(s.counselor)}</div>
        <div style="font-size:10px;color:#888;margin-top:6px">총 ${consultList.length}건</div>
      </div>
    </div>
    <h3>💬 상담 이력 (${consultList.length}건)</h3>
    ${cardsHtml}`;
    popPrint(`${s.name} - 상담이력`, consultBody, {year: new Date().getFullYear(), month: new Date().getMonth()+1});
    return;
  }
  const _tabLabel = ({susi:'수시분석',weekly:'주간플랜',consult:'상담이력'}[tab]||tab);
  const _tabOpts = tab==='weekly'
    ? (()=>{
        const _now2=new Date();
        const _cy2=_now2.getFullYear(),_cm2=_now2.getMonth()+1;
        const _cw2=getWeekOfMonth(_cy2,_cm2,_now2.getDate());
        const _wy2=(ST.weekYear!=null&&ST.weekYear!==undefined)?ST.weekYear:_cy2;
        const _wm2=(ST.weekMonth!=null&&ST.weekMonth!==undefined)?ST.weekMonth:_cm2;
        const _ww2=(ST.weekWeek!=null&&ST.weekWeek!==undefined&&ST.weekWeek!==0)?ST.weekWeek:_cw2;
        return {weekLabel:_wy2+'년 '+_wm2+'월 '+_ww2+'주차', year:_wy2, month:_wm2, week:_ww2};
      })()
    : {};
  popPrint(`${s.name} - ${_tabLabel} 리포트`, body, _tabOpts);
}

window._saveSForm = function(sid){
  const name  = document.getElementById('sf_n')?.value?.trim();
  const school= document.getElementById('sf_s')?.value?.trim();
  if(!name||!school){alert('이름과 학교는 필수입니다.');return;}
  const existing = sid ? ST.students.find(x=>String(x.id)===String(sid)) : null;
  // 추가 과목 이름 최신화
  const finalExtra = _sfExtraSubjs.map((lb,i)=>
    document.getElementById(`sf_extra_name_${i}`)?.value?.trim()||lb
  ).filter(Boolean);

  const subjects = {
    korean:  (()=>{const v=document.getElementById('sf_korean')?.value?.trim();return v!==''&&v!==undefined?+v:(existing?.subjects?.korean??null);})(),
    math:    (()=>{const v=document.getElementById('sf_math')?.value?.trim();return v!==''&&v!==undefined?+v:(existing?.subjects?.math??null);})(),
    english: (()=>{const v=document.getElementById('sf_english')?.value?.trim();return v!==''&&v!==undefined?+v:(existing?.subjects?.english??null);})(),
    science: (()=>{const v=document.getElementById('sf_science')?.value?.trim();return v!==''&&v!==undefined?+v:(existing?.subjects?.science??null);})(),
    social:  (()=>{const v=document.getElementById('sf_social')?.value?.trim();return v!==''&&v!==undefined?+v:(existing?.subjects?.social??null);})(),
  };

  // 추가 과목 등급 → gradeDetail로 저장 (1-1 학기에 대표 등급 저장)
  const gradeDetailPatch = {};
  finalExtra.forEach((lb,i)=>{
    const v = document.getElementById(`sf_extra_grade_${i}`)?.value;
    if(v && v!=='-' && v!==''){
      gradeDetailPatch[lb] = {'1-1': v};
    }
  });

  const baseInfo = {
    name, school,
    grade:     document.getElementById('sf_g')?.value||'고3',
    phone:     document.getElementById('sf_p')?.value||'',
    // 선생님 계정이면 본인 이름 자동 설정, 아니면 폼 값 사용
    counselor: ST.currentUser?.role==='teacher'
      ? ST.currentUser.name
      : (document.getElementById('sf_c')?.value||''),  // 빈 값 = 미정
    // teacherId: counselor 선생님의 id 저장 (이름 변경 추적용)
    teacherId: (()=>{
      const cVal = ST.currentUser?.role==='teacher'
        ? ST.currentUser.name
        : (document.getElementById('sf_c')?.value||'');
      const tc = ST.teachers.find(t=>t.name===cVal);
      return tc ? String(tc.id) : (existing?.teacherId||null);
    })(),
    className: document.getElementById('sf_cls')?.value?.trim()||'',
    studentLoginId: document.getElementById('sf_lid')?.value?.trim()||existing?.studentLoginId||'',
    studentPassword: document.getElementById('sf_lpw')?.value?.trim()||existing?.studentPassword||'',
    extraSubjs: finalExtra,
    // ※ subjects는 baseInfo에 포함하지 않음 - 성적은 성적 입력 폼에서만 수정
  };

  if(sid){
    // ── 수정 모드: 기존 데이터 유지, 변경된 항목만 덮어씀 ──
    const prev = ST.students.find(x=>String(x.id)===String(sid));
    if(!prev) return;
    // gradeDetail: 기존 것에 새 추가 과목 등급 병합
    const mergedGD = {...(prev.gradeDetail||{})};
    Object.entries(gradeDetailPatch).forEach(([lb,v])=>{
      if(!mergedGD[lb]) mergedGD[lb] = v;
      else mergedGD[lb] = {...mergedGD[lb], ...v};
    });
    // subjects는 건드리지 않음 (성적 입력 폼에서만 수정)
    const updated = {...prev, ...baseInfo, subjects: prev.subjects||{korean:null,math:null,english:null,science:null,social:null}, gradeDetail: mergedGD};
    ST.students = ST.students.map(x=>String(x.id)===String(sid)?updated:x);
    ST.sel = updated;
  } else {
    // ── 신규 등록: 모든 데이터 기본값으로 초기화 ──
    // orgId: 기관관리자/선생님 계정이면 본인 기관 ID 사용
    const newOrgId = ST.currentOrg?.id || ST.currentUser?.orgId || null;
    const newOrgName = ST.currentOrg?.name || ST.currentUser?.orgName || null;
    const ns = {
      id: Date.now(),
      ...baseInfo,
      orgId:   newOrgId,
      orgName: newOrgName,
      // 성적 데이터 - 신규 등록 시 null (입력 전까지 - 표시)
      subjects: {korean:null,math:null,english:null,science:null,social:null},
      gradeDetail:    gradeDetailPatch,
      mockGrades:     {},
      mockMemo:       '',
      // 수시 데이터
      targets:        [],
      bookScore:      0,
      // 주간 플랜
      weeklyPlan:     {},
      weeklySubjPlans:{},
      weeklyStrategy: '',
      // 상담
      consultations:  [],
      // 아바타
      avatar: name[0]||'?',
      color:  ABG[ST.students.length % ABG.length],
    };
    ST.students = [...ST.students, ns];
    ST.sel = ns;
    ST.tab = 'overview';
  }

  // Firebase에 즉시 저장 (신규/수정 모두)
  if(FB_USE()){
    const targetStudent = ST.students.find(x=>String(x.id)===String(sid||ST.sel?.id));
    if(targetStudent) fbSave('students', targetStudent.id, targetStudent);
  }
  save();
  document.querySelector('.sform-overlay')?.remove();
  render();
};

function copyPrevWeekPlan(sid, wy, wm, ww){
  var s=ST.students.find(function(x){return String(x.id)===String(sid);});
  if(!s){return;}
  // 이전 주차 계산
  var py=wy,pm=wm,pw=ww-1;
  if(pw<1){pm-=1;if(pm<1){pm=12;py-=1;}pw=getMaxWeeks(py,pm);}
  var prevKey=getWeekNum(py,pm,pw);
  // 이전 주차 데이터 조회
  var history=s.weeklyHistory||[];
  var prevEntry=history.find(function(h){return getWeekNum(h.year,h.month,h.weekNum)===prevKey;});
  // 현재 주차
  var now=new Date();
  var cy=now.getFullYear(),cm=now.getMonth()+1,cw=getWeekOfMonth(cy,cm,now.getDate());
  var isCurrentWeek=(wy===cy&&wm===cm&&ww===cw);
  var curKey=getWeekNum(cy,cm,cw);
  // 가져올 플랜 결정
  var srcPlan={},srcBm={};
  if(prevEntry&&prevEntry.plan&&Object.keys(prevEntry.plan).length>0){
    srcPlan=prevEntry.plan;
    srcBm=prevEntry.bookMap||prevEntry.ttBookMap||{};
  } else {
    // history에 없으면 weeklyPlan이 이전 주차 것인지 확인
    if((s._planWeek||'')===prevKey){
      srcPlan=s.weeklyPlan||{};
      srcBm=s.weeklyBookMap||{};
    }
  }
  if(!Object.keys(srcPlan).length){
    alert('이전 주차('+py+'년 '+pm+'월 '+pw+'주차)에 저장된 플랜이 없습니다.');
    return;
  }
  var wLabel=wy+'년 '+wm+'월 '+ww+'주차';
  var pLabel=py+'년 '+pm+'월 '+pw+'주차';
  if(!confirm(pLabel+' 플랜을 '+wLabel+'로 가져올까요?\n기존 내용은 덮어쓰입니다.')){return;}
  if(isCurrentWeek){
    upd(Object.assign({},s,{weeklyPlan:Object.assign({},srcPlan),weeklyBookMap:Object.assign({},srcBm),_planWeek:curKey}));
  } else {
    var hist2=history.slice();
    var wKey=getWeekNum(wy,wm,ww);
    var hi=hist2.findIndex(function(h){return getWeekNum(h.year,h.month,h.weekNum)===wKey;});
    var entry=hi>=0?Object.assign({},hist2[hi]):{year:wy,month:wm,weekNum:ww,date:wKey,plan:{},bookMap:{}};
    entry.plan=Object.assign({},srcPlan);
    entry.bookMap=Object.assign({},srcBm);
    if(hi>=0){hist2[hi]=entry;}else{hist2.push(entry);}
    upd(Object.assign({},s,{weeklyHistory:hist2}));
  }
}

function renderStudentTest(s){
  const myTests=ST.tests.filter(t=>(t.results||[]).some(r=>String(r.studentId)===String(s.id)));
  if(!myTests.length) return`<div style="text-align:center;padding:40px;color:#888">
    <div style="font-size:32px;margin-bottom:10px">📝</div>
    <div style="font-size:14px;font-weight:700;margin-bottom:4px">아직 테스트 결과가 없습니다</div>
    <div style="font-size:12px">관리자가 테스트를 생성하고 답안을 입력해야 합니다</div>
  </div>`;

  // 월별 그룹핑
  const byMonth={};
  myTests.slice().sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{
    const m=t.date.slice(0,7);
    if(!byMonth[m])byMonth[m]=[];
    byMonth[m].push(t);
  });

  return`<div>
    <div style="font-size:14px;font-weight:800;color:#e53935;margin-bottom:14px">📝 나의 테스트 기록</div>
