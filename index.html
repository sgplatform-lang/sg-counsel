      ${teacherList.map((t,i)=>{
        const col=TC[i%TC.length];const ms=ST.students.filter(s=>{const sc=[...(s.counselors||[])];if(s.counselor&&!sc.includes(s.counselor))sc.unshift(s.counselor);return sc.includes(t.name);});const ag=ms.length?ms.reduce((s2,s)=>s2+gAvg(s.subjects),0)/ms.length:null;
        return`<div style="background:#fff;border-radius:13px;padding:16px;border-top:3px solid ${col}">
          <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px">
            <div style="width:44px;height:44px;border-radius:12px;background:${col};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0">${t.name[0]}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:15px;font-weight:900;margin-bottom:2px">${esc(t.name)}</div>
              ${t.subject?`<div style="font-size:11px;color:${col};font-weight:700">📚 ${esc(t.subject)}</div>`:''}
              ${t.phone?`<div style="font-size:10px;color:#777">📱 ${esc(t.phone)}</div>`:''}
              ${t.loginId
                ?`<div style="font-size:10px;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:3px 8px;margin-top:4px;display:inline-block">
                    🔐 아이디: <strong>${esc(t.loginId)}</strong>
                  </div>`
                :`<div style="font-size:10px;background:#fff5f5;border:1px solid #fecaca;border-radius:6px;padding:3px 8px;margin-top:4px;display:inline-block;color:#e53935">
                    ⚠️ 로그인 계정 미설정
                  </div>`}
            </div>
            <div style="display:flex;gap:4px;flex-shrink:0">
              <button onclick="openTForm(ST.teachers.find(x=>String(x.id)===String(${t.id})))" style="background:#fff;color:#555;border:1px solid #e8eaf6;border-radius:6px;padding:4px 9px;font-size:10px">✏️</button>
              <button onclick="openAssignStudents(${t.id})" style="background:#f5f3ff;color:#8b5cf6;border:1px solid #ddd6fe;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700">👥 배정</button>
              <button onclick="if(confirm('삭제?')){const ms=ST.students.filter(s=>s.counselor==='${esc(t.name)}').length;if(ms&&!confirm(ms+'명 담당자 해제됩니다. 계속?'))return;ST.students=ST.students.map(s=>s.counselor==='${esc(t.name)}'?{...s,counselor:''}:s);ST.teachers=ST.teachers.filter(x=>x.id!==${t.id});if(FB_USE())fbDelete('teachers',String(${t.id}));saveAccounts();save();render();}" class="btn-r" style="padding:4px 9px;font-size:10px">🗑</button>
            </div>
          </div>
          <div class="g3" style="margin-bottom:${ms.length?'12px':'0'}">
            <div class="stat"><div class="sv" style="color:${col}">${ms.length}명</div><div class="sl">담당학생</div></div>
            <div class="stat"><div class="sv" style="color:${ag?gc(ag):'#64748b'}">${ag?ag.toFixed(1):'-'}</div><div class="sl">평균내신</div></div>
            <div class="stat"><div class="sv" style="color:#8b5cf6">${ms.reduce((s,st)=>s+(st.consultations||[]).length,0)}</div><div class="sl">총상담</div></div>
          </div>
          ${ms.length?`<div style="border-top:1px solid #e8eaf6;padding-top:10px"><div style="font-size:10px;color:#777;font-weight:700;margin-bottom:6px">담당 학생</div><div style="display:flex;flex-wrap:wrap;gap:5px">${ms.map(s=>`<div style="background:#f4f6fb;border-radius:7px;padding:4px 9px;display:flex;align-items:center;gap:5px"><div style="width:18px;height:18px;border-radius:4px;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff">${s.avatar}</div><span style="font-size:11px;font-weight:600">${esc(s.name)}</span></div>`).join('')}</div></div>`:''}
          ${t.memo?`<div style="margin-top:10px;padding:8px;background:#f4f6fb;border-radius:7px;font-size:11px;color:#777;border-left:3px solid ${col}">${esc(t.memo)}</div>`:''}
        </div>`;
      }).join('')}
    </div>
    ${ST.teachers.length>0?`<div class="box" style="margin-top:16px">
      <div style="font-size:13px;font-weight:800;margin-bottom:12px">📊 전체 현황</div>
      <div class="g4">${[['선생님',ST.teachers.length+'명','#f59e0b'],['학생',ST.students.length+'명','#3b82f6'],['지원대학',ST.students.reduce((s,st)=>s+(st.targets||[]).length,0)+'개','#10b981'],['상담',ST.students.reduce((s,st)=>s+(st.consultations||[]).length,0)+'회','#8b5cf6']].map(([l,v,c])=>`<div class="stat"><div class="sv" style="color:${c}">${v}</div><div class="sl">${l}</div></div>`).join('')}</div>
    </div>`:''}
    <div style="height:40px"></div>
  </div>`;
}
function openTForm(t){
  window._lidChecked = t?.loginId ? true : false; // 신규는 false, 수정(기존 ID)은 true
  const ov=document.createElement('div');ov.className='overlay';
  const PERMS=[
    {key:'grade',    label:'📊 성적 조회/입력'},
    {key:'weekly',   label:'📅 주간플랜 관리'},
    {key:'test',     label:'📝 테스트 관리'},
    {key:'consult',  label:'💬 상담 입력'},
    {key:'susi',     label:'🏫 수시 분석'},
    {key:'jeongsi',  label:'🎯 정시 분석'},
    {key:'apex',     label:'🏆 APEX 진단'},
    {key:'addStudent',label:'➕ 학생 추가'},
  ];
  const curPerms=t?.permissions||PERMS.map(p=>p.key); // 기본: 전체 허용
  // 소속 기관의 허용 권한 (기관 권한 범위 내에서만 선택 가능)
  const teacherOrgId = t?.orgId || (ST.currentUser?.role==='orgAdmin' ? ST.currentOrg?.id : null);
  const orgPerms = (()=>{
    if(!teacherOrgId) return PERMS.map(p=>p.key); // 기관 없으면 전체 허용
    try{
      const allOrgs = JSON.parse(localStorage.getItem(SK_ORGS)||'[]');
      const foundOrg = allOrgs.find(o=>String(o.id)===String(teacherOrgId));
      return foundOrg?.permissions || PERMS.map(p=>p.key);
    }catch(e){ return PERMS.map(p=>p.key); }
  })();

  ov.innerHTML=`<div class="modal" style="max-width:520px"><div class="mhd">
    <span style="font-size:15px;font-weight:800">${t?'선생님 정보 수정':'새 선생님 등록'}</span>
    <button onclick="this.closest('.overlay').remove()" style="background:transparent;border:none;color:#777;font-size:22px;cursor:pointer">×</button>
  </div>
  <div style="padding:16px 18px 26px;overflow-y:auto;max-height:85vh">
    <div class="g2" style="margin-bottom:12px">
      <div><div style="font-size:11px;color:#777;margin-bottom:4px;font-weight:600">이름 *</div><input id="tf_n" class="inp" placeholder="홍길동" value="${esc(t?.name||'')}"></div>
      <div><div style="font-size:11px;color:#777;margin-bottom:4px;font-weight:600">담당 과목</div><input id="tf_s" class="inp" placeholder="국어, 수학" value="${esc(t?.subject||'')}"></div>
      <div><div style="font-size:11px;color:#777;margin-bottom:4px;font-weight:600">연락처</div><input id="tf_p" class="inp" placeholder="010-0000-0000" value="${esc(t?.phone||'')}"></div>
      <div><div style="font-size:11px;color:#777;margin-bottom:4px;font-weight:600">이메일</div><input id="tf_e" class="inp" placeholder="example@school.com" value="${esc(t?.email||'')}"></div>
    </div>

    <!-- 로그인 계정 -->
    <div style="background:#eef1ff;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1.5px solid #c5cae9">
      <div style="font-size:11px;font-weight:700;color:#3b5bdb;margin-bottom:10px">🔐 로그인 계정 설정</div>
      <div class="g2">
        <div><div style="font-size:11px;color:#555;margin-bottom:4px;font-weight:600">로그인 아이디 * <span id="tf_lid_status" style="font-size:10px;margin-left:4px"></span></div>
          <div style="display:flex;gap:6px">
            <input id="tf_lid" class="inp" placeholder="예: teacher01 또는 숫자 가능" value="${esc(t?.loginId||'')}" style="flex:1" oninput="document.getElementById('tf_lid_status').textContent='';window._lidChecked=false;">
            <button onclick="checkTeacherId('${t?.loginId||''}')" style="background:#3b5bdb;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">중복확인</button>
          </div>
          <div style="font-size:10px;color:#aaa;margin-top:3px">영문, 숫자, 특수문자 모두 사용 가능</div>
        </div>
        <div><div style="font-size:11px;color:#555;margin-bottom:4px;font-weight:600">비밀번호 *</div>
          <input id="tf_lpw" type="password" class="inp" placeholder="${t?'변경 시에만 입력':'비밀번호 설정 (숫자만도 가능)'}" value="">
          <div style="font-size:10px;color:#aaa;margin-top:3px">${t?'비워두면 기존 비밀번호 유지':'숫자, 영문, 특수문자 모두 사용 가능'}</div>
        </div>
      </div>
    </div>

    <!-- 기관 선택 (최종관리자만) -->
    ${ST.currentUser?.role==='admin'?(()=>{
      const allOrgsT=JSON.parse(localStorage.getItem(SK_ORGS)||'[]');
      return allOrgsT.length?`<div style="background:#eef1ff;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1.5px solid #c5cae9">
        <div style="font-size:11px;font-weight:700;color:#3b5bdb;margin-bottom:8px">🏫 소속 기관 설정</div>
        <select id="tf_org" style="width:100%;border:1.5px solid #e0e3ef;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;background:#fff">
          <option value="">기관 없음 (최종관리자 직접 관리)</option>
          ${allOrgsT.map(o=>`<option value="${esc(o.id)}" ${(t?.orgId||'')===o.id?'selected':''}>${esc(o.name)}</option>`).join('')}
        </select>
      </div>`:''
    })():''}
    <!-- 기능 권한 설정 -->
    <div style="background:#f0fdf4;border-radius:10px;padding:12px 14px;margin-bottom:12px;border:1.5px solid #86efac">
      <div style="font-size:11px;font-weight:700;color:#0f9d58;margin-bottom:10px">🔑 사용 가능 기능 설정</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px" id="perm_wrap">
        ${PERMS.map(p=>{
          const orgAllows = orgPerms.includes(p.key);
          const isChecked = orgAllows && (curPerms||[]).includes(p.key);
          return `<label style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:${orgAllows?'#fff':'#f8fafc'};border-radius:8px;border:1.5px solid ${orgAllows?'#e8eaf6':'#e2e8f0'};cursor:${orgAllows?'pointer':'not-allowed'};opacity:${orgAllows?1:0.45}">
          <input type="checkbox" id="perm_${p.key}" ${isChecked?'checked':''} ${orgAllows?'':'disabled'} style="width:15px;height:15px;accent-color:#0f9d58">
          <span style="font-size:12px;font-weight:600;color:#333">${p.label}${orgAllows?'':'<span style="font-size:10px;color:#94a3b8;margin-left:4px">(기관 미허용)</span>'}</span>
        </label>`;
        }).join('')}
      </div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <button onclick="document.querySelectorAll('#perm_wrap input[type=checkbox]').forEach(c=>c.checked=true)" style="font-size:10px;color:#0f9d58;background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:3px 9px;cursor:pointer">전체 허용</button>
        <button onclick="document.querySelectorAll('#perm_wrap input[type=checkbox]').forEach(c=>c.checked=false)" style="font-size:10px;color:#e53935;background:#fff5f5;border:1px solid #fecaca;border-radius:5px;padding:3px 9px;cursor:pointer">전체 해제</button>
      </div>
    </div>

    <div style="margin-bottom:18px"><div style="font-size:11px;color:#777;margin-bottom:4px;font-weight:600">메모</div>
      <textarea id="tf_m" class="inp" rows="2" style="resize:none" placeholder="특이사항, 전문분야 등">${esc(t?.memo||'')}</textarea></div>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-g" onclick="this.closest('.overlay').remove()">취소</button>
      ${t?`<button style="background:#8b5cf6;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer" onclick="this.closest('.overlay').remove();openAssignStudents(${t.id})">👥 학생 배정</button>`:''}
      <button id="tf_save_btn" class="btn-b">${t?'수정 완료':'등록'}</button>
    </div>
  </div></div>`;

  ov.querySelector('#tf_save_btn').addEventListener('click',function(){
    const name=ov.querySelector('#tf_n').value.trim();
    const lid=ov.querySelector('#tf_lid').value.trim();
    const lpw=ov.querySelector('#tf_lpw').value.trim();
    if(!name){alert('이름은 필수입니다.');return;}
    if(!lid){alert('로그인 아이디는 필수입니다.');return;}
    if(!t&&!lpw){alert('비밀번호를 입력해주세요.');return;}
    // 아이디 변경 또는 신규 등록이면 중복확인 필수
    if(!window._lidChecked && lid!==(t?.loginId||'')){
      alert('아이디 중복확인을 먼저 진행해주세요.');
      ov.querySelector('#tf_lid')?.focus();
      return;
    }
    // 전체 시스템 아이디 중복 검사 (선생님 + 기관관리자 + 최종관리자)
    const dup=ST.teachers.find(x=>x.loginId===lid&&String(x.id)!==String(t?.id||0));
    if(dup){alert('이미 사용 중인 아이디입니다.');return;}
    const pw=lpw ? lpw : (t ? (t.password||'') : '');
    // 권한 수집
    // 기관 허용 권한 내에서만 저장 (disabled 항목은 자동 제외)
    const perms=PERMS.map(p=>p.key).filter(k=>{
      const cb=ov.querySelector('#perm_'+k);
      return cb && !cb.disabled && cb.checked;
    });
    const d={
      id:t?t.id:Date.now(),
      name,subject:ov.querySelector('#tf_s').value,
      phone:ov.querySelector('#tf_p').value,
      email:ov.querySelector('#tf_e').value,
      loginId:lid,password:pw,
      memo:ov.querySelector('#tf_m').value,
      permissions:perms
    };
    // 기관 설정: 최종관리자는 선택값, 기관관리자는 자동
    if(ST.currentUser?.role==='admin'){
      const selOrg=ov.querySelector('#tf_org')?.value||'';
      if(selOrg){
        const allOrgsT=JSON.parse(localStorage.getItem(SK_ORGS)||'[]');
        const foundOrg=allOrgsT.find(o=>o.id===selOrg);
        d.orgId=selOrg;
        d.orgName=foundOrg?.name||'';
      } else {
        d.orgId=null; d.orgName=null;
      }
    } else if(ST.currentUser?.role==='orgAdmin'&&ST.currentOrg?.id){
      d.orgId=ST.currentOrg.id;
      d.orgName=ST.currentOrg.name||'';
    }
    if(t) ST.teachers=ST.teachers.map(x=>String(x.id)===String(t.id)?d:x);
    else ST.teachers=[...ST.teachers,d];

    // ── 선생님 이름/기관 변경 시 담당 학생 일괄 동기화 ──
    if(t && t.name !== undefined){
      const oldName = String(t.name||'');
      const newName = String(d.name||'');
      const oldOrgId = String(t.orgId||'');
      const newOrgId = String(d.orgId||'');
      const nameChanged = oldName !== newName && oldName !== '';
      const orgChanged = oldOrgId !== newOrgId;

      if(nameChanged || orgChanged){
        // 변경 대상 학생 수집 (전체 localStorage에서도 조회)
        let allStudents = ST.students.slice();
        try{
          const fromStorage = JSON.parse(localStorage.getItem(SK)||'[]');
          fromStorage.forEach(fs=>{
            if(!allStudents.find(x=>String(x.id)===String(fs.id))) allStudents.push(fs);
          });
        }catch(e){}

        const toUpdate = [];
        allStudents.forEach(s=>{
          let updated = {...s};
          let changed = false;
          if(nameChanged){
            if(s.counselor === oldName){ updated.counselor = newName; changed = true; }
            if(Array.isArray(s.counselors) && s.counselors.includes(oldName)){
              updated.counselors = s.counselors.map(c=>c===oldName?newName:c); changed = true;
            }
          }
          if(orgChanged){
            const isMyStudent = (updated.counselor===newName)||(updated.counselors||[]).includes(newName)
              || (!nameChanged && ((s.counselor===oldName)||(s.counselors||[]).includes(oldName)));
            if(isMyStudent){
              updated.orgId = d.orgId||null;
              updated.orgName = d.orgName||'';
              changed = true;
            }
          }
          if(changed) toUpdate.push(updated);
        });

        if(toUpdate.length>0){
          // _savingIds 차단 등록
          if(!ST._savingIds) ST._savingIds = new Set();
          toUpdate.forEach(u=>ST._savingIds.add(String(u.id)));

          // ST.students 즉시 업데이트
          const idMap = {};
          toUpdate.forEach(u=>{ idMap[String(u.id)] = u; });
          ST.students = ST.students.map(s=>{
            const upd2 = idMap[String(s.id)];
            return upd2 ? upd2 : s;
          });

          // ST.sel / ST.adminSel 업데이트
          if(ST.sel && idMap[String(ST.sel.id)]) ST.sel = idMap[String(ST.sel.id)];
          if(ST.adminSel && idMap[String(ST.adminSel.id)]) ST.adminSel = idMap[String(ST.adminSel.id)];

          // localStorage 전체 업데이트
          try{
            const all = JSON.parse(localStorage.getItem(SK)||'[]');
            const merged = all.map(s=>{ const u=idMap[String(s.id)]; return u||s; });
            localStorage.setItem(SK, JSON.stringify(merged));
          }catch(e){}

          // Firebase 저장 후 차단 해제
          if(FB_USE()){
            toUpdate.forEach(u=>{
              fbSave('students', u.id, u).then(()=>{
                setTimeout(()=>{ if(ST._savingIds) ST._savingIds.delete(String(u.id)); }, 5000);
              }).catch(()=>{
                setTimeout(()=>{ if(ST._savingIds) ST._savingIds.delete(String(u.id)); }, 5000);
              });
            });
          } else {
            setTimeout(()=>{ toUpdate.forEach(u=>{ if(ST._savingIds) ST._savingIds.delete(String(u.id)); }); }, 3000);
          }

          if(nameChanged) alert('✅ 선생님 이름 변경 완료!\n담당 학생 '+toUpdate.length+'명의 상담교사명이 ['+oldName+'] → ['+newName+']으로 업데이트되었습니다.');
        }
      }
    }

    // 4곳 모두 즉시 저장
    clearTimeout(ST.saveTimer);
    const tj = JSON.stringify(ST.teachers);
    const aj = JSON.stringify(ST.teachers.map(x=>({
      id:String(x.id), name:x.name,
      loginId:String(x.loginId||''),
      password:String(x.password||''),
      permissions:x.permissions||[]
    })));
    try{ localStorage.setItem('susi_t_v2', tj); }catch(e){}
    try{ localStorage.setItem('susi_t_v1', tj); }catch(e){}
    try{ localStorage.setItem('sg_accounts_v1', aj); }catch(e){}
    if(FB_USE()){ fbSave('teachers',d.id,d).catch(e=>{}); }

    // 실제 저장값 검증
    let savedOk = false;
    try{
      const check = JSON.parse(localStorage.getItem('sg_accounts_v1')||'[]');
      savedOk = check.some(a=>a.loginId===lid && a.password===pw);

// ── 학생 배정 모달 ──
function openAssignStudents(tid){
  const t=ST.teachers.find(x=>x.id===tid); if(!t) return;
  const ov=document.createElement('div');ov.className='overlay';
  // 기관관리자: 자기 기관 학생만 배정 가능 / 최종관리자: 기관없는 학생만
  const curOrgIdA=ST.currentOrg?.id||null;
  const roleA=ST.currentUser?.role;
  const allStudents = roleA==='orgAdmin'
    ? ST.students.filter(s=>s.orgId===curOrgIdA)
    : roleA==='admin'
      ? ST.students.filter(s=>!s.orgId) // 최종관리자는 기관없는 학생만 배정
      : ST.students.filter(s=>!curOrgIdA||s.orgId===curOrgIdA);

  ov.innerHTML=`<div class="modal" style="max-width:480px"><div class="mhd">
    <span style="font-size:15px;font-weight:800">👥 ${esc(t.name)} 선생님 학생 배정</span>
    <button id="as_close" style="background:transparent;border:none;color:#777;font-size:22px;cursor:pointer">×</button>
  </div>
  <div style="padding:16px 18px 24px">
    <div style="font-size:11px;color:#777;margin-bottom:10px">체크한 학생을 <strong>${esc(t.name)}</strong> 선생님 담당으로 배정합니다</div>
    <div style="max-height:320px;overflow-y:auto;border:1px solid #e8eaf6;border-radius:10px;padding:8px">
      ${allStudents.length===0?`<div style="text-align:center;color:#aaa;padding:20px">등록된 학생이 없습니다</div>`:
      allStudents.map(s=>`<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;border-bottom:1px solid #f4f6fb">
        <input type="checkbox" id="assign_${s.id}" ${s.counselor===t.name?'checked':''}
          style="width:16px;height:16px;accent-color:#3b5bdb;cursor:pointer;flex-shrink:0">
        <div style="width:32px;height:32px;border-radius:8px;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0">${esc(s.avatar)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${esc(s.name)}</div>
          <div style="font-size:10px;color:#888">${esc(s.school)} · ${esc(s.grade)}${(()=>{const sc=[...(s.counselors||[])];if(s.counselor&&!sc.includes(s.counselor))sc.unshift(s.counselor);const others=sc.filter(c=>c!==t.name);return others.length?` · <span style="color:#888">함께 배정: ${others.map(esc).join(', ')}</span>`:'';})()}</div>
        </div>
      </label>`).join('')}
    </div>
    <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end">
      <button id="as_cancel" class="btn-g">취소</button>
      <button id="as_save" class="btn-b">✅ 배정 완료</button>
    </div>
  </div></div>`;

  ov.querySelector('#as_close').addEventListener('click',()=>ov.remove());
  ov.querySelector('#as_cancel').addEventListener('click',()=>ov.remove());
  ov.querySelector('#as_save').addEventListener('click',async ()=>{
    const checked=allStudents.map(s=>s.id).filter(id=>ov.querySelector('#assign_'+id)?.checked);
    const tName=t.name;
    const changedStudents=[];
    ST.students=ST.students.map(s=>{
      const wasChecked=checked.includes(s.id);
      // counselors 배열 관리 (다중 배정 지원)
      let counselors=[...(s.counselors||[])];
      if(s.counselor&&!counselors.includes(s.counselor)) counselors=[s.counselor,...counselors]; // 기존 데이터 마이그레이션
      const beforeStr=JSON.stringify(counselors.slice().sort());
      if(wasChecked){
        if(!counselors.includes(tName)) counselors.push(tName);
      } else {
        counselors=counselors.filter(c=>c!==tName);
      }
      // counselor(단일)는 첫 번째 담당자로 유지 (하위호환)
      const mainCounselor=counselors[0]||'';
      const updated={...s, counselors, counselor:mainCounselor};
      if(JSON.stringify(counselors.slice().sort())!==beforeStr) changedStudents.push(updated);
      return updated;
    });
    save();
    // Firebase에 변경된 학생 즉시 저장
    if(FB_USE() && changedStudents.length){
      for(const cs of changedStudents){
        await fbSave('students', cs.id, cs);
      }
    }
    ov.remove(); render();
    alert('✅ 학생 배정이 완료되었습니다.'+(changedStudents.length?' ('+changedStudents.length+'명 변경)':''));
  });
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

  // ── CSV 파싱 ──

    return txt.split('\n').filter(l=>l.trim()).map(l=>l.split(/[,\t]/).map(x=>x.trim()));

  // ── 파일 처리 ──
  function processFile(file){
    const name=file.name.toLowerCase();
    const reader=new FileReader();
    if(name.endsWith('.csv')){
      reader.onload=function(e){
        const txt=e.target.result;
        const rows=parseCSVText(txt).filter(r=>r[0]&&r[0]!=='이름'&&r[0]!=='name');

        renderPreview(rows);
      };
      reader.readAsText(file,'UTF-8');
    } else if(name.endsWith('.xlsx')||name.endsWith('.xls')){
      reader.onload=function(e){
        try{
          const data=new Uint8Array(e.target.result);
          const wb=XLSX.read(data,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const all=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          // 헤더 자동 감지: 첫 행이 텍스트면 제외
          const rows=(all[0]&&typeof all[0][0]==='string'&&isNaN(+all[0][0])&&['이름','name','성명'].some(h=>String(all[0][0]).toLowerCase().includes(h.toLowerCase()))

          renderPreview(rows.map(r=>r.map(c=>String(c))));
        }catch(err){
          alert('엑셀 파일 읽기 오류: '+err.message+'\n\nCSV 형식으로 저장 후 다시 시도해주세요.');
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      alert('xlsx, xls, csv 파일만 지원합니다.');
    }
  }

  // ── 직접 입력 실시간 파싱 ──
  ov.querySelector('#bulk_input').addEventListener('input',function(){
    const rows=parseCSVText(this.value).filter(r=>r[0]);
    renderPreview(rows);
  });

  // ── 샘플 CSV 다운로드 ──
  ov.querySelector('#sample_dl_btn').addEventListener('click',()=>{
    const isAdminU=ST.currentUser?.role==='admin';
    const orgCol=isAdminU?'기관명,':'';
    const orgSample=isAdminU?'SG학원,':'';
    const sample=`이름,학교,학년,연락처,반명,담당선생님,학생아이디,비밀번호${isAdminU?',기관명':''}
홍길동,강남고,고3,010-1234-5678,A반,김선생,hong01,1234${isAdminU?',SG학원':''}
이지수,서초중,중2,010-9876-5432,B반,이선생,lee02,1234${isAdminU?',':''}
박민수,서초초등,초5,010-5555-1234,C반,박선생,park03,1234${isAdminU?',':''}`;

    const blob=new Blob(['\uFEFF'+sample],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='학생일괄등록_샘플.csv';a.click();
  });

  // ── 등록 버튼 ──
  regBtn.addEventListener('click',()=>{
    if(!parsedRows.length){alert('데이터를 먼저 불러오세요.');return;}
    let added=0;
    parsedRows.forEach((p,i)=>{
      const name=String(p[0]).trim(); if(!name) return;
      const ci=ST.students.length;
      // 기관명: 최종관리자는 CSV 8번 컬럼, 기관관리자는 현재 기관
      const csvOrgName=String(p[8]||'').trim();
      let orgIdB=ST.currentOrg?.id||null;
      let orgNameB=ST.currentOrg?.name||null;
      if(!orgIdB && csvOrgName && ST.currentUser?.role==='admin'){
        // CSV에 기관명이 있으면 해당 기관 찾기
        const allOrgsB=JSON.parse(localStorage.getItem(SK_ORGS)||'[]');
        const foundOrgB=allOrgsB.find(o=>o.name===csvOrgName)||null;
        if(foundOrgB){orgIdB=foundOrgB.id;orgNameB=foundOrgB.name;}
      }
      ST.students.push({
        id:Date.now()+i,name,
        school:String(p[1]||'').trim(),
        grade:String(p[2]||'').trim(),
        phone:String(p[3]||'').trim(),
        className:String(p[4]||'').trim(),
        counselor:String(p[5]||'').trim(),
        studentLoginId:String(p[6]||'').trim(),
        studentPassword:String(p[7]||'').trim(),
        subjects:{korean:null,math:null,english:null,science:null,social:null},
        gradeDetail:{},extraSubjs:[],mockGrades:{},mockMemo:'',
        consultations:[],targets:[],
        weeklyPlan:{},weeklyBookMap:{},weeklySubjPlans:{},
        weeklyHistory:[],weeklyAchieve:{},weeklyInspect:{},
        bookScore:0,weeklyStrategy:'',
        color:COLORS[ci%COLORS.length],
        avatar:name[0]||'?',
        orgId:orgIdB,
        orgName:orgNameB
      });
      added++;
    });
    save();ov.remove();render();
    alert('✅ '+added+'명 등록 완료!\n각 학생 상세에서 성적을 입력해주세요.');
  });

  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);

  // SheetJS 로드 확인
  if(typeof XLSX==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>console.log('SheetJS 로드 완료');
    document.head.appendChild(s);
  }
}

// ══ 이벤트 바인딩 ══
function bindEvents(){
  document.querySelectorAll('[data-filter]').forEach(b=>{
    b.addEventListener('click',()=>{ST.filterC=b.dataset.filter;render();});
  });

  // ── 검색창 IME 처리 (한글 자모 분리 방지) ──
  const si = document.getElementById('search_input');
  if(si && !si._bound){
    si._bound = true;
    let _composing = false;
    si.addEventListener('compositionstart', ()=>{ _composing=true; });
    si.addEventListener('compositionend', ()=>{
      _composing=false;
      ST.search=si.value;
      ST._searchFocused=true;
      render();
      // render 후 포커스 복원
      requestAnimationFrame(()=>{
        const ni=document.getElementById('search_input');
        if(ni){ ni.focus(); const l=ni.value.length; ni.setSelectionRange(l,l); }
      });
    });
    si.addEventListener('input', ()=>{
      if(_composing) return; // 조합 중이면 무시 (compositionend에서 처리)
      ST.search=si.value;
      ST._searchFocused=true;
      render();
    });
    // 포커스 유지
    si.focus();
    const l=si.value.length; si.setSelectionRange(l,l);
  }

  // 로그인 이벤트
  const loginBtn = document.getElementById('login_btn');
  if(loginBtn){
    loginBtn.addEventListener('click', doLogin);
    const lid = document.getElementById('login_id');
    const lpw = document.getElementById('login_pw');
    if(lid) lid.addEventListener('keydown', e=>{ if(e.key==='Enter') lpw?.focus(); });
    if(lpw) lpw.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  }

  // 비밀탭 (7번) → 진단 패널

function saveAccounts(){
  const accounts=ST.teachers.map(t=>({
    id:String(t.id),
    name:t.name,
    loginId:String(t.loginId||''),
    password:String(t.password||''),
    permissions:t.permissions||[],
    orgId:t.orgId||null
  }));
  localStorage.setItem(SK_ACCOUNTS, JSON.stringify(accounts));
}
function loadAccounts(){
  try{
    const raw=localStorage.getItem(SK_ACCOUNTS);
    if(!raw) return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

function init(){
  // 초기 history state 등록 (뒤로가기 이탈 방지)
  history.replaceState({tab:'overview',page:'main',sel:null,adminSel:null,adminTab:'report',ts:Date.now()}, '');
  const ALL_KEYS=[SK,SKT,SK_TEST,SK_AUTH,SK_ACCOUNTS,SK_ORGS];
  ALL_KEYS.forEach(function(k){
    try{ const v=localStorage.getItem(k); if(v) JSON.parse(v); }
    catch(e){ console.warn('손상된 키 제거:',k); localStorage.removeItem(k); }
  });

  loadGradeSubjs();
  let s=null,t=null,ts=null;
  try{ s=JSON.parse(localStorage.getItem(SK)||'null'); }catch(e){}
  try{ t=JSON.parse(localStorage.getItem(SKT)||'null'); }catch(e){}
  try{ ts=JSON.parse(localStorage.getItem(SK_TEST)||'null'); }catch(e){}

  ST.students = Array.isArray(s) ? s : DEMO_S;
  ST.teachers = Array.isArray(t) ? t : [];
  ST.tests = Array.isArray(ts) ? ts : [];

  // ── F5/새로고침 시 세션 복원 ──
  let sessionRestored = false;
  try{
    const sess = JSON.parse(sessionStorage.getItem('sg_session')||'null');
    if(sess && sess.user && sess.user.role){
      ST.currentUser = sess.user;
      ST.currentOrg  = sess.org || null;
      sessionRestored = true;
      console.log('✅ 세션 복원:', sess.user.role, sess.user.name);
    }
  }catch(e){}

  if(!sessionRestored){
    ST.currentUser = null;
    ST.currentOrg  = null;
  }

  // 로그인 화면 / 앱 화면 결정
  try{
    const _ls = document.getElementById('login-screen');
    const _app = document.getElementById('app');
    if(sessionRestored){
      if(_ls) _ls.style.display='none';
      if(_app) _app.style.display='';
    } else {
      if(_ls){ _ls.style.display='flex'; _ls.style.alignItems='center'; _ls.style.justifyContent='center'; }
      if(_app){ _app.style.display='none'; _app.innerHTML=''; }
    }
  }catch(e){}
  render();
  // Firebase 초기 로드 (API 키 포함)
  setTimeout(async()=>{
    if(FB_USE()){
      // 1단계: config + teachers 먼저 로드 (API 키 + 로그인 계정 확보)
      try{
        const [cfgSnap, teacherSnap] = await Promise.all([
          window._fb.db.collection('config').get(),
          window._fb.db.collection('teachers').get()
        ]);
        // API 키 로드
        const cfgData = cfgSnap.docs.map(d=>({...d.data(),id:d.id}));
        const ak = cfgData.find(c=>c.id==='api_key');
        if(ak?.value){
          window._sharedApiKey = ak.value;
          if(!(window.ANTHROPIC_API_KEY||'').trim()) window.ANTHROPIC_API_KEY = ak.value;
          console.log('✅ API 키 선로드 완료');
        }
        // 선생님 계정 로드 → localStorage 저장 (로그인 가능하게)
        const teachers = teacherSnap.docs.map(d=>({...d.data(),id:d.id})).filter(t=>t.id&&t.name);
        if(teachers.length){
          ST.teachers = teachers;
          dbS(SKT, teachers);
          saveAccounts();
          console.log('✅ 교사 계정 선로드:', teachers.length+'명');
        }
      }catch(e){ console.warn('선로드 실패:', e.message); }
      // 2단계: 전체 데이터 로드
      const loaded = await fbLoadAll_all();
      if(loaded){
        console.log("✅ Firebase 데이터 로드 완료, teachers:", ST.teachers.length);
        render();
      }
      startRealtimeSync();
    }
  }, 500);
}

function genQR(type){
  const urlEl=document.getElementById('share_'+type+'_url');
  const qrEl=document.getElementById('qr_'+type);
  const url=(urlEl?.value||'').trim();
  if(!url){alert('URL을 입력해주세요.');urlEl?.focus();return;}
  if(!url.startsWith('http')){alert('올바른 URL을 입력해주세요. (https://로 시작)');return;}

  qrEl.innerHTML='';

  if(window.QRCode){
    _makeQR(qrEl, url, type);
  } else {
    // 라이브러리 로드 대기
    const script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    script.onload=function(){ _makeQR(qrEl, url, type); };
    document.head.appendChild(script);
  }
}

function _makeQR(el, url, type){
  el.innerHTML='';
  const color=type==='admin'?'#3b5bdb':'#0f9d58';
  const label=type==='admin'?'관리자 페이지':'학생용 페이지';
  const wrap=document.createElement('div');
  wrap.style.cssText='display:inline-block;background:#fff;border:2px solid '+color+';border-radius:12px;padding:16px;text-align:center';
  const qrDiv=document.createElement('div');
  qrDiv.id='qr_canvas_'+type;
  wrap.appendChild(qrDiv);
  const labelEl=document.createElement('div');
  labelEl.style.cssText='margin-top:8px;font-size:11px;font-weight:700;color:'+color;
  labelEl.textContent=label;
  wrap.appendChild(labelEl);
  const urlEl2=document.createElement('div');
  urlEl2.style.cssText='margin-top:4px;font-size:9px;color:#888;word-break:break-all;max-width:200px';
  urlEl2.textContent=url;
  wrap.appendChild(urlEl2);
  el.appendChild(wrap);

  new QRCode(qrDiv, {
    text: url,
    width: 180,
    height: 180,
    colorDark: color,
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

function renderSchoolLevelSection(byHighGrade, byMiddleGrade, byElemGrade, bySchoolType, total){
  let html='';
  // 고등학교
  if(bySchoolType.high>0){
    html+='<div style="font-size:11px;font-weight:700;color:#3b5bdb;margin-bottom:8px;padding:4px 10px;background:#eef1ff;border-radius:6px;display:inline-block">🏫 고등학교 ('+bySchoolType.high+'명)</div>';
    Object.entries(byHighGrade).sort().forEach(function(entry){
      const g=entry[0],n=entry[1];
      const w=total?Math.round(n/total*120):0;
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-left:8px">';
      html+='<span style="font-size:13px;color:#333">'+esc(g)+'</span>';
      html+='<div style="display:flex;align-items:center;gap:8px">';
      html+='<div style="background:#3b5bdb;height:8px;border-radius:4px;width:'+w+'px"></div>';
      html+='<span style="font-size:13px;font-weight:700;color:#3b5bdb">'+n+'명</span>';
      html+='</div></div>';
    });
  }
  // 중학교
  if(bySchoolType.middle>0){
    const mt=bySchoolType.high>0?'margin-top:12px;':'';
    html+='<div style="font-size:11px;font-weight:700;color:#0f9d58;'+mt+'margin-bottom:8px;padding:4px 10px;background:#f0fdf4;border-radius:6px;display:inline-block">🏫 중학교 ('+bySchoolType.middle+'명)</div>';
    Object.entries(byMiddleGrade).sort().forEach(function(entry){
      const g=entry[0],n=entry[1];
      const w=total?Math.round(n/total*120):0;
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-left:8px">';
      html+='<span style="font-size:13px;color:#333">'+esc(g)+'</span>';
      html+='<div style="display:flex;align-items:center;gap:8px">';
      html+='<div style="background:#0f9d58;height:8px;border-radius:4px;width:'+w+'px"></div>';
      html+='<span style="font-size:13px;font-weight:700;color:#0f9d58">'+n+'명</span>';
      html+='</div></div>';
    });
  }
  // 초등학교
  if(bySchoolType.elem>0){
    const et=(bySchoolType.high>0||bySchoolType.middle>0)?'margin-top:12px;':'';
    html+='<div style="font-size:11px;font-weight:700;color:#9c27b0;'+et+'margin-bottom:8px;padding:4px 10px;background:#f3e5f5;border-radius:6px;display:inline-block">🏫 초등학교 ('+bySchoolType.elem+'명)</div>';
    Object.entries(byElemGrade).sort().forEach(function(entry){
      const g=entry[0],n=entry[1];
      const w=total?Math.round(n/total*120):0;
      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-left:8px">';
      html+='<span style="font-size:13px;color:#333">'+esc(g)+'</span>';
      html+='<div style="display:flex;align-items:center;gap:8px">';
      html+='<div style="background:#9c27b0;height:8px;border-radius:4px;width:'+w+'px"></div>';
      html+='<span style="font-size:13px;font-weight:700;color:#9c27b0">'+n+'명</span>';
      html+='</div></div>';
    });
  }
  // 학교급 없는 경우
  if(bySchoolType.high===0&&bySchoolType.middle===0&&bySchoolType.elem===0){
    html+='<div style="color:#aaa;font-size:12px">등록된 학생이 없습니다</div>';
  }
  return html;
}

// 실시간 동기화 (Firebase onSnapshot)
function startRealtimeSync(){
  if(!FB_USE()) return;
  try{
    const {db} = window._fb;
    // students 컬렉션 변경 감지
    db.collection('students').onSnapshot(snap=>{
      if(!snap || !ST.currentUser) return;
      const role = ST.currentUser.role;
      const curOrgId = ST.currentOrg?.id || ST.currentUser.orgId || null;
      const curName = ST.currentUser.name || '';

      const incoming = snap.docs
        .map(d=>Object.assign({},d.data(),{id:d.id}))
        .filter(s=>s.id) // id 있는 문서만
        .filter(s=>{
          // ── 역할별 필터링 ──
          if(role==='admin') return true; // 최종관리자: 전체
          if(role==='orgAdmin'){
            // 기관관리자: 본인 기관 학생만
            return !curOrgId || String(s.orgId||'')===String(curOrgId);
          }
          if(role==='teacher'){
            // 선생님: 본인 기관 + 본인이 담당인 학생만
            const sameOrg = !curOrgId || String(s.orgId||'')===String(curOrgId);
            if(!sameOrg) return false;
            // 담당 선생님 필터 (counselor 또는 counselors 배열)
            const sc=[...(s.counselors||[])];
            if(s.counselor&&!sc.includes(s.counselor)) sc.unshift(s.counselor);
            return sc.includes(curName);
          }
          return true;
        });

      if(!incoming.length && role!=='admin') {
        // 선생님/기관관리자인데 담당 학생이 없는 경우 - 기존 유지
        if(ST.currentUser) render();
        return;
      }

      const savingIds = ST._savingIds||new Set();
      // 저장 중인 학생은 로컬 데이터 유지, 나머지는 Firebase 데이터 사용
      incoming.forEach(fbStudent=>{
        const sid = String(fbStudent.id);
        if(savingIds.has(sid)) return;
        const idx = ST.students.findIndex(x=>String(x.id)===sid);
        if(idx>=0) ST.students[idx] = fbStudent;
        else ST.students.push(fbStudent);
      });

      // ── 선생님 이름 항상 최신으로 재매핑 ──
      // Firebase에 구 이름이 저장돼 있어도 ST.teachers 기준으로 항상 갱신
      if(ST.teachers && ST.teachers.length>0){
        ST.students = ST.students.map(s=>{
          // teacherId로 담당 선생님 찾기 (가장 정확)
          const teacher = ST.teachers.find(tc=>
            (s.teacherId && String(tc.id)===String(s.teacherId)) ||
            tc.name === s.counselor
          );
          if(!teacher) return s;
          const currentName = teacher.name;
          const currentOrgId = teacher.orgId||null;
          const currentOrgName = teacher.orgName||'';
          let needsUpdate = false;
          const updated = {...s};
          if(s.counselor && s.counselor !== currentName){
            updated.counselor = currentName; needsUpdate = true;
          }
          if(Array.isArray(s.counselors)){
            const newCounselors = s.counselors.map(c=>{
              const tc2 = ST.teachers.find(t=>t.name===c);
              return tc2 ? tc2.name : c;
            });
            if(JSON.stringify(newCounselors)!==JSON.stringify(s.counselors)){
              updated.counselors = newCounselors; needsUpdate = true;
            }
          }
          return needsUpdate ? updated : s;
        });
      }

      // 역할에 맞지 않는 학생 제거 (선생님/기관관리자만)
      if(role==='orgAdmin' && curOrgId){
        ST.students = ST.students.filter(s=>
          String(s.orgId||'')===String(curOrgId)
        );
      } else if(role==='teacher'){
        ST.students = ST.students.filter(s=>{
          const sameOrg = !curOrgId || String(s.orgId||'')===String(curOrgId);
          if(!sameOrg) return false;
          const sc=[...(s.counselors||[])];
          if(s.counselor&&!sc.includes(s.counselor)) sc.unshift(s.counselor);
          return sc.includes(curName);
        });
      }

      if(ST.sel) ST.sel = ST.students.find(s=>String(s.id)===String(ST.sel.id))||ST.sel;
      if(ST.adminSel) ST.adminSel = ST.students.find(s=>String(s.id)===String(ST.adminSel.id))||ST.adminSel;
      dbS(SK, ST.students);
      if(ST.currentUser) render();
    });
    // tests 컬렉션 변경 감지 (학생 답안 제출 시)
    db.collection('tests').onSnapshot(snap=>{
      if(!snap) return;
      // snap.docs가 빈 배열이어도 처리 (마지막 테스트 삭제 반영)
      const updated = snap.docs.map(d=>({...d.data(),id:d.id}));
      ST.tests = updated; // 빈 배열도 허용
      dbS(SK_TEST, ST.tests);
      if(ST.currentUser) render();
    });
    console.log("✅ 실시간 동기화 시작");
  }catch(e){
    console.warn("실시간 동기화 실패:", e.message);
  }
}

(function(){
  var startY = 0;
  document.addEventListener('touchstart', function(e){
    startY = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener('touchmove', function(e){
    var el = e.target;
    // 스크롤 가능한 내부 요소인지 확인
    var scrollable = false;
    while(el && el !== document.body){
      if(el.scrollHeight > el.clientHeight + 1){
        var st = el.scrollTop;
        var dy = e.touches[0].clientY - startY;
        // 내부 요소가 스크롤 가능하고 실제로 스크롤 중이면 허용
        if(!((st <= 0 && dy > 0) || (st + el.clientHeight >= el.scrollHeight && dy < 0))){
          scrollable = true;
          break;
        }
      }
      el = el.parentElement;
    }
    // 최상단에서 아래로 당기는 동작만 차단
    if(!scrollable && e.touches[0].clientY > startY && document.scrollingElement.scrollTop === 0){
      e.preventDefault();
    }
  }, {passive:false});
})();

function toggleSession() {
    currentSession = document.querySelector('input[name="sessionType"]:checked').value;
    document.getElementById('prevScoreBox').style.display = (currentSession === "2") ? "block" : "none";
    renderQuestions();
}

function renderQuestions() {
    const grade = document.getElementById('inGrade').value;
    const s0Div = document.getElementById('step0_inputs');
    s0Div.innerHTML = "";
    const currentStep0 = (currentSession === "1") ? step0_short_1 : step0_short_2;
    
    currentStep0.forEach((q, i) => {
        let inputHtml = ""; let wrapperStyle = "";
        if(i < 6) {
            inputHtml = `<input type="text" id="s0_${i}" style="width:100%; padding:10px; font-size:0.9em; border:1px solid #ccc; border-radius:5px;">`;
            wrapperStyle = "grid-column: 1 / -1;"; 
        } else {
            inputHtml = `<select id="s0_${i}" style="width:100%; padding:8px; font-size:0.85em; border:1px solid #ccc; border-radius:5px;"><option value="O">O (그렇다)</option><option value="X">X (아니다)</option></select>`;
        }
        s0Div.innerHTML += `<div style="${wrapperStyle} margin-bottom:8px;"><label style="font-size:0.85em; color:#555; font-weight:700; margin-bottom:4px; display:block;">${q}</label>${inputHtml}</div>`;
    });

    const container = document.getElementById('main_inputs'); 
    container.innerHTML = "";
    const activeDomain = (currentSession === "1") ? domains_1[grade] : domains_2[grade]; 
    
    for (let d in activeDomain) {
        let box = document.createElement('div'); box.style.marginBottom = "15px";
        box.innerHTML = `<b style="color:var(--primary); font-size:1.05em;">${{A:"탐구(A)", B:"주도(B)", C:"정서(C)", D:"습관(D)"}[d]} 영역</b>`;
        let grid = document.createElement('div'); grid.style.display="grid"; grid.style.gridTemplateColumns="1fr 1fr"; grid.style.gap="10px"; grid.style.marginTop="5px";
        activeDomain[d].forEach((q, i) => {
            grid.innerHTML += `<div style="font-size:0.85em; background:#f9f9f9; padding:6px 12px; border-radius:6px; border:1px solid #ddd; display:flex; justify-content:space-between; align-items:center;">

                <div style="display:flex; align-items:center; width:110px; justify-content:flex-end;">
                    <input type="range" class="q-val" data-domain="${d}" min="1" max="10" value="7" oninput="this.nextElementSibling.innerText=this.value" style="width:70px;">
                    <span style="font-weight:900; color:var(--primary); width:20px; text-align:right; margin-left:10px;">7</span>

function renderGradeSelects() {
    const subjects = [
        {id: "kor", name: "국어"}, {id: "eng", name: "영어"}, {id: "mat", name: "수학"}, 
        {id: "sci", name: "과학"}, {id: "soc", name: "사회"}, {id: "his", name: "역사"}
    ];
    const sems = ["21", "22", "31", "32"];
    let html = "";
    subjects.forEach(subj => {
        html += `<tr><td style="font-weight:bold; color:var(--primary); background:#f0f4f8;">${subj.name}</td>`;
        sems.forEach(sem => {
            html += `<td><select id="g-${subj.id}-${sem}">
                        <option value="90">A (또는 미응시)</option>
                        <option value="70">B (-20점)</option>
                        <option value="50">C (-40점)</option>
                        <option value="30">D/E (탈락)</option>
                     </select></td>`;
        });
        html += `</tr>`;
    });
    document.getElementById('gradeTbody').innerHTML = html;
}

window.onload = function() { renderQuestions(); renderGradeSelects(); };

    const sGrid = document.getElementById('schoolGrid'); sGrid.innerHTML = "";

        step2_title = "1분 설명하기를 통한 기초 메타인지"; step2_desc = "수동적으로 학원 강의를 듣는 것에서 벗어나, 오늘 배운 가장 중요한 핵심 개념 하나를 부모님이나 친구에게 1분 동안 설명해 보는 훈련을 매일 반복합니다. 내가 무엇을 모르는지 스스로 깨닫게 하여 공부의 주도권을 되찾는 과정입니다.";
