      var b = Object.assign({}, s.weeklyBookMap||{});
      delete p[k]; delete b[k];
      upd(Object.assign({}, s, {weeklyPlan:p, weeklyBookMap:b, _planWeek:curKey2}));
    } else {
      // 이전 주차 이력에서 삭제
      var hist = (s.weeklyHistory||[]).slice();
      var hi = hist.findIndex(function(x){return x.year===wy&&x.month===wm&&x.weekNum===ww;});
      if(hi>=0){
        var p2 = Object.assign({}, hist[hi].plan||{});
        var b2 = Object.assign({}, hist[hi].bookMap||{});
        delete p2[k]; delete b2[k];
        hist[hi] = Object.assign({}, hist[hi], {plan:p2, bookMap:b2});
        upd(Object.assign({}, s, {weeklyHistory:hist}));
      }
    }
  } else {
    // ── 입력 모드 ──
    if(!ST.weekSubj){ alert('과목을 선택해주세요'); return; }
    // 클릭한 셀부터 weekHrs만큼 연속 입력
    var weekHrs = ST.weekHrs||1;
    var hrs = [];
    var cur = hour;
    for(var i=0;i<weekHrs;i++){
      hrs.push(cur);
      cur = (cur+1) % 24; // 24시간 순환 (0→1→2...)
    }

    if(isNow){
      var p3 = Object.assign({}, s.weeklyPlan||{});
      var b3 = Object.assign({}, s.weeklyBookMap||{});
      var sp = ((s.weeklySubjPlans||{})[ST.weekSubj]||{});
      var bk = ((sp.books||[]).filter(function(x){return !!x;}))[0]||'';
      hrs.forEach(function(hh){ p3[day+'-'+hh]=ST.weekSubj; if(bk)b3[day+'-'+hh]=bk; });
      upd(Object.assign({}, s, {weeklyPlan:p3, weeklyBookMap:b3, _planWeek:curKey2}));
    } else {
      var hist2 = (s.weeklyHistory||[]).slice();
      var hi2 = hist2.findIndex(function(x){return x.year===wy&&x.month===wm&&x.weekNum===ww;});
      var entry = hi2>=0 ? Object.assign({},hist2[hi2]) : {year:wy,month:wm,weekNum:ww,date:wy+'-'+String(wm).padStart(2,'0'),plan:{},bookMap:{}};
      var p4 = Object.assign({}, entry.plan||{});
      var b4 = Object.assign({}, entry.bookMap||{});
      hrs.forEach(function(hh){ p4[day+'-'+hh]=ST.weekSubj; });
      entry.plan=p4; entry.bookMap=b4;
      if(hi2>=0) hist2[hi2]=entry; else hist2.push(entry);
      upd(Object.assign({}, s, {weeklyHistory:hist2}));
    }
  }
}

function printAiPlan(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid));
  if(!s){ alert('학생을 찾을 수 없습니다.'); return; }
  const aiMap = window._lastAiPlanMap || {};
  if(!Object.keys(aiMap).length){ alert('먼저 AI 플랜을 생성해주세요.'); return; }

  const DAYS = ['월','화','수','목','금','토','일'];
  const SC_COLORS = {국어:'#e53935',수학:'#3b5bdb',영어:'#0f9d58',과학:'#f59e0b',사회:'#8b5cf6'};
  function getCellColor(subj){
    for(const [k,v] of Object.entries(SC_COLORS)){ if(subj&&subj.includes(k)) return v; }
    return '#64748b';
  }

  // 시간 범위 계산
  const hours = Object.keys(aiMap).map(k=>parseInt(k.split('-')[1])).filter(h=>!isNaN(h));
  const minH = hours.length ? Math.min(...hours) : 6;
  const maxH = hours.length ? Math.max(...hours) : 22;

  // 시간표 HTML 생성
  let ttHtml = '<table class="tt" style="width:100%;border-collapse:collapse;font-size:10px">';
  ttHtml += '<tr><th class="tt-th" style="width:30px">시간</th>';
  DAYS.forEach(d=>{ ttHtml += `<th class="tt-th" style="${d==='토'||d==='일'?'color:#e53935':''}">${d}</th>`; });
  ttHtml += '</tr>';

  for(let h=minH; h<=maxH; h++){
    ttHtml += `<tr><td class="tt-td tt-time">${h}시</td>`;
    DAYS.forEach(d=>{
      const key = d+'-'+h;
      const subj = aiMap[key]||'';
      const col = subj ? getCellColor(subj) : '';
      ttHtml += subj
        ? `<td class="tt-td" style="background:${col}20;color:${col};font-weight:700;text-align:center">${subj.length>3?subj.slice(0,3)+'..':subj}</td>`
        : `<td class="tt-td"></td>`;
    });
    ttHtml += '</tr>';
  }
  ttHtml += '</table>';

  // 과목별 시간 통계
  const stats = {};
  Object.values(aiMap).forEach(subj=>{ if(subj) stats[subj]=(stats[subj]||0)+1; });
  const total = Object.values(stats).reduce((a,v)=>a+v,0);
  const statsHtml = Object.entries(stats).sort((a,b)=>b[1]-a[1]).map(([subj,cnt])=>{
    const col = getCellColor(subj);
    const pct = total ? Math.round(cnt/total*100) : 0;
    return `<div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="font-weight:700;color:${col}">${subj}</span>
        <span>${cnt}시간 (${pct}%)</span>
      </div>
      <div style="background:#e2e8f0;height:8px;border-radius:4px;overflow:hidden">
        <div style="background:${col};height:8px;width:${pct}%;border-radius:4px"></div>
      </div>
    </div>`;
  }).join('');

  const body = `
    <div style="background:linear-gradient(135deg,#3b5bdb,#1d4ed8);color:#fff;padding:18px 20px;border-radius:10px;margin-bottom:20px">
      <div style="font-size:9px;color:#93c5fd;letter-spacing:2px;margin-bottom:4px">AI 추천 주간 학습 플랜 · ${new Date().toLocaleDateString('ko-KR')}</div>
      <div style="font-size:20px;font-weight:900;margin-bottom:4px">${esc(s.name)}</div>
      <div style="font-size:11px;color:#bfdbfe">${esc(s.school||'')} · ${esc(s.grade||'')} · 내신 ${gAvg(s.subjects).toFixed(2)}등급</div>
    </div>
    <h3>📅 AI 추천 주간 시간표</h3>
    <div style="overflow-x:auto;margin-bottom:16px">${ttHtml}</div>
    <h3>📊 과목별 학습 시간 배분</h3>
    <div style="margin-bottom:16px">${statsHtml}</div>
    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;font-size:11px;color:#475569;line-height:1.8">
      <strong style="color:#1e40af">💡 AI 추천 안내</strong><br>
      본 시간표는 학생의 내신 성적, 지원 대학 목표 및 학습 조건을 분석하여 AI가 자동 생성한 추천 플랜입니다.<br>
      실제 학습 상황에 맞게 담당 선생님과 조율하여 활용하세요.
    </div>
  `;

  popPrint(`${esc(s.name)} - AI 추천 주간 학습 플랜`, body);
}

function saveWeeklyHistory(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  if(!Object.keys(s.weeklyPlan||{}).length){ alert('학습플랜이 비어있습니다. 먼저 학습플랜을 입력해주세요.'); return; }

  const dateStr = prompt('저장할 주간 날짜를 입력하세요 (예: 2026-05-05)', new Date().toISOString().slice(0,10));
  if(!dateStr) return;

  const memo = prompt('이번 주 메모 (선택사항)', '') || '';

  // 날짜 → 월/주차 자동 계산
  const d = new Date(dateStr);
  if(isNaN(d.getTime())){ alert('날짜 형식이 올바르지 않습니다.'); return; }
  const month = d.getMonth()+1;
  const year = d.getFullYear();
  // 해당 월의 첫째 날 기준 주차
  const firstDay = new Date(year, d.getMonth(), 1);
  const weekNum = getWeekOfMonth(d.getFullYear(),d.getMonth()+1,d.getDate());
  const label = `${year}년 ${month}월 ${weekNum}주차`;

  const entry = {
    id: Date.now(),
    date: dateStr,
    label,
    year, month, weekNum,
    plan: {...(s.weeklyPlan||{})},
    bookMap: {...(s.weeklyBookMap||{})},
    subjPlans: JSON.parse(JSON.stringify(s.weeklySubjPlans||{})),
    memo,
  };

  const history = [...(s.weeklyHistory||[])];
  // 같은 날짜 덮어쓰기 여부 확인
  const existIdx = history.findIndex(h=>h.date===dateStr);
  if(existIdx>=0){
    if(!confirm(`${dateStr} 이력이 이미 있습니다. 덮어쓸까요?`)) return;
    history[existIdx] = entry;
  } else {
    history.push(entry);
    history.sort((a,b)=>a.date.localeCompare(b.date));
  }

  upd({...s, weeklyHistory: history});
  alert(`✅ "${label}" 이력이 저장되었습니다.\n📆 주간 이력 탭에서 확인하세요.`);
}

  // 연도 목록 추출
  const years = [...new Set(allHistory.map(h=>h.year))].sort((a,b)=>b-a);
  const fy = ST.histFilterYear || years[0];
  const fm = ST.histFilterMonth; // null = 전체 월
  const fw = ST.histFilterWeek; // null = 전체 주차

  // 필터 적용
  const history = allHistory.filter(h=>{
    if(h.year!==fy) return false;
    if(fm && h.month!==fm) return false;
    if(fw && h.weekNum!==fw) return false;
    return true;
  });

  // 선택된 연도의 월 목록
  const monthsInYear = [...new Set(allHistory.filter(h=>h.year===fy).map(h=>h.month))].sort((a,b)=>a-b);
  // 선택된 월의 주차 목록
  const weeksInMonth = fm ? [...new Set(allHistory.filter(h=>h.year===fy&&h.month===fm).map(h=>h.weekNum))].sort((a,b)=>a-b) : [];

  // 월별 그룹핑 (필터된 데이터)
  const byMonth = {};
  history.forEach(h=>{
    const key=`${h.year}-${String(h.month).padStart(2,'0')}`;
    if(!byMonth[key]) byMonth[key]={label:`${h.year}년 ${h.month}월`,entries:[]};
    byMonth[key].entries.push(h);
  });

  return`<div>
    <!-- ── 연도/월/주차 필터 ── -->
    <div class="box" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <div style="font-size:12px;font-weight:700;color:#1a1a2e">📆 이력 필터</div>
        <div style="display:flex;gap:6px;align-items:center">
          <button onclick="printWeeklyHistory(${s.id})"
            style="background:#0f9d58;color:#fff;border:none;border-radius:8px;padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer">🖨️ 전체 인쇄</button>
          <button onclick="exportHistoryXls(${s.id})"
            style="background:#10b98118;color:#0f9d58;border:1.5px solid #10b98140;border-radius:8px;padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer">📊 엑셀</button>
        </div>
      </div>

      <!-- 연도 선택 -->
      <div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap">
        ${years.map(y=>`<button onclick="ST.histFilterYear=${y};ST.histFilterMonth=null;ST.histFilterWeek=null;render()"
          style="background:${fy===y?'#3b5bdb':'#f4f6fb'};color:${fy===y?'#fff':'#555'};border:1.5px solid ${fy===y?'#3b5bdb':'#e8eaf6'};border-radius:8px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer">
          ${y}년
        </button>`).join('')}
      </div>

      <!-- 월 선택 -->
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:${weeksInMonth.length?'8':'0'}px">
        <button onclick="ST.histFilterMonth=null;ST.histFilterWeek=null;render()"
          style="background:${!fm?'#3b5bdb':'#f4f6fb'};color:${!fm?'#fff':'#555'};border:1.5px solid ${!fm?'#3b5bdb':'#e8eaf6'};border-radius:7px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer">전체</button>
        ${monthsInYear.map(m=>`<button onclick="ST.histFilterMonth=${m};ST.histFilterWeek=null;render()"
          style="background:${fm===m?'#3b5bdb':'#f4f6fb'};color:${fm===m?'#fff':'#555'};border:1.5px solid ${fm===m?'#3b5bdb':'#e8eaf6'};border-radius:7px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer">
          ${m}월
        </button>`).join('')}
      </div>

      <!-- 주차 선택 (월 선택 시) -->
      ${weeksInMonth.length?`<div style="display:flex;gap:4px;flex-wrap:wrap">
        <button onclick="ST.histFilterWeek=null;render()"
          style="background:${!fw?'#6366f1':'#f4f6fb'};color:${!fw?'#fff':'#6366f1'};border:1.5px solid ${!fw?'#6366f1':'#c5cae9'};border-radius:7px;padding:4px 11px;font-size:10px;font-weight:700;cursor:pointer">전체 주차</button>
        ${weeksInMonth.map(w=>`<button onclick="ST.histFilterWeek=${w};render()"
          style="background:${fw===w?'#6366f1':'#f4f6fb'};color:${fw===w?'#fff':'#6366f1'};border:1.5px solid ${fw===w?'#6366f1':'#c5cae9'};border-radius:7px;padding:4px 11px;font-size:10px;font-weight:700;cursor:pointer">
          ${w}주차
        </button>`).join('')}
      </div>`:''}
    </div>

    <!-- ── 필터 결과 요약 ── -->
    ${history.length===0?`<div style="text-align:center;padding:30px;background:#f8f9ff;border-radius:12px;color:#888;border:2px dashed #dde1f0">
      <div style="font-size:24px;margin-bottom:8px">📭</div>
      <div style="font-size:13px;font-weight:700">선택한 기간에 저장된 이력이 없습니다</div>
    </div>`:`
    <div class="box" style="margin-bottom:14px;border-left:4px solid #0f9d58">
      <div style="font-size:12px;font-weight:700;color:#0f9d58;margin-bottom:10px">📊 ${fy}년 ${fm?fm+'월 ':''} ${fw?fw+'주차 ':''}이력 요약</div>
      <div class="g3">
        <div class="stat"><div class="sv" style="color:#0f9d58">${history.length}주</div><div class="sl">이력 수</div></div>
        <div class="stat"><div class="sv" style="color:#3b5bdb">${Object.keys(byMonth).length}개월</div><div class="sl">기록 월수</div></div>
        <div class="stat"><div class="sv" style="color:#f59e0b">${(()=>{const tot=history.reduce((a,h)=>a+Object.values(h.plan||{}).length,0);return Math.round(tot/Math.max(history.length,1));})()}h</div><div class="sl">주 평균</div></div>
      </div>
    </div>

    <!-- 월별 카드 -->
    ${Object.entries(byMonth).sort(([a],[b])=>b.localeCompare(a)).map(([mKey,mData])=>`
    <div class="box" style="margin-bottom:16px;border-left:4px solid #3b5bdb">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:14px;font-weight:800;color:#1a1a2e">📅 ${mData.label}</div>
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:11px;color:#888">${mData.entries.length}주차 기록</span>
          <button onclick="printWeeklyHistoryMonth(${s.id},'${mKey}')"
            style="background:#eef1ff;color:#3b5bdb;border:1px solid #c5cae9;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;cursor:pointer">🖨️ 이달 인쇄</button>
        </div>
      </div>

      <!-- 이달 누적 통계 -->
      ${(()=>{
        const mStats={};
        mData.entries.forEach(h=>Object.values(h.plan||{}).forEach(subj=>{mStats[subj]=(mStats[subj]||0)+1;}));
        const mTotal=Object.values(mStats).reduce((a,v)=>a+v,0);
        if(!mTotal) return '';
        return`<div style="margin-bottom:14px;padding:10px 12px;background:#f8f9ff;border-radius:8px;border:1px solid #e8eaf6">
          <div style="font-size:10px;color:#888;font-weight:600;margin-bottom:8px">이 달 과목별 누적 학습</div>
          ${Object.entries(mStats).sort((a,b)=>b[1]-a[1]).map(([subj,hrs])=>{
            const col=SC[subj]||'#3b5bdb';const pct=Math.round(hrs/mTotal*100);
            return`<div style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
              <span style="color:${col};font-weight:700">${esc(subj)}</span>
              <span style="color:#555">${hrs}h (${pct}%)</span></div>
              <div class="bb"><div class="bf" style="width:${pct}%;background:${col}"></div></div></div>`;
          }).join('')}
        </div>`;
      })()}

      <!-- 주차별 카드 -->
      ${mData.entries.map(h=>{
        const hStats={};
        Object.values(h.plan||{}).forEach(subj=>{hStats[subj]=(hStats[subj]||0)+1;});
        const hTotal=Object.values(hStats).reduce((a,v)=>a+v,0);
        const usedH=[...new Set(Object.keys(h.plan||{}).map(k=>+k.split('-')[1]))].filter(n=>!isNaN(n)).sort((a,b)=>a-b);
        const minH2=usedH[0]??6,maxH2=usedH[usedH.length-1]??23;
        const printHours=[];for(let hh=minH2;hh<=maxH2;hh++)printHours.push(hh);

        return`<div style="border:1.5px solid #e8eaf6;border-radius:10px;padding:12px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;cursor:pointer"
            onclick="ST._historyOpen=ST._historyOpen===${h.id}?null:${h.id};render()">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="background:#eef1ff;color:#3b5bdb;border-radius:20px;padding:2px 11px;font-size:11px;font-weight:700">${esc(h.label)}</span>
              <span style="font-size:11px;color:#888">${esc(h.date)}</span>
              <span style="font-size:11px;color:#555;font-weight:600">${hTotal}h</span>
            </div>
            <div style="display:flex;gap:5px;align-items:center">
              <button onclick="event.stopPropagation();if(confirm('이 이력을 현재 학습플랜으로 불러올까요?')){upd({...ST.sel,weeklyPlan:{...h.plan},weeklyBookMap:{...h.bookMap},weeklySubjPlans:JSON.parse(JSON.stringify(h.subjPlans||{}))});ST.weekTab='tt';render();alert('불러오기 완료!')};"
                style="background:#eef1ff;color:#3b5bdb;border:1px solid #c5cae9;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer">📥 불러오기</button>
              <button onclick="event.stopPropagation();printWeeklyHistoryOne(${s.id},${h.id})"
                style="background:#f0fdf4;color:#0f9d58;border:1px solid #86efac;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer">🖨️ 인쇄</button>
              <button onclick="event.stopPropagation();deleteWeeklyHistory('${s.id}','${h.id}')"
                style="background:#fff0f0;color:#e53935;border:1px solid #fecaca;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer">삭제</button>
              <span style="color:#aaa;font-size:14px">${ST._historyOpen===h.id?'▲':'▼'}</span>
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:${ST._historyOpen===h.id?'12':'0'}px">
            ${Object.entries(hStats).sort((a,b)=>b[1]-a[1]).map(([subj,hrs])=>{
              const col=SC[subj]||'#3b5bdb';
              return`<span style="background:${col}18;color:${col};border:1px solid ${col}44;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:600">${esc(subj)} ${hrs}h</span>`;
            }).join('')}
          </div>
          ${ST._historyOpen===h.id?`
          ${printHours.length?`<div style="overflow-x:auto;margin-bottom:10px">
            <table style="border-collapse:collapse;width:100%;min-width:320px;font-size:9px">
              <tr>
                <th style="background:#f4f6fb;border:1px solid #e8eaf6;padding:4px 3px;width:24px;color:#888">시간</th>
                ${DAYS.map(d=>`<th style="background:#f4f6fb;border:1px solid #e8eaf6;padding:4px 2px;text-align:center;color:${d==='토'||d==='일'?'#e53935':'#555'};font-weight:700">${d}</th>`).join('')}
              </tr>
              ${printHours.map(hh=>`<tr>
                <td style="background:#f4f6fb;border:1px solid #e8eaf6;padding:3px;text-align:center;color:#888;font-size:8px;font-weight:600">${hh}시</td>
                ${DAYS.map(d=>{
                  const subj=(h.plan||{})[`${d}-${hh}`];
                  const bk=(h.bookMap||{})[`${d}-${hh}`]||'';
                  const col=subj?(SC[subj]||'#3b5bdb'):null;
                  return subj?`<td style="background:${col}22;border:1px solid ${col}44;text-align:center;padding:2px 1px">
                    <div style="color:${col};font-weight:700;font-size:8px;line-height:1.4">${esc(subj)}</div>
                    ${bk?`<div style="color:${col};opacity:.7;font-size:7px">${esc(bk)}</div>`:''}
                  </td>`:`<td style="border:1px solid #e8eaf6"></td>`;
                }).join('')}
              </tr>`).join('')}
            </table>
          </div>`:''}
          ${h.memo?`<div style="padding:8px 10px;background:#fffbeb;border-radius:7px;border-left:3px solid #f59e0b;font-size:11px;color:#444;line-height:1.6"><strong>📝</strong> ${esc(h.memo)}</div>`:''}
          `:''}
        </div>`;
      }).join('')}
    </div>`).join('')}`}

    <div style="text-align:center;margin-top:10px">
      <button onclick="printWeeklyHistory(${s.id})"
        style="background:#3b5bdb;color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:13px;font-weight:700;cursor:pointer">
        🖨️ 전체 주간 이력 인쇄/PDF
      </button>
    </div>
  </div>`;
}

  
// ══ 플랜점검 탭 ══
function renderAchieve(s){
  const now=new Date();
  const cy=now.getFullYear(),cm=now.getMonth()+1,cw=getWeekOfMonth(cy,cm,now.getDate());
  const wy=ST.weekYear||cy,wm=ST.weekMonth||cm,ww=ST.weekWeek||cw;
  const wKey=getWeekNum(wy,wm,ww);
  const wLabel=getWeekLabel(wy,wm,ww);
  const isCurrentWeek=wy===cy&&wm===cm&&ww===cw;
  const history=s.weeklyHistory||[];
  const hEntry=history.find(h=>h.date&&getWeekNum(h.year,h.month,h.weekNum)===wKey);
  const plan=isCurrentWeek?(s.weeklyPlan||{}):(hEntry?.plan||{});
  const subjPlans=isCurrentWeek?(s.weeklySubjPlans||{}):(hEntry?.subjPlans||{});
  const stats={};Object.values(plan).forEach(x=>{stats[x]=(stats[x]||0)+1;});
  const studySubjs=Object.keys(stats).filter(x=>x!=='휴식'&&x!=='자습');
  const inspect=(s.weeklyInspect||{})[wKey]||{};
  const tots=studySubjs.reduce((a,subj)=>{const v=inspect[subj]||{};a.p+=(stats[subj]||0);a.r+=(+v.actual||0);return a;},{p:0,r:0});
  const overallPct=tots.p&&tots.r?Math.round(tots.r/tots.p*100):null;

  window._saveInspect=(wk,subj,field,val)=>{
    const s2=ST.sel||ST.adminSel;
    const wi=JSON.parse(JSON.stringify(s2.weeklyInspect||{}));
    if(!wi[wk])wi[wk]={};if(!wi[wk][subj])wi[wk][subj]={};
    wi[wk][subj][field]=val;
    const u={...s2,weeklyInspect:wi};
    ST.students=ST.students.map(x=>x.id===s2.id?u:x);
    if(String(ST.sel?.id)===String(s2.id))ST.sel=u;
    if(ST.adminSel?.id===s2.id)ST.adminSel=u;
    save();
  };

  // 작은 방향 버튼 (상향/유지/하향)
  const dirBtns=(field,cur,colors)=>['상향','유지','하향'].map(opt=>{
    const c=colors?.[opt]||(opt==='상향'?'#0f9d58':opt==='하향'?'#e53935':'#3b5bdb');
    const icon=opt==='상향'?'▲':opt==='하향'?'▼':'━';
    const isAct=cur===opt;
    return`<button onclick="event.stopPropagation();window._saveInspect('${field.wk}','${field.subj}','${field.key}','${opt}');render()"
      style="flex:1;background:${isAct?c:'#fff'};color:${isAct?'#fff':c};border:1.5px solid ${isAct?c:c+'44'};border-radius:6px;padding:5px 2px;font-size:10px;font-weight:700;cursor:pointer;text-align:center">
      ${icon} ${opt}</button>`;
  }).join('');

  return`<div>
    <!-- 주차 선택 -->
    <div style="background:#fff;border-radius:12px;border:1.5px solid #e8eaf6;padding:14px 16px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:10px">📅 점검할 주차 선택 <span style="font-size:10px;color:#aaa;font-weight:400">(저장된 이력 있는 주차만 표시)</span></div>
      ${history.length===0?`<div style="background:#f8f9ff;border-radius:8px;padding:12px;text-align:center;font-size:12px;color:#aaa">저장된 이력이 없습니다.</div>`:`
      ${(()=>{
        const byYear={};
        history.slice().sort((a,b)=>b.date.localeCompare(a.date)).forEach(h=>{
          if(!byYear[h.year])byYear[h.year]=[];byYear[h.year].push(h);
        });
        return Object.entries(byYear).sort(([a],[b])=>b-a).map(([yr,hs])=>`
          <div style="margin-bottom:10px">
            <div style="font-size:11px;font-weight:600;color:#999;margin-bottom:6px">${yr}년</div>
            <div style="display:flex;flex-wrap:wrap;gap:5px">
              ${hs.map(h=>{
                const hk=getWeekNum(h.year,h.month,h.weekNum);
                const isAct=wKey===hk;
                const done=Object.keys((s.weeklyInspect||{})[hk]||{}).length>0;
                return`<button onclick="ST.weekYear=${h.year};ST.weekMonth=${h.month};ST.weekWeek=${h.weekNum};render()"
                  style="background:${isAct?'#8b5cf6':done?'#f0fdf4':'#fff'};color:${isAct?'#fff':done?'#166534':'#555'};border:1.5px solid ${isAct?'#8b5cf6':done?'#86efac':'#e0e3ef'};border-radius:8px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;line-height:1.5;text-align:left">
                  <div style="font-weight:800">${h.year}년 ${h.month}월 ${h.weekNum}주차${done&&!isAct?' ✅':''}</div>
                  <div style="font-size:10px;opacity:.7">${h.date}</div>
                </button>`;
              }).join('')}
            </div>
          </div>`).join('');
      })()}
      ${!history.find(h=>getWeekNum(h.year,h.month,h.weekNum)===getWeekNum(cy,cm,cw))?`
        <div style="border-top:1px dashed #e8eaf6;padding-top:8px">
          <div style="font-size:10px;color:#aaa;margin-bottom:6px">현재 주차 (이력 미저장)</div>
          <button onclick="ST.weekYear=${cy};ST.weekMonth=${cm};ST.weekWeek=${cw};render()"
            style="background:${isCurrentWeek?'#8b5cf6':'#fff'};color:${isCurrentWeek?'#fff':'#8b5cf6'};border:2px solid ${isCurrentWeek?'#8b5cf6':'#c4b5fd'};border-radius:8px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;line-height:1.5">
            <div style="font-weight:800">${cy}년 ${cm}월 ${cw}주차 (현재)</div>
          </button>
        </div>`:``}
      `}
    </div>

    <!-- 타이틀 + 버튼 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <div style="font-size:14px;font-weight:900;color:#8b5cf6">🔍 ${wLabel} 플랜점검</div>
      <div style="display:flex;gap:5px">
        <button onclick="printAchieve(${s.id})" style="background:#8b5cf6;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer">🖨️ 인쇄/PDF</button>
        <button onclick="exportAchieveXls(${s.id})" style="background:#f0fdf4;color:#0f9d58;border:1.5px solid #86efac;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer">📊 엑셀</button>
      </div>
    </div>

    ${studySubjs.length===0?`<div style="background:#f8f9ff;border-radius:12px;border:2px dashed #dde1f0;padding:32px;text-align:center;color:#aaa">
      <div style="font-size:28px;margin-bottom:8px">📅</div>
      <div style="font-size:13px;font-weight:700">이 주차에 학습플랜 데이터가 없습니다</div>
    </div>`:`

    <!-- 과목 요약 칩 -->
    <div style="background:#fff;border-left:4px solid #3b5bdb;border-radius:10px;border:1.5px solid #e8eaf6;padding:12px 14px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:#3b5bdb;margin-bottom:8px">📅 ${wLabel} 플랜 요약</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${studySubjs.map(subj=>{
          const col=SC[subj]||'#3b5bdb';
          const h=stats[subj];
          const ins=inspect[subj]||{};
          const actual=ins.actual!=null&&ins.actual!==''?+ins.actual:null;
          const pct=actual!=null&&h?Math.round(actual/h*100):null;
          const pcol=pct!=null?(pct>=90?'#0f9d58':pct>=70?'#f59e0b':'#e53935'):col;
          return`<div style="background:${col}10;border:1.5px solid ${col}33;border-radius:20px;padding:4px 14px;display:flex;align-items:center;gap:6px">
            <span style="font-size:13px;font-weight:800;color:${col}">${esc(subj)} ${h}h</span>

// ── 플랜점검 인쇄 ──
function printAchieve(sid){
  const s=ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  const now0=new Date();
  const cy0=now0.getFullYear(),cm0=now0.getMonth()+1,cw0=getWeekOfMonth(cy0,cm0,now0.getDate());
  const wy=ST.weekYear||cy0,wm=ST.weekMonth||cm0,ww=ST.weekWeek||cw0;
  const wKey=getWeekNum(wy,wm,ww);
  const wLabel=getWeekLabel(wy,wm,ww);
  const now=new Date();
  const isCurrentWeek=wy===now.getFullYear()&&wm===now.getMonth()+1&&ww===getWeekOfMonth(wy,wm,now.getDate());
  const hEntry=(s.weeklyHistory||[]).find(h=>h.date&&getWeekNum(h.year,h.month,h.weekNum)===wKey);
  const plan=isCurrentWeek?(s.weeklyPlan||{}):(hEntry?.plan||{});
  const subjPlans=isCurrentWeek?(s.weeklySubjPlans||{}):(hEntry?.subjPlans||{});
  const bm=isCurrentWeek?(s.weeklyBookMap||{}):(hEntry?.bookMap||{});
  const stats={};Object.values(plan).forEach(x=>{stats[x]=(stats[x]||0)+1;});
  const studySubjs=Object.keys(stats).filter(x=>x!=='휴식'&&x!=='자습');
  const inspect=(s.weeklyInspect||{})[wKey]||{};
  const tots=studySubjs.reduce((a,subj)=>{const v=inspect[subj]||{};a.p+=stats[subj]||0;a.r+=(+v.actual||0);return a;},{p:0,r:0});
  const overallPct=tots.p&&tots.r?Math.round(tots.r/tots.p*100):null;

  // 시간표 미니뷰
  const usedH=[...new Set(Object.keys(plan).map(k=>+k.split('-')[1]))].filter(n=>!isNaN(n)).sort((a,b)=>a-b);
  const minH=usedH[0]??6,maxH=usedH[usedH.length-1]??23;
  const ph=[];for(let h=minH;h<=maxH;h++)ph.push(h);

  let body=`<div style="background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;padding:16px 20px;border-radius:10px;margin-bottom:16px">
    <div style="font-size:9px;color:#ddd6fe;letter-spacing:2px;margin-bottom:3px">플랜 점검표 · SG상담플랫폼 · ${td()}</div>
    <div style="font-size:20px;font-weight:900;margin-bottom:2px">${esc(s.name)} · ${wLabel}</div>
    <div style="font-size:11px;color:#e9d5ff">${esc(s.school)} · ${esc(s.grade)}${s.className?' · '+esc(s.className):''} · 담당: ${esc(s.counselor)}</div>
    <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
      ${[['총 과목',studySubjs.length+'개'],['계획시간',tots.p+'h'],['순공시간',tots.r+'h'],['전체달성',overallPct!==null?overallPct+'%':'–']].map(([l,v])=>`<div style="background:rgba(255,255,255,.15);border-radius:7px;padding:6px 12px;text-align:center"><div style="font-size:13px;font-weight:900">${v}</div><div style="font-size:9px;color:#ddd6fe;margin-top:1px">${l}</div></div>`).join('')}
    </div>
  </div>`;

  // 시간표
  if(ph.length){
    body+=`<h3>📅 주간 학습플랜</h3><table class="tt" style="margin-bottom:14px">
      <tr><th style="width:24px;font-size:8px">시간</th>${DAYS.map(d=>`<th style="${d==='토'||d==='일'?'color:#e53935':''}">${d}</th>`).join('')}</tr>
      ${ph.map(h=>`<tr><td class="th-time">${h===0?"자정":h===1?"1시":h+"시"}</td>${DAYS.map(d=>{
        const subj=plan[`${d}-${h}`];const bk=bm[`${d}-${h}`]||'';const col=subj?(SC[subj]||'#3b5bdb'):null;
        return subj?`<td style="background:${col}20;color:${col};font-weight:800;font-size:9px;border:1px solid ${col}44;padding:2px 3px;text-align:center"><div>${esc(subj)}</div>${bk?`<div style="font-size:7px;opacity:.7">📖${esc(bk)}</div>`:''}</td>`:`<td></td>`;
      }).join('')}</tr>`).join('')}
    </table>`;
  }

  // 과목별 점검표
  body+=`<h3>🔍 과목별 플랜 점검</h3>`;
  if(!studySubjs.length){
    body+=`<p style="color:#888;text-align:center">이 주차에 학습플랜 데이터가 없습니다.</p>`;
  } else {
    studySubjs.forEach(subj=>{
      const col=SC[subj]||'#8b5cf6';
      const planned=stats[subj]||0;
      const sp=subjPlans[subj]||{};
      const books=(sp.books||[]).filter(Boolean);
      const ins=inspect[subj]||{};
      const actual=ins.actual!==undefined&&ins.actual!==''?ins.actual:'–';
      const pct=ins.actual!==undefined&&ins.actual!==''&&planned?Math.round(+ins.actual/planned*100):null;
      const achPct=ins.achievementPct!=null?ins.achievementPct:null;
      // 다음주 난이도: nextDiffDir + nextDiffNote
      const nextDiffStr=ins.nextDiffDir||'–';
      const nextDiffNote=ins.nextDiffNote||'';
      // 다음주 분량: nextAmountDir + nextAmountVal + nextAmountUnit
      const nextAmtStr=ins.nextAmountVal!=null
        ?`${ins.nextAmountDir||''} ${ins.nextAmountVal}${ins.nextAmountUnit||'문제'}`
        :(ins.nextAmountDir||'–');
      // 다음주 학습시간: nextTimeDir + nextTimeVal
      const nextTimeStr=ins.nextTimeVal!=null
        ?`${ins.nextTimeDir||''} ${ins.nextTimeVal}h/주`
        :(ins.nextTimeDir||'–');
      // 사용교재 (표시만)
      const bookStr=books.join(', ')||'–';

      body+=`<div class="card" style="border-left:4px solid ${col};margin-bottom:12px;page-break-inside:avoid">

// ── 플랜점검 엑셀 ──
function exportAchieveXls(sid){
  const s=ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  const wy=ST.weekYear,wm=ST.weekMonth,ww=ST.weekWeek;
  const wKey=getWeekNum(wy,wm,ww);
  const wLabel=getWeekLabel(wy,wm,ww);
  const now=new Date();
  const isCurrentWeek=wy===now.getFullYear()&&wm===now.getMonth()+1&&ww===getWeekOfMonth(wy,wm,now.getDate());
  const hEntry=(s.weeklyHistory||[]).find(h=>h.date&&getWeekNum(h.year,h.month,h.weekNum)===wKey);
  const plan=isCurrentWeek?(s.weeklyPlan||{}):(hEntry?.plan||{});
  const subjPlans=isCurrentWeek?(s.weeklySubjPlans||{}):(hEntry?.subjPlans||{});
  const stats={};Object.values(plan).forEach(x=>{stats[x]=(stats[x]||0)+1;});
  const studySubjs=Object.keys(stats).filter(x=>x!=='휴식'&&x!=='자습');
  const inspect=(s.weeklyInspect||{})[wKey]||{};

  let c=`학생,${s.name}\r\n주차,${wLabel}\r\n담당,${s.counselor}\r\n점검일,${td()}\r\n\r\n`;
  c+=`과목,사용교재,계획(h),실제순공(h),순공달성률(%),플랜달성도(%),이번주난이도,다음주난이도,다음난이도메모,이번주분량,다음주분량방향,다음분량값,다음분량단위,다음주학습시간방향,다음학습시간(h),특이사항\r\n`;
  studySubjs.forEach(subj=>{
    const planned=stats[subj]||0;
    const sp=subjPlans[subj]||{};
    const books=(sp.books||[]).filter(Boolean).join('+');
    const ins=inspect[subj]||{};
    const actual=ins.actual!==undefined&&ins.actual!==''?ins.actual:'';
    const pct=actual!==''&&planned?Math.round(+actual/planned*100):'';
    c+=[
      subj,
      books,
      planned,
      actual,
      pct,
      ins.achievementPct!=null?ins.achievementPct:'',
      ins.difficulty||'',
      ins.nextDiffDir||'',
      (ins.nextDiffNote||'').replace(/,/g,' '),
      ins.amount||'',
      ins.nextAmountDir||'',
      ins.nextAmountVal!=null?ins.nextAmountVal:'',
      ins.nextAmountUnit||'',
      ins.nextTimeDir||'',
      ins.nextTimeVal!=null?ins.nextTimeVal:'',
      (ins.note||'').replace(/,/g,' ')
    ].join(',')+'\r\n';
  });
  csv_dl(c,`${s.name}_${wLabel}_플랜점검`);
}



// ── 이력 엑셀 ──
function exportHistoryXls(sid){
  const s=ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  const fy=ST.histFilterYear||new Date().getFullYear();
  const fm=ST.histFilterMonth;
  const fw=ST.histFilterWeek;
  const history=(s.weeklyHistory||[]).filter(h=>{
    if(h.year!==fy) return false;
    if(fm&&h.month!==fm) return false;
    if(fw&&h.weekNum!==fw) return false;
    return true;
  }).sort((a,b)=>a.date.localeCompare(b.date));

  let c=`학생,${s.name}\r\n학년,${s.grade}\r\n담당,${s.counselor}\r\n\r\n주차,날짜,과목,시간(h),비율(%)\r\n`;
  history.forEach(h=>{
    const hStats={};Object.values(h.plan||{}).forEach(x=>{hStats[x]=(hStats[x]||0)+1;});
    const tot=Object.values(hStats).reduce((a,v)=>a+v,0);
    Object.entries(hStats).forEach(([subj,hrs])=>{
      c+=`${h.label},${h.date},${subj},${hrs},${tot?Math.round(hrs/tot*100):0}\r\n`;
    });
  });
  csv_dl(c,`${s.name}_주간이력`);
}

          <div>${esc(subj)}</div>${bk?`<div style="font-size:7px;opacity:.75;border-top:1px solid ${col}33;padding-top:1px">📖${esc(bk)}</div>`:''}
        </td>`:`<td></td>`;
      }).join('')}</tr>`).join('')}
    </table></div>`;
  }

  // 학습조건
  const sp2=h.subjPlans||{};
  const spEntries=Object.entries(sp2).filter(([,p])=>p?.subj&&((p.books||[]).filter(Boolean).length||p.weeklyHours));
  if(spEntries.length){
    body+=`<h3>📚 과목별 학습 조건</h3><div class="g3" style="gap:6px">
      ${spEntries.map(([subj,p])=>{const col=SC[subj]||'#3b5bdb';const books=(p.books||[]).filter(Boolean);

          ${books.length?`<div style="font-size:9px;color:#555;margin-bottom:2px">📚 ${books.join(', ')}</div>`:''}

          ${p.type?`<div style="font-size:9px;color:#555">형태: ${p.type}</div>`:''}
          ${(p.units||[]).filter(Boolean).length?`<div style="font-size:9px;color:#8b5cf6">📖 ${p.units.filter(Boolean).join(', ')}</div>`:''}
        </div>`;}).join('')}
    </div>`;
  }
  if(h.memo) body+=`<div style="margin-top:12px;padding:8px 10px;background:#fffbeb;border-radius:7px;border-left:3px solid #f59e0b;font-size:11px;color:#444"><strong>📝 메모</strong> ${esc(h.memo)}</div>`;
  popPrint(`${s.name} - ${h.label}`,body);
}

function renderWeeklyDetail(s){
  // 선택된 주차 계산
  const now0=new Date();
  const cy0=now0.getFullYear(),cm0=now0.getMonth()+1;
  const cw0=getWeekOfMonth(cy0,cm0,now0.getDate());
  const wy=ST.weekYear||cy0, wm=ST.weekMonth||cm0, ww=ST.weekWeek||cw0;
  const isCurrentWeek=(wy===cy0&&wm===cm0&&ww===cw0);
  const wKey=getWeekNum(wy,wm,ww);
  const wLabel=getWeekLabel(wy,wm,ww);

  // 현재 주차면 weeklyPlan, 이전 주차면 이력에서
  const history=s.weeklyHistory||[];
  const hEntry=history.find(h=>h.date&&getWeekNum(h.year,h.month,h.weekNum)===wKey);
  const _pw=s._planWeek||'';
  const planOk=(_pw===getWeekNum(cy0,cm0,cw0));
  const plan=isCurrentWeek?(planOk?(s.weeklyPlan||{}):{}):(hEntry&&hEntry.plan||{});
  const bm=isCurrentWeek?(planOk?(s.weeklyBookMap||{}):{}):(hEntry&&hEntry.bookMap||{});

  const stats={};Object.values(plan).forEach(x=>{stats[x]=(stats[x]||0)+1;});
  const used=[...new Set(Object.values(plan))].filter(x=>x&&x!=='휴식'&&x!=='자습');
  if(!used.length)return`<div style="text-align:center;color:#888;padding:36px 0"><div style="font-size:28px;margin-bottom:8px">📅</div><div style="font-size:13px;font-weight:600">${wLabel} 학습 플랜이 없습니다</div><div style="font-size:11px;margin-top:6px;color:#aaa">학습플랜 탭에서 시간표를 입력한 주차를 선택해주세요</div></div>`;
  return used.map(subj=>{
    const col=SC[subj]||'#3b5bdb';
    const sp=(s.weeklySubjPlans||{})[subj]||{};
    const hrs=stats[subj]||0;
    const books=(sp.books||[]).filter(Boolean);
    // 시간표에서 이 과목에 할당된 셀의 교재들 (중복 제거)
    const cellBooks=[...new Set(Object.entries(bm).filter(([k])=>plan[k]===subj).map(([,b])=>b).filter(Boolean))];
    return`<div style="background:#fff;border-radius:13px;padding:14px;margin-bottom:12px;border:1.5px solid #e8eaf6;border-top:3px solid ${col}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="display:flex;gap:9px;align-items:center">
          <div style="width:36px;height:36px;border-radius:9px;background:${col};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff">${subj[0]}</div>
          <div>
            <div style="font-size:14px;font-weight:800">${esc(subj)}</div>
            <div style="font-size:10px;color:#777">주간 ${hrs}h 배정${sp.weeklyHours?` / 목표 ${sp.weeklyHours}h`:''}</div>
          </div>
        </div>
        <button onclick="openSubjModal('${esc(subj)}')" style="background:${col};color:#fff;border:none;border-radius:7px;padding:6px 13px;font-size:11px;font-weight:700">${sp.weeklyHours||books.length?'✏️ 수정':'+ 조건 입력'}</button>
      </div>

      <!-- 교재 목록 (등록된 교재) -->
      ${books.length?`<div style="margin-bottom:8px">
        <div style="font-size:10px;color:#888;font-weight:600;margin-bottom:4px">📚 사용 교재</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${books.map(b=>`<span style="background:${col}18;color:${col};border:1.5px solid ${col}44;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600">${esc(b)}</span>`).join('')}
        </div>
      </div>`:''}

      <!-- 시간표 셀에 기록된 교재 (학생이 직접 셀에 입력한 것) -->
      ${cellBooks.length&&cellBooks.some(b=>!books.includes(b))?`<div style="margin-bottom:8px">
        <div style="font-size:10px;color:#888;font-weight:600;margin-bottom:4px">📖 시간표 개별 교재</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          ${cellBooks.filter(b=>!books.includes(b)).map(b=>`<span style="background:#f4f6fb;color:#555;border:1px solid #e8eaf6;border-radius:20px;padding:2px 10px;font-size:10px">${esc(b)}</span>`).join('')}
        </div>
      </div>`:''}

      ${sp.weeklyHours||sp.dailyHours||books.length?`<div class="g2" style="gap:6px;margin-bottom:${(sp.units||[]).filter(Boolean).length||sp.memo?'8px':'0'}">
        ${[
          ['주간목표', sp.weeklyHours?sp.weeklyHours+'h/주':'미설정'],
          ['일일목표', sp.dailyHours?sp.dailyHours+'h/일':'미설정'],
          ['형태',     sp.type==='직접입력'&&sp.typeDetail?`직접: ${sp.typeDetail}`:sp.type||'-'],
          ['분량',     sp.amountVal?(sp.amountVal+(sp.amountType==='문제수'?'문제':'p')):'미설정'],
        ].map(([l,v])=>`<div style="background:#f4f6fb;border-radius:7px;padding:7px 9px;border:1px solid #e8eaf6">
          <div style="font-size:9px;color:#888;margin-bottom:2px">${l}</div>
          <div style="font-size:12px;font-weight:700;color:#1a1a2e">${esc(v)}</div>
        </div>`).join('')}
      </div>
      <!-- 난이도 바 (difficultyMap) -->
      ${sp.difficultyMap?`<div style="margin-bottom:8px">
        <div style="font-size:10px;color:#888;font-weight:600;margin-bottom:5px">⭐ 난이도별 비율</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">
          ${[['최상','#8b5cf6'],['상','#ef4444'],['중','#f59e0b'],['하','#10b981']].map(([lv,c])=>{
            const pct=sp.difficultyMap[lv]||0;
            return (([lv2,c2,pct2])=>`<div>
              <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px">
                <span style="font-weight:700;color:${c2}">${lv2}</span><span style="color:#555;font-weight:600">${pct2}%</span>
              </div>
              <div style="background:#e8eaf6;border-radius:3px;height:7px;overflow:hidden">
                <div style="height:100%;border-radius:3px;background:${pct2>0?c2:'#e8eaf6'};width:${pct2}%"></div>
              </div>
            </div>`)([lv,c,pct]);
          }).join('')}
        </div>
      </div>`:''}
      `:''}

      ${(sp.units||[]).filter(Boolean).length?`<div style="margin-bottom:7px;font-size:10px;color:#777">
        📖 <span style="font-weight:600">학습 단원</span>
        ${sp.units.filter(Boolean).map(u=>`<span style="background:#8b5cf618;color:#8b5cf6;border-radius:4px;padding:1px 7px;margin-left:3px;font-weight:600">${esc(u)}</span>`).join('')}
      </div>`:''}
      ${sp.memo?`<div style="padding:8px 10px;background:#f4f6fb;border-radius:8px;font-size:11px;color:#555;border-left:3px solid ${col};line-height:1.6">${esc(sp.memo)}</div>`:''}
    </div>`;
  }).join('');
}

            style="flex:1;background:${(sp.amountType||'문제수')==='문제수'?'#3b5bdb':'#f4f6fb'};color:${(sp.amountType||'문제수')==='문제수'?'#fff':'#888'};border:1.5px solid ${(sp.amountType||'문제수')==='문제수'?'#3b5bdb':'#e8eaf6'};border-radius:7px;padding:6px 4px;font-size:10px;font-weight:600">문제수</button>
          <button id="sp_ap" onclick="this.style.background='#3b5bdb';this.style.color='#fff';document.getElementById('sp_aq').style.background='#f4f6fb';document.getElementById('sp_aq').style.color='#888'"
            style="flex:1;background:${(sp.amountType||'문제수')==='페이지'?'#3b5bdb':'#f4f6fb'};color:${(sp.amountType||'문제수')==='페이지'?'#fff':'#888'};border:1.5px solid ${(sp.amountType||'문제수')==='페이지'?'#3b5bdb':'#e8eaf6'};border-radius:7px;padding:6px 4px;font-size:10px;font-weight:600">페이지</button>
        </div>
        <input type="number" id="sp_av" class="inp" placeholder="숫자" value="${sp.amountVal||''}">
      </div>
    </div>

    <!-- 난이도 (최상/상/중/하 순, 합계 100% 연동 제한) -->
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:11px;color:#777;font-weight:600">⭐ 난이도별 비율 <span style="font-size:9px;font-weight:400">(합계 100%)</span></div>
        <span id="sp_diff_total" style="font-size:11px;font-weight:700;color:${(()=>{const d=sp.difficultyMap||{최상:0,상:0,중:0,하:0};const tot=Object.values(d).reduce((a,v)=>a+(+v||0),0);return tot===100?'#0f9d58':tot>100?'#e53935':'#f59e0b';})()}">${(()=>{const d=sp.difficultyMap||{최상:0,상:0,중:0,하:0};return Object.values(d).reduce((a,v)=>a+(+v||0),0);})()}%</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${[['최상','#8b5cf6'],['상','#ef4444'],['중','#f59e0b'],['하','#10b981']].map(([lv,c],idx)=>{
          const dm=sp.difficultyMap||{최상:0,상:0,중:0,하:0};
          const val=dm[lv]??0;
          const allLevels=['최상','상','중','하'];
          // 현재 레벨의 max = 100 - 앞 레벨들의 합
          const prevSum=allLevels.slice(0,idx).reduce((a,k)=>a+(dm[k]||0),0);
          const maxVal=Math.max(0,100-prevSum);
          return`<div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="font-size:12px;font-weight:800;color:${c}">${lv}</span>
              <span id="sp_dv_${lv}" style="font-size:12px;font-weight:700;color:${c}">${val}%</span>
            </div>
            <input type="range" min="0" max="${maxVal}" step="5" value="${Math.min(val,maxVal)}"
              style="width:100%;accent-color:${c};cursor:pointer;height:6px"
              data-dlv="${lv}"
              oninput="
                const allLvs=['최상','상','중','하'];
                const myIdx=allLvs.indexOf('${lv}');
                const v=+this.value;
                document.getElementById('sp_dv_${lv}').textContent=v+'%';
                document.getElementById('sp_dbar2_${lv}').style.width=v+'%';
                document.getElementById('sp_dbar2_${lv}').style.background=v>0?'${c}':'#e8eaf6';
                // 남은 % 계산 → 이후 슬라이더 max 제한
                let used=0;
                for(let i=0;i<=myIdx;i++){
                  const el=document.querySelector('[data-dlv='+allLvs[i]+']');
                  if(el) used+=+el.value;
                }
                let remaining=100-used;
                for(let i=myIdx+1;i<allLvs.length;i++){
                  const sl=document.querySelector('[data-dlv='+allLvs[i]+']');
                  if(!sl) continue;
                  const newMax=Math.max(0,remaining);
                  sl.max=newMax;
                  if(+sl.value>newMax){sl.value=newMax;document.getElementById('sp_dv_'+allLvs[i]).textContent=newMax+'%';document.getElementById('sp_dbar2_'+allLvs[i]).style.width=newMax+'%';}
                  remaining-=Math.min(+sl.value,newMax);
                }
                // 합계 갱신
                let tot=allLvs.reduce((a,k)=>{const el=document.querySelector('[data-dlv='+k+']');return a+(el?+el.value:0);},0);
                const totEl=document.getElementById('sp_diff_total');
                if(totEl){totEl.textContent=tot+'%';totEl.style.color=tot===100?'#0f9d58':tot>100?'#e53935':'#f59e0b';}
              ">
            <div style="background:#e8eaf6;border-radius:3px;height:8px;margin-top:4px;overflow:hidden">
              <div id="sp_dbar2_${lv}" style="height:100%;border-radius:3px;background:${val>0?c:'#e8eaf6'};width:${Math.min(val,maxVal)}%;transition:width .1s"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- 선생님 메모 -->
    <div style="margin-bottom:18px">
      <div style="font-size:11px;color:#777;margin-bottom:4px;font-weight:600">📝 선생님 메모</div>
      <textarea id="sp_memo" class="inp" rows="2" style="resize:none" placeholder="학습 방향, 학부모 전달사항 등">${esc(sp.memo||'')}</textarea>

function saveConsult(sid){
  const ctype = document.getElementById('c_type')?.value||'기타';
  const date = document.getElementById('c_date')?.value;
  const counselor = document.getElementById('c_counselor')?.value;
  const topic = document.getElementById('c_topic')?.value?.trim();
  const memo = document.getElementById('c_memo')?.value?.trim();
  if(!ctype||ctype===''){alert('상담 유형을 선택해주세요.');return;}
  if(!topic){alert('상담 주제를 입력해주세요.');return;}
  if(!memo){alert('상담 내용을 입력해주세요.');return;}
  const aiAnalysis = document.getElementById('ai_consult_result')?.textContent?.trim()||'';
  const s = ST.students.find(x=>String(x.id)===String(sid));
  upd({...s, consultations:[...(s.consultations||[]),{date,counselor,topic,memo,ctype,aiAnalysis}]});
  ST.consultAdding = null;
}

function updateConsult(sid, idx){
  const ctype = document.getElementById(`ce_type_${idx}`)?.value||'기타';
  const date = document.getElementById(`ce_date_${idx}`)?.value;
  const counselor = document.getElementById(`ce_counselor_${idx}`)?.value;
  const topic = document.getElementById(`ce_topic_${idx}`)?.value?.trim();
  const memo = document.getElementById(`ce_memo_${idx}`)?.value?.trim();
  if(!topic||!memo){alert('주제와 내용을 입력해주세요.');return;}
  const s = ST.students.find(x=>String(x.id)===String(sid));
  const newList = s.consultations.map((c,i)=>i===idx?{...c,date,counselor,topic,memo,ctype}:c);
  upd({...s, consultations:newList});
  ST.consultEditId = null;
}

// AI 상담 분석
async function runAiConsultAnalysis(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid));
  if(!s) return;
  const topic = document.getElementById('c_topic')?.value?.trim();
  const memo = document.getElementById('c_memo')?.value?.trim();
  const ctype = document.getElementById('c_type')?.value||'기타';
  if(!topic||!memo){alert('상담 주제와 내용을 먼저 입력해주세요.');return;}
  const apiKey=(window.ANTHROPIC_API_KEY||window._sharedApiKey||localStorage.getItem('apiKey')||'').trim();
  if(!apiKey){alert('API 키를 먼저 설정해주세요.');return;}
  const el = document.getElementById('ai_consult_result');
  if(el) el.textContent='⏳ AI 분석 중...';
  const prompt=`학원 상담 기록을 분석해주세요.

학생: ${s.name} (${s.grade}, ${s.school})
상담 유형: ${ctype}
상담 주제: ${topic}
상담 내용: ${memo}

아래 항목으로 간결하게 분석해주세요 (총 200자 이내):
1. 핵심 파악: 학생의 주요 상황
2. 주요 이슈: 개선이 필요한 점
3. 권장 조치: 다음 상담 전 실행 사항`;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = data.content?.[0]?.text||'분석 실패';
    if(el) el.textContent = text;
  }catch(e){
    if(el) el.textContent = '오류: '+e.message;
  }
}

window._sfExtraSubjs = _sfExtraSubjs;

window._sfAddSubj = function(mode, sid){

  const s = sid ? ST.students.find(x=>String(x.id)===String(sid)) : null;
  _renderSForm(s);
  setTimeout(()=>{
    const last = _sfExtraSubjs.length-1;
    document.getElementById(`sf_extra_name_${last}`)?.focus();
  },50);
};

window._sfRemoveSubj = function(idx, mode, sid){
  _sfExtraSubjs.splice(idx,1);
  window._sfExtraSubjs = _sfExtraSubjs;
  const s = sid ? ST.students.find(x=>String(x.id)===String(sid)) : null;
  _renderSForm(s);
};

window._saveSForm = function(sid){
  const name  = document.getElementById('sf_n')?.value?.trim();
  const school= document.getElementById('sf_s')?.value?.trim();
  if(!name||!school){alert('이름과 학교는 필수입니다.');return;}
  const existing = sid ? ST.students.find(x=>String(x.id)===String(sid)) : null;
  // 추가 과목 이름 최신화
  const finalExtra = _sfExtraSubjs.map((lb,i)=>
    document.getElementById(`sf_extra_name_${i}`)?.value?.trim()||lb
  ).filter(Boolean);

  const subjects = {
    korean:  +document.getElementById('sf_korean')?.value||3,
    math:    +document.getElementById('sf_math')?.value||3,
    english: +document.getElementById('sf_english')?.value||3,
    science: +document.getElementById('sf_science')?.value||3,
    social:  +document.getElementById('sf_social')?.value||3,
  };

  // 추가 과목 등급 → gradeDetail로 저장 (1-1 학기에 대표 등급 저장)
  const gradeDetailPatch = {};
  finalExtra.forEach((lb,i)=>{
    const v = document.getElementById(`sf_extra_grade_${i}`)?.value;
    if(v && v!=='-' && v!==''){
      gradeDetailPatch[lb] = {'1-1': v};
    }
  });

  const baseInfo = {
    name, school,
    grade:     document.getElementById('sf_g')?.value||'고3',
    phone:     document.getElementById('sf_p')?.value||'',
    // 선생님 계정이면 본인 이름 자동 설정, 아니면 폼 값 사용
    counselor: ST.currentUser?.role==='teacher'
      ? ST.currentUser.name
      : (document.getElementById('sf_c')?.value||''),  // 빈 값 = 미정
    className: document.getElementById('sf_cls')?.value?.trim()||'',
    studentLoginId: document.getElementById('sf_lid')?.value?.trim()||existing?.studentLoginId||'',
    studentPassword: document.getElementById('sf_lpw')?.value?.trim()||existing?.studentPassword||'',
    subjects,
    extraSubjs: finalExtra,
  };

  if(sid){
    // ── 수정 모드: 기존 데이터 유지, 변경된 항목만 덮어씀 ──
    const prev = ST.students.find(x=>String(x.id)===String(sid));
    if(!prev) return;
    // gradeDetail: 기존 것에 새 추가 과목 등급 병합
    const mergedGD = {...(prev.gradeDetail||{})};
    Object.entries(gradeDetailPatch).forEach(([lb,v])=>{
      if(!mergedGD[lb]) mergedGD[lb] = v;
      else mergedGD[lb] = {...mergedGD[lb], ...v};
    });
    const updated = {...prev, ...baseInfo, gradeDetail: mergedGD};
    ST.students = ST.students.map(x=>String(x.id)===String(sid)?updated:x);
    ST.sel = updated;
  } else {
    // ── 신규 등록: 모든 데이터 기본값으로 초기화 ──
    // orgId: 기관관리자/선생님 계정이면 본인 기관 ID 사용
    const newOrgId = ST.currentOrg?.id || ST.currentUser?.orgId || null;
    const newOrgName = ST.currentOrg?.name || ST.currentUser?.orgName || null;
    const ns = {
      id: Date.now(),
      ...baseInfo,
      orgId:   newOrgId,
      orgName: newOrgName,
      // 성적 데이터 - 신규 등록 시 null (입력 전까지 - 표시)
      subjects: {korean:null,math:null,english:null,science:null,social:null},
      gradeDetail:    gradeDetailPatch,
      mockGrades:     {},
      mockMemo:       '',
      // 수시 데이터
      targets:        [],
      bookScore:      0,
      // 주간 플랜
      weeklyPlan:     {},
      weeklySubjPlans:{},
      weeklyStrategy: '',
      // 상담
      consultations:  [],
      // 아바타
      avatar: name[0]||'?',
      color:  ABG[ST.students.length % ABG.length],
    };
    ST.students = [...ST.students, ns];
    ST.sel = ns;
    ST.tab = 'overview';
  }

  // Firebase에 즉시 저장 (신규/수정 모두)
  if(FB_USE()){
    const targetStudent = ST.students.find(x=>String(x.id)===String(sid||ST.sel?.id));
    if(targetStudent) fbSave('students', targetStudent.id, targetStudent);
  }
  save();
  document.querySelector('.sform-overlay')?.remove();
  render();
};

function renderStudentTest(s){
  const myTests=ST.tests.filter(t=>(t.results||[]).some(r=>String(r.studentId)===String(s.id)));
  if(!myTests.length) return`<div style="text-align:center;padding:40px;color:#888">
    <div style="font-size:32px;margin-bottom:10px">📝</div>
    <div style="font-size:14px;font-weight:700;margin-bottom:4px">아직 테스트 결과가 없습니다</div>
    <div style="font-size:12px">관리자가 테스트를 생성하고 답안을 입력해야 합니다</div>
  </div>`;

  // 월별 그룹핑
  const byMonth={};
  myTests.slice().sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{
    const m=t.date.slice(0,7);
    if(!byMonth[m])byMonth[m]=[];
    byMonth[m].push(t);
  });

  return`<div>
    <div style="font-size:14px;font-weight:800;color:#e53935;margin-bottom:14px">📝 나의 테스트 기록</div>
    ${Object.entries(byMonth).sort(([a],[b])=>b.localeCompare(a)).map(([mKey,tests])=>`
    <div class="box" style="border-left:4px solid #e53935;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:#e53935;margin-bottom:10px">📅 ${mKey.replace('-','년 ')}월</div>
      ${tests.map(t=>{
        const res=(t.results||[]).find(r=>String(r.studentId)===String(s.id));
        if(!res) return '';
        const totalScore=t.questions.reduce((a,q)=>a+(+q.score||0),0);
        const myScore=res.answers.reduce((a,a2)=>a+(+a2.score||0),0);
        const pct=totalScore?Math.round(myScore/totalScore*100):0;
        const pcol=pct>=80?'#0f9d58':pct>=60?'#f59e0b':'#e53935';
        return`<div style="background:#f8f9ff;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1px solid #e8eaf6" onclick="printTestResult(${t.id},${s.id})">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:13px;font-weight:700">${esc(t.title)}</div>
              <div style="font-size:10px;color:#888;margin-top:2px">${esc(t.subject)} · ${esc(t.date)}${t.timeSlot?' '+esc(t.timeSlot):''} · ${t.questions.length}문항</div>
            </div>
            <div style="text-align:center;background:${pct>=80?'#f0fdf4':pct>=60?'#fffbeb':'#fff5f5'};border-radius:10px;padding:7px 14px;border:1.5px solid ${pct>=80?'#86efac':pct>=60?'#fde68a':'#fecaca'}">
              <div style="font-size:18px;font-weight:900;color:${pcol}">${myScore}/${totalScore}</div>
              <div style="font-size:10px;color:${pcol};font-weight:700">${pct}%</div>
            </div>
          </div>
          <!-- 미니 점수바 -->
          <div style="background:#e8eaf6;border-radius:3px;height:5px;margin-top:8px">
            <div style="height:100%;border-radius:3px;background:${pcol};width:${Math.min(pct,100)}%"></div>
          </div>
          <div style="font-size:10px;color:#aaa;margin-top:4px;text-align:right">클릭하여 결과지 보기</div>
        </div>`;
      }).join('')}
    </div>`).join('')}
  </div>`;
}

function renderTestMain(){

  // 담당 학생 반 목록 (선생님 계정이면 담당 학생의 반만)
  const isOrgAdmin2 = ST.currentUser?.role==='orgAdmin';
  const myOrgId2 = ST.currentOrg?.id || ST.currentUser?.orgId || null;
  const myStudents = isAdmin2
    ? ST.students
    : isOrgAdmin2
      ? ST.students.filter(s=> !myOrgId2 || String(s.orgId||'')===String(myOrgId2))
      : ST.students.filter(s=>{
          const sc2=[...(s.counselors||[])];
          if(s.counselor&&!sc2.includes(s.counselor)) sc2.unshift(s.counselor);
          if(sc2.length===0) return false;
          if(sc2.includes(curUserName)) return true;
          if(teacher2&&sc2.includes(teacher2.name)) return true;
          return false;
        });
  const myClasses = [...new Set(myStudents.map(s=>s.className).filter(Boolean))];

  const allTests=ST.tests||[];
  // 기관/역할 기반 엄격한 테스트 필터링
  const isOrgAdmin3 = isOrgAdmin2;
  const isTeacher3 = ST.currentUser?.role==='teacher';
  const tests = isAdmin2 ? allTests : allTests.filter(t=>{
    // ① orgId 기준 필터 (최우선)
    const tOrgId = t.orgId||null;
    if(tOrgId && myOrgId2 && tOrgId!==myOrgId2) return false; // 다른 기관 테스트 제외
    if(!tOrgId && myOrgId2) return false; // 최종관리자가 만든 테스트(orgId없음)는 기관계정에서 제외
    // ② 선생님: 담당 학생 반 기준 추가 필터
    if(isTeacher3){
      if(!t.classNames||t.classNames.length===0) return true;
      return t.classNames.some(cls=>myClasses.includes(cls));

    return true;

  const filterM=ST._testFilterMonth||'';
  const filterCls=ST._testFilterClass||'';

  const filterTeacher=ST._testFilterTeacher||'';

    ? ST.teachers.filter(t=>!myOrgId2||String(t.orgId||'')===String(myOrgId2)).map(t=>t.name)

// 테스트 점수 현황 차트 (팝업)
function openTestScoreChart(testId){
  const t=ST.tests.find(x=>String(x.id)===String(testId)); if(!t) return;
  const maxScore=t.questions.reduce((a,q)=>a+(+q.score||0),0);
  const results=(t.results||[]).map(r=>{
    const s=ST.students.find(x=>String(x.id)===String(r.studentId));
    const score=(r.answers||[]).reduce((a,a2)=>a+(+a2.score||0),0);
    const pct=maxScore?Math.round(score/maxScore*100):0;
    return{name:s?.name||r.studentId+'번',cls:s?.className||'',score,pct,aiComment:r.aiComment};
  }).sort((a,b)=>b.score-a.score);

  if(!results.length){alert('입력된 답안이 없습니다.');return;}

  const avg=results.reduce((a,r)=>a+r.score,0)/results.length;
  const avgPct=maxScore?Math.round(avg/maxScore*100):0;

  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="modal" style="max-width:680px;max-height:94vh">
    <div class="mhd">
      <span style="font-size:14px;font-weight:800">📊 ${esc(t.title)} 현황</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button onclick="printTestSummary(${t.id})" style="background:#8b5cf6;color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">🖨️ 인쇄</button>
        <button onclick="exportTestXls(${t.id})" style="background:#f0fdf4;color:#0f9d58;border:1.5px solid #86efac;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer">📊 엑셀</button>
        <button onclick="this.closest('.overlay').remove()" style="background:transparent;border:none;color:#777;font-size:22px;cursor:pointer">×</button>
      </div>
    </div>
    <div style="padding:14px 18px 24px;overflow-y:auto;max-height:80vh">
      <!-- 요약 -->
      <div class="g4" style="margin-bottom:16px">
        ${[['응시',results.length+'명','#e53935'],['평균',avg.toFixed(1)+'점','#3b5bdb'],['최고',Math.max(...results.map(r=>r.score))+'점','#0f9d58'],['최저',Math.min(...results.map(r=>r.score))+'점','#f59e0b']].map(([l,v,c])=>`<div class="stat"><div class="sv" style="color:${c}">${v}</div><div class="sl">${l}</div></div>`).join('')}
      </div>

      <!-- 점수 분포 바 차트 -->
      <div style="background:#f8f9ff;border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid #e8eaf6">
        <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:10px">📈 점수 분포</div>
        <div style="display:flex;align-items:flex-end;gap:6px;height:100px;padding:0 4px">
          ${(()=>{
            const bins=[0,0,0,0,0];
            results.forEach(r=>{bins[r.pct>=90?4:r.pct>=80?3:r.pct>=70?2:r.pct>=60?1:0]++;});
            const mx=Math.max(...bins,1);
            const cols=['#e53935','#f59e0b','#3b5bdb','#10b981','#0f9d58'];
            const lbs=['0-59%','60-69%','70-79%','80-89%','90-100%'];
            return bins.map((n,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
              <div style="font-size:11px;font-weight:700;color:${cols[i]}">${n}명</div>
              <div style="width:100%;background:${cols[i]};border-radius:4px 4px 0 0;height:${Math.max(n/mx*70,3)}px;opacity:.85"></div>
              <div style="font-size:9px;color:#888;text-align:center">${lbs[i]}</div>
            </div>`).join('');
          })()}
        </div>
        <!-- 평균선 표시 -->
        <div style="margin-top:8px;text-align:center;font-size:11px;color:#3b5bdb;font-weight:600">평균 ${avg.toFixed(1)}점 (${avgPct}%)</div>
      </div>

      <!-- 학생별 순위 -->
      <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:8px">🏆 학생별 순위</div>
      ${results.map((r,i)=>{
        const pcol=r.pct>=80?'#0f9d58':r.pct>=60?'#f59e0b':'#e53935';
        return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:${i===0?'#fff8e1':i===1?'#f8f9ff':i===2?'#fff5f0':'#fff'};border-radius:8px;margin-bottom:5px;border:1px solid #f0f0f8">
          <div style="width:24px;text-align:center;font-size:14px;font-weight:900;color:${i===0?'#f59e0b':i===1?'#888':i===2?'#cd7f32':'#aaa'}">${i+1}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:#1a1a2e">${esc(r.name)}<span style="font-size:10px;color:#aaa;margin-left:6px">${esc(r.cls)}</span></div>
          </div>
          <div style="font-size:16px;font-weight:900;color:${pcol};min-width:60px;text-align:right">${r.score}점</div>
          <div style="min-width:40px">
            <div style="background:#e8eaf6;border-radius:3px;height:6px;overflow:hidden">
              <div style="height:100%;border-radius:3px;background:${pcol};width:${r.pct}%"></div>
            </div>
            <div style="font-size:9px;color:${pcol};font-weight:600;text-align:right;margin-top:2px">${r.pct}%</div>
          </div>
        </div>`;
      }).join('')}

      <!-- 문항별 정답률 -->
      ${(()=>{
        if(!t.results?.length) return '';
        const total=t.results.length;
        const items=t.questions.map(q=>{
          const maxS=+q.score||0;
          const got=t.results.reduce((a,r)=>{const ans=r.answers.find(x=>x.no===q.no);return a+(+(ans?.score)||0);},0);
          const wrong=t.results.filter(r=>{const ans=r.answers.find(x=>x.no===q.no);return !ans||+(ans.score||0)<maxS;}).length;
          const pct=total&&maxS?Math.round(got/(total*maxS)*100):0;
          return{no:q.no,unit:q.unit||'–',type:q.type,maxS,got,wrong,pct,total};
        });
        return`<div style="margin-top:14px">
          <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:8px">📊 문항별 정답률</div>
          ${items.map(it=>{
            const c=it.pct>=80?'#0f9d58':it.pct>=60?'#f59e0b':'#e53935';
            return`<div style="margin-bottom:8px;background:#f8f9ff;border-radius:8px;padding:8px 10px;border:1px solid #e8eaf6">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <div style="display:flex;align-items:center;gap:6px">
                  <span style="background:#e53935;color:#fff;border-radius:5px;padding:1px 8px;font-size:11px;font-weight:700">${it.no}번</span>
                  <span style="font-size:10px;color:#555">${esc(it.unit)}</span>
                  <span style="background:${it.type==='서술형'?'#f5f3ff':it.type==='객관식'?'#fff8e1':'#eef1ff'};color:${it.type==='서술형'?'#7c3aed':it.type==='객관식'?'#d97706':'#3b5bdb'};border-radius:4px;padding:1px 6px;font-size:9px">${it.type}</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                  <span style="font-size:10px;color:#aaa">오답 ${it.wrong}/${it.total}명</span>
                  <span style="font-size:13px;font-weight:700;color:${c}">${it.pct}%</span>
                </div>
              </div>
              <div style="background:#e8eaf6;border-radius:3px;height:6px;overflow:hidden">
                <div style="height:100%;border-radius:3px;background:${c};width:${it.pct}%"></div>
              </div>
            </div>`;
          }).join('')}
        </div>`;
      })()}
    </div>
  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}

        <div><div style="font-size:11px;color:#777;font-weight:600;margin-bottom:4px">시간대</div>
          <select id="tf_time" class="inp">

          </select>
        </div>
        <div><div style="font-size:11px;color:#777;font-weight:600;margin-bottom:4px">대상 반</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;padding:6px;background:#f4f6fb;border-radius:8px;min-height:36px">
            ${classesList.length?classesList.map(cls=>`<label style="display:flex;align-items:center;gap:4px;background:#fff;border-radius:6px;padding:3px 9px;cursor:pointer;font-size:11px;border:1px solid #e0e3ef">
              <input type="checkbox" id="tf_cls_${esc(cls)}" ${t?.classNames?.includes(cls)?'checked':''} style="accent-color:#e53935" onchange="(function(){
                const checked=Array.from(document.querySelectorAll('[id^=tf_cls_]')).filter(c=>c.checked).map(c=>c.id.replace('tf_cls_',''));
                document.querySelectorAll('[id^=tf_stu_wrap_]').forEach(wrap=>{
                  const cls2=wrap.dataset.cls;
                  wrap.style.display=(checked.length===0||checked.includes(cls2))?'':'none';
                });
                const noCls=document.getElementById('tf_stu_nocls');
                if(noCls) noCls.style.display=(checked.length===0)?'':'none';
                if(checked.length>0){
                  document.querySelectorAll('[id^=tf_stu_]').forEach(c=>{
                    const wrap=c.closest('[id^=tf_stu_wrap_]');
                    if(wrap) c.checked=(checked.includes(wrap.dataset.cls));
                  });
                }
              })()"> ${esc(cls)}</label>`).join('')
            :`<div style="font-size:11px;color:#aaa;padding:2px">반 없음</div>`}
          </div>
        </div>
      </div>

      <!-- 학생 직접 선택 (반 필터 연동) -->
      <div style="margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-size:11px;color:#777;font-weight:600">대상 학생 직접 선택 <span style="color:#aaa;font-weight:400">(반 선택 시 해당 반 학생 자동 표시)</span></div>
          <div style="display:flex;gap:6px">
            <button onclick="document.querySelectorAll('[id^=tf_stu_]').forEach(c=>{if(c.closest('[id^=tf_stu_wrap_]')?.style.display!=='none')c.checked=true})" style="background:#eef1ff;color:#3b5bdb;border:1px solid #c5cae9;border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer">전체선택</button>
            <button onclick="document.querySelectorAll('[id^=tf_stu_]').forEach(c=>c.checked=false)" style="background:#f4f6fb;color:#555;border:1px solid #e0e3ef;border-radius:6px;padding:2px 8px;font-size:10px;cursor:pointer">선택해제</button>
          </div>
        </div>
        <div style="max-height:200px;overflow-y:auto;border:1px solid #e8eaf6;border-radius:8px;padding:6px;background:#fafafa">
          ${myStudents.length ? (()=>{
            const grouped={};
            myStudents.forEach(s=>{
              const cls2=s.className||'__nocls__';

              grouped[cls2].push(s);

              const isNoCls=cls2==='__nocls__';

              const wrapId=isNoCls?'tf_stu_nocls':'tf_stu_wrap_'+cls2.replace(/[^a-zA-Z0-9가-힣]/g,'_');

                  +'<span style="font-size:12px;font-weight:600">'+esc(s.name)+'</span>'
                  +'<span style="font-size:10px;color:#888">'+esc(s.school||'')+' · '+esc(s.grade||'')+(s.className?' · '+esc(s.className):'')+'</span>'
                  +'</label>').join('')
                +'</div>';
            }).join('');
          })()
          : '<div style="font-size:11px;color:#aaa;padding:8px;text-align:center">등록된 학생이 없습니다</div>'

        <div style="font-size:12px;font-weight:700;color:#1a1a2e">📋 문항 설정</div>
        <div style="display:flex;gap:5px">
          <button id="bulk_q_btn" style="background:#eef1ff;color:#3b5bdb;border:1.5px solid #c5cae9;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">📊 엑셀/CSV 일괄등록</button>
          <button id="add_q_btn" style="background:#fff5f5;color:#e53935;border:1.5px solid #fecaca;border-radius:7px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer">+ 문항 추가</button>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button id="cancel_btn" class="btn-g">취소</button>
        <button id="save_test_btn" style="background:#e53935;color:#fff;border:none;border-radius:8px;padding:9px 24px;font-size:12px;font-weight:700;cursor:pointer">${t?'수정 완료':'테스트 생성'}</button>
      </div>
    </div>
  </div>`;

  // ── 닫기/취소 버튼
  ov.querySelector('#close_btn').addEventListener('click',()=>ov.remove());
  ov.querySelector('#cancel_btn').addEventListener('click',()=>ov.remove());

  // ── 날짜 변경 시 요일 표시
  ov.querySelector('#tf_date').addEventListener('input',function(){
    const d=new Date(this.value);
    const el=ov.querySelector('#tf_day_info');
    if(el&&!isNaN(d.getTime())) el.textContent=DAYS[d.getDay()]+'요일';
  });

  // ── 테스트 유형 버튼 동적 생성
  const typeBtnWrap=ov.querySelector('#test_type_btns');
  const typeInput=ov.querySelector('#tf_test_type');
  const directWrap=ov.querySelector('#tf_type_direct_wrap');
  const titleInput=ov.querySelector('#tf_title');

  const allTypes=[...TEST_TYPES,'직접입력'];
  allTypes.forEach(tp=>{
    const btn=document.createElement('button');
    btn.textContent=tp;
    const isAct=initType===tp;
    btn.style.cssText=`background:${isAct?'#e53935':'#f4f6fb'};color:${isAct?'#fff':'#555'};border:1.5px solid ${isAct?'#e53935':'#e8eaf6'};border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer`;
    btn.addEventListener('click',function(){
      // 모든 버튼 비활성화
      typeBtnWrap.querySelectorAll('button').forEach(b=>{
        b.style.background='#f4f6fb';
        b.style.color='#555';
        b.style.borderColor='#e8eaf6';
      });
      // 선택 버튼 활성화
      this.style.background='#e53935';
      this.style.color='#fff';
      this.style.borderColor='#e53935';
      // 유형 저장
      typeInput.value=tp;
      // 직접입력 칸 토글
      if(tp==='직접입력'){
        directWrap.style.display='block';
        titleInput.focus();
      } else {
        directWrap.style.display='none';
        titleInput.value=tp;
      }
    });
    typeBtnWrap.appendChild(btn);
  });

  // ── 문항 일괄등록 버튼
  ov.querySelector('#bulk_q_btn').addEventListener('click',function(){
    openBulkQuestions(ov);
  });

  // ── 문항 추가 버튼
  ov.querySelector('#add_q_btn').addEventListener('click',function(){
    const wrap=ov.querySelector('#tq_wrap');
    const n=wrap.children.length;
    const div=document.createElement('div');
    div.style.cssText='background:#f8f9ff;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid #e8eaf6';
    div.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <span style="background:#e53935;color:#fff;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700">${n+1}번</span>
      <select style="background:#fff;border:1px solid #e0e3ef;border-radius:6px;padding:4px 8px;font-size:11px;outline:none"><option>객관식</option><option>단답형</option><option>서술형</option></select>
      <button onclick="this.closest('[style]').remove()" style="margin-left:auto;background:#fff0f0;color:#e53935;border:1px solid #fecaca;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
      <div><div style="font-size:10px;color:#888;margin-bottom:3px">단원명</div><input class="inp" style="font-size:11px;padding:5px 8px" placeholder="단원명"></div>
      <div><div style="font-size:10px;color:#888;margin-bottom:3px">정답</div><input class="inp" style="font-size:11px;padding:5px 8px" placeholder="정답"></div>
      <div><div style="font-size:10px;color:#888;margin-bottom:3px">배점</div><input type="number" class="inp" style="font-size:11px;padding:5px 8px" placeholder="5" value="5"></div>
    </div>`;
    wrap.appendChild(div);
  });

  // 저장 버튼
  ov.querySelector('#save_test_btn').addEventListener('click',function(){
    const testType=ov.querySelector('#tf_test_type').value||'테스트';
    const titleEl=ov.querySelector('#tf_title');
    const title=testType==='직접입력'?(titleEl?.value?.trim()||''):testType;
    if(!title){alert('테스트명을 선택하거나 입력해주세요.');return;}
    const wrap=ov.querySelector('#tq_wrap');
    const qs=Array.from(wrap.children).map((el,i)=>{
      const sel=el.querySelector('select');
      const inputs=el.querySelectorAll('input');
      return{no:i+1,type:sel?.value||'객관식',unit:inputs[0]?.value||'',answer:inputs[1]?.value||'',score:+(inputs[2]?.value||5)};
    });
    if(!qs.length){alert('문항을 1개 이상 입력해주세요.');return;}
    const clsBoxes=Array.from(ov.querySelectorAll('[id^=tf_cls_]')).filter(el=>el.checked).map(el=>el.id.replace('tf_cls_',''));
    const studentIds=Array.from(ov.querySelectorAll('[id^=tf_stu_]')).filter(el=>el.checked).map(el=>el.id.replace('tf_stu_',''));
    // 기관 설정: 최종관리자는 선택값, 기관관리자/선생님은 고정
    const _selOrgEl = ov.querySelector('#tf_org_select');
    const _selOrgId = _selOrgEl ? _selOrgEl.value || null
      : (ST.currentOrg?.id || ST.currentUser?.orgId || null);
    const _selOrgName = _selOrgEl
      ? (_selOrgEl.options[_selOrgEl.selectedIndex]?.dataset.name || null)
      : (ST.currentOrg?.name || null);
    const td2={
      id:t?t.id:Date.now(),
      testType,title,
      subject:ov.querySelector('#tf_subj').value||'',
      date:ov.querySelector('#tf_date').value||new Date().toISOString().slice(0,10),
      timeSlot:ov.querySelector('#tf_time').value||'',
      classNames:clsBoxes,
      studentIds:studentIds,
      questions:qs,
      orgId:_selOrgId,
      orgName:_selOrgName,
      createdBy:ST.currentUser?.name||'',  // 작성자(선생님 필터용)
      results:t?(ST.tests.find(x=>x.id===t.id)?.results||[]):[]
    };
    if(t) ST.tests=ST.tests.map(x=>x.id===t.id?td2:x);
    else ST.tests=[...ST.tests,td2];
    // Firebase에 테스트 즉시 저장
    if(FB_USE()) fbSave('tests', String(td2.id), td2);
    save();ov.remove();render();
  });

  // 테스트 입력 폼은 실수로 닫히지 않게 배경 클릭 닫기 제거
  document.body.appendChild(ov);
}

// ── 문항 일괄등록 (엑셀/CSV) ──
function openBulkQuestions(parentOv){
  const ov2=document.createElement('div');ov2.className='overlay';
  ov2.style.zIndex='9999';
  ov2.innerHTML=`<div class="modal" style="max-width:560px;max-height:92vh">

      <span style="font-size:14px;font-weight:800">📊 문항 일괄등록</span>
