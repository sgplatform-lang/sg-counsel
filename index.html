<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f4f6fb;color:#1a1a2e;font-family:'Apple SD Gothic Neo','Noto Sans KR','Pretendard',sans-serif;min-height:100vh;overscroll-behavior-y:none;}
html{overscroll-behavior-y:none;}

/* 입력요소 - 모두 밝은 배경, 어두운 글자 */
input,select,textarea{background:#fff;border:1.5px solid #dde1f0;color:#1a1a2e !important;border-radius:8px;padding:9px 12px;font-size:13px;width:100%;outline:none;font-family:inherit;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#3b5bdb}
input::placeholder,textarea::placeholder{color:#aaa !important}
select option{background:#fff;color:#1a1a2e}
.inp{background:#fff;border:1.5px solid #dde1f0;color:#1a1a2e !important;border-radius:8px;padding:9px 12px;font-size:13px;width:100%;outline:none;font-family:inherit;transition:border-color .15s}
.inp:focus{border-color:#3b5bdb}
.inp::placeholder{color:#aaa !important}
select.inp option{background:#fff;color:#1a1a2e}

button{cursor:pointer;font-family:inherit;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700}

/* 스크롤바 */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#f0f2f8}
::-webkit-scrollbar-thumb{background:#c5cae9;border-radius:4px}

/* 애니메이션 */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fin .2s ease}

/* 헤더 */
.hdr{background:#fff;border-bottom:1.5px solid #e8eaf6;padding:0 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;gap:8px;height:56px}
.logo-area{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:#3b5bdb;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:17px;font-weight:800;color:#3b5bdb;letter-spacing:-0.5px}
.nav-menu{display:flex;gap:0;height:56px;align-items:center}
.nav-item{padding:0 10px;font-size:11px;font-weight:600;color:#555;cursor:pointer;height:56px;display:flex;align-items:center;border-bottom:2.5px solid transparent;transition:all .15s}
.nav-item.act,.nav-item:hover{color:#3b5bdb;border-bottom-color:#3b5bdb}

/* 레이아웃 */
.layout{display:flex;height:calc(100vh - 56px)}
.sidebar{width:280px;border-right:1.5px solid #e8eaf6;background:#fff;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.main-area{flex:1;overflow-y:auto;background:#f4f6fb}

/* 학생 카드 */
.scard{border-radius:10px;padding:11px;margin-bottom:6px;cursor:pointer;border:1.5px solid #eef0f8;background:#fff;transition:all .15s}
.scard:hover{border-color:#c5cae9;background:#f8f9ff}
.scard.act{border-color:#3b5bdb;background:#eef1ff}

/* 탭 */
.tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tab{background:transparent;color:#888;border:1.5px solid #e0e3ef;border-radius:20px;padding:5px 13px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s}
.tab.act{background:#3b5bdb;color:#fff;border-color:#3b5bdb}

/* 카드 박스 - 항상 흰색 배경 */
.box{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1.5px solid #e8eaf6}

/* 그리드 */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* 통계 박스 */
.stat{background:#f4f6fb;border-radius:8px;padding:10px 6px;text-align:center;border:1px solid #e8eaf6}
.sv{font-size:17px;font-weight:800;color:#1a1a2e}
.sl{font-size:9px;color:#999;margin-top:2px}

/* 오버레이 모달 - 밝은 스타일 */
.overlay{position:fixed;inset:0;background:rgba(26,26,46,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:700px;max-height:93vh;overflow-y:auto;border:1.5px solid #e0e3ef}
.mhd{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #e8eaf6;position:sticky;top:0;background:#fff;z-index:1}

/* 칩/뱃지 */
.chip{display:inline-block;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700;white-space:nowrap}

/* 바 차트 */
.bb{background:#e8eaf6;border-radius:3px;height:5px}
.bf{height:100%;border-radius:3px}

/* 시간표 테이블 - 밝은 스타일 */
.tbl{border-collapse:collapse;width:100%}
.tbl th,.tbl td{border:1px solid #e8eaf6;padding:6px 8px;font-size:11px;color:#1a1a2e}
.tbl th{background:#f4f6fb;color:#666;font-weight:700;text-align:center}
.tbl td.lbl{background:#f4f6fb;color:#555;font-weight:600;white-space:nowrap}

/* 버튼 */
.btn-b{background:#3b5bdb;color:#fff}
.btn-b:hover{background:#2f4cc0}
.btn-o{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.btn-g{background:transparent;color:#666;border:1.5px solid #dde1f0 !important}
.btn-g:hover{background:#f4f6fb}
.btn-gr{background:#e6f4ea;color:#0f9d58;border:1px solid #a8d5b5}
.btn-r{background:#fff0f0;color:#e53935;border:1px solid #ffcdd2}

/* 수시 분석 카드 - 밝은 스타일 */
.susi-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid #e8eaf6;border-left-width:4px}
.susi-stat{background:#f4f6fb;border-radius:8px;padding:9px 6px;text-align:center;border:1px solid #e8eaf6}
.susi-stat-v{font-size:13px;font-weight:700;color:#1a1a2e}
.susi-stat-l{font-size:9px;color:#999;margin-top:1px}
.susi-method{background:#eef1ff;border-radius:8px;padding:9px 12px;font-size:12px;color:#3b5bdb;font-weight:600;margin-bottom:8px}
.susi-strategy{border-radius:8px;padding:9px 12px;font-size:12px;color:#444;line-height:1.7;border-left:3px solid}

/* 주간 시간표 - 밝은 스타일 */
.tt-header{background:#f4f6fb;color:#555;font-size:11px;font-weight:700;padding:7px 4px;border:1px solid #e8eaf6;text-align:center}
.tt-time{background:#f4f6fb;color:#888;font-size:9px;padding:3px 6px;border:1px solid #e8eaf6;text-align:center;font-weight:600}
.tt-cell{background:#fff;border:1px solid #e8eaf6;cursor:pointer;text-align:center;padding:2px 1px;min-width:42px;height:26px;transition:background .1s}
.tt-cell:hover{background:#f0f4ff}

/* 상담 기록 */
.consult-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border:1.5px solid #e8eaf6}
.consult-memo{font-size:13px;color:#333;line-height:1.8;background:#f8f9ff;border-radius:8px;padding:12px 14px;white-space:pre-wrap;border:1px solid #e8eaf6}

/* 관리자 - 성적표 */
.grade-table{border-collapse:collapse;width:100%;font-size:12px}
.grade-table th{background:#f4f6fb;color:#666;padding:8px 10px;border:1px solid #e8eaf6;font-weight:700;text-align:center}
.grade-table td{padding:8px 10px;border:1px solid #e8eaf6;text-align:center;color:#1a1a2e}

/* API 배너 */
.api-banner{background:#fff8e1;border:1.5px solid #ffe082;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* 로딩 스피너 */
.spin-el{width:14px;height:14px;border:2px solid #c5cae9;border-top-color:#3b5bdb;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

/* 반응형 - 모바일 전면 개선 */
@media(max-width:767px){
  /* 레이아웃 */
  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 56px)}
  .sidebar{width:100%;border-right:none;border-bottom:1.5px solid #e8eaf6;max-height:38vh;flex-shrink:0}
  .main-area{padding:0;flex:1}

  /* 헤더 */
  .hdr{padding:0 12px;height:52px;gap:6px}
  .logo-text{font-size:14px}
  .nav-menu{gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .nav-item{padding:0 8px;font-size:10px;white-space:nowrap;height:52px}

  /* 숨김/표시 */
  .deskonly{display:none!important}

  /* 그리드 - 모바일에서 1열 */
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr 1fr}
  .g4{grid-template-columns:1fr 1fr}

  /* 박스/카드 */
  .box{padding:12px;margin-bottom:10px;border-radius:10px}

  /* 탭 */
  .tabs{gap:5px;padding:8px 12px;background:#fff;border-bottom:1px solid #e8eaf6;margin-bottom:0;position:sticky;top:52px;z-index:90;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .tab{padding:6px 12px;font-size:11px;border-radius:20px}

  /* 통계 */
  .sv{font-size:15px}
  .sl{font-size:9px}

  /* 모달 */
  .overlay{align-items:flex-end}
  .modal{border-radius:18px 18px 0 0;max-height:92vh;width:100%}
  .mhd{padding:12px 14px}

  /* 버튼 */
  button{font-size:11px;padding:7px 10px}

  /* 시간표 - 모바일에서 스크롤 */
  .tt-cell{min-width:36px;height:28px;font-size:9px}
  .tt-time{font-size:8px;padding:2px 3px}
  .tt-header{font-size:10px;padding:5px 2px}

  /* 입력요소 */
  input,select,textarea,.inp{font-size:16px!important;padding:10px 12px}

  /* 테이블 - 가로 스크롤 */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px}
  .grade-table{font-size:11px}
  .grade-table th,.grade-table td{padding:6px 8px}

  /* 상담카드 */
  .consult-card{padding:12px}

  /* 학생카드 */
  .scard{padding:10px}

  /* 주간플랜 */
  .layout > .main-area > div{padding:10px}
}

/* 초소형 화면 */
@media(max-width:380px){
  .hdr{padding:0 8px}
  .logo-text{font-size:13px}
  .nav-item{padding:0 8px;font-size:11px}
  .g3,.g4{grid-template-columns:1fr 1fr}
  .tabs{padding:6px 8px}
}

/* 터치 최적화 */
@media(hover:none){
  button{min-height:40px;min-width:40px}
  .tab{min-height:36px}
  .scard{min-height:56px}
  input,select{min-height:44px}
  textarea{min-height:80px}
}

/* ── 모바일 반응형 ── */
@media(max-width:600px){
  .modal{width:95vw!important;max-width:95vw!important;border-radius:14px!important}
  .mhd{padding:12px 14px!important;font-size:13px}
  .g2{grid-template-columns:1fr!important}
  .g3{grid-template-columns:1fr 1fr!important}
  .g4{grid-template-columns:1fr 1fr!important}
  .inp{font-size:16px!important;padding:10px 11px!important}
  .btn-b,.btn-g{font-size:12px!important;padding:8px 12px!important}
  .box{padding:12px!important;border-radius:10px!important}
  .card{padding:12px!important}
  .deskonly{display:none!important}
  .stat{padding:12px 8px!important}
  .sv{font-size:18px!important}
  table{font-size:11px!important}
  th,td{padding:5px 6px!important}
}
@media(max-width:400px){
  .g3{grid-template-columns:1fr!important}
}
/* 탭바 스크롤 */
.tab-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap!important}
.tab-bar::-webkit-scrollbar{display:none}
/* 입력 필드 확대 방지 */
input,select,textarea{font-size:16px!important}
@media(min-width:601px){
  input,select,textarea{font-size:inherit!important}
}

// ══ Firebase 동기화 ══
const FB_USE = ()=>window._fbReady && window._fb;

async function fbSave(col, id, data){
  if(!FB_USE()) return;
  try{
    const ref = window._fb.db.collection(col).doc(String(id));
    const saveData = {...data, _updatedAt: Date.now()};
    // update()로 저장: 지정 필드만 교체 (weeklyPlan:{} → 내부 키 모두 삭제됨)
    // 문서가 없으면 set()으로 생성
    try{
      await ref.update(saveData);
    }catch(e2){
      // 문서 없으면 set으로 생성
      if(e2.code==='not-found'||e2.message.includes('NOT_FOUND')||e2.message.includes('No document')){
        await ref.set(saveData);
      } else { throw e2; }
    }
  }catch(e){ console.warn('FB save error:', e.message); }
}

async function fbLoadAll(col){
  if(!FB_USE()) return null;
  try{
    const snap = await window._fb.collection(col).get();
    return snap.docs.map(d=>{const data=d.data();return{...data,id:data.id??d.id};});
  }catch(e){ console.warn('FB load error:', e.message); return null; }
}

async function fbDelete(col, id){
  if(!FB_USE()) return;
  try{
    await window._fb.delete(col, String(id));
  }catch(e){ console.warn('FB delete error:', e.message); }
}

// Firebase ↔ LocalStorage 동기화 저장
async function saveAll(){
  clearTimeout(ST.saveTimer);
  ST.saveTimer = setTimeout(()=>{
    const role = ST.currentUser?.role;
    const orgId = ST.currentOrg?.id;

    if(role==='orgAdmin' || (role==='teacher' && orgId)){
      // 기관 계정: 전체 localStorage에서 자기 기관 데이터만 교체
      try{
        const allStudents = JSON.parse(localStorage.getItem(SK)||'[]');
        const allTeachers = JSON.parse(localStorage.getItem(SKT)||'[]');
        // 기관 학생: 기존에서 자기 기관 것만 교체
        const otherStudents = allStudents.filter(s=>s.orgId!==orgId);
        const mergedStudents = [...otherStudents, ...ST.students];
        localStorage.setItem(SK, JSON.stringify(mergedStudents));
        // 기관 선생님: 기존에서 자기 기관 것만 교체
        const otherTeachers = allTeachers.filter(t=>t.orgId!==orgId);
        const mergedTeachers = [...otherTeachers, ...ST.teachers];
        localStorage.setItem(SKT, JSON.stringify(mergedTeachers));
        saveAccounts();
      }catch(e){ console.warn('기관 데이터 저장 오류:', e); }
    } else {
      // 최종관리자: 전체 저장
      dbS(SK, ST.students);
      dbS(SKT, ST.teachers);
      dbS(SK_TEST, ST.tests);
      try{ localStorage.setItem(SKT, JSON.stringify(ST.teachers)); saveAccounts(); }catch(e){}
    }
  }, 300);

  // Firebase 저장 - 변경된 항목만 (다른 기기의 데이터 덮어쓰기 방지)
  if(FB_USE()){
    const savingIds = [...(ST._savingIds||new Set())];
    // _savingIds에 있는 학생만 저장 (upd에서 등록된 학생)
    const studentsToSave = savingIds.length>0
      ? ST.students.filter(s=>savingIds.includes(String(s.id)))
      : [];
    const saves = [
      ...studentsToSave.map(s => fbSave('students', s.id, s)),
      // 선생님은 항상 저장 (관리자만 수정)
      ...ST.teachers.map(t => fbSave('teachers', t.id, t)),
    ];
    if(saves.length) Promise.all(saves).catch(e=>console.warn('FB save error:',e));
    // tests는 Firebase에서 onSnapshot으로 관리 (삭제/추가 시 fbDelete/fbSave 직접 호출)
  }
}

// Firebase에서 전체 데이터 불러오기
async function fbLoadAll_all(){
  if(!FB_USE()) return false;
  try{
    const [students, teachers, tests, config, orgs] = await Promise.all([
      fbLoadAll('students'),
      fbLoadAll('teachers'),
      fbLoadAll('tests'),
      fbLoadAll('config'),
      fbLoadAll('orgs'),
    ]);
    if(students && students.length){
      const role = ST.currentUser?.role;
      const curOrgId = ST.currentOrg?.id || ST.currentUser?.orgId || null;
      const curName = ST.currentUser?.name || '';

      // 역할별 학생 필터링
      let filteredStudents = students.filter(s=>s.id && s.name);
      if(role==='orgAdmin' && curOrgId){
        filteredStudents = filteredStudents.filter(s=>String(s.orgId||'')===String(curOrgId));
      } else if(role==='teacher'){
        filteredStudents = filteredStudents.filter(s=>{
          const sameOrg = !curOrgId || String(s.orgId||'')===String(curOrgId);
          if(!sameOrg) return false;
          const sc=[...(s.counselors||[])];
          if(s.counselor&&!sc.includes(s.counselor)) sc.unshift(s.counselor);
          return sc.includes(curName);
        });
      }
      ST.students = filteredStudents;
      if(ST.sel) ST.sel = ST.students.find(x=>String(x.id)===String(ST.sel.id))||ST.sel;
      if(ST.adminSel) ST.adminSel = ST.students.find(x=>String(x.id)===String(ST.adminSel.id))||ST.adminSel;
    }
    if(teachers && teachers.length){
      const role = ST.currentUser?.role;
      const curOrgId = ST.currentOrg?.id || ST.currentUser?.orgId || null;
      if(role==='admin'){
        // 최종관리자: 전체 사용
        ST.teachers = teachers;
      } else if(curOrgId){
        // 기관관리자/선생님: 본인 기관 것만
        ST.teachers = teachers.filter(t=>String(t.orgId||'')===String(curOrgId));
      } else {
        ST.teachers = teachers;
      }
    } else {
      const localT = dbL(SKT);
      if(localT && localT.length) ST.teachers = localT;
    }
    if(tests && tests.length) ST.tests = tests;
    if(config){
      const gs = config.find(c=>c.id==='grade_subjs');
      if(gs?.subjs) GRADE_SUBJS = gs.subjs;
      // 최종관리자가 등록한 API 키 → 모든 계정 공유
      const ak = config.find(c=>c.id==='api_key');
      if(ak?.value){
        window._sharedApiKey = ak.value; // 항상 갱신
        // ANTHROPIC_API_KEY가 비어있으면 공유키로 채움
        if(!(window.ANTHROPIC_API_KEY||'').trim()){
          window.ANTHROPIC_API_KEY = ak.value;
        }
        console.log('✅ Firebase 공유 API 키 로드 완료');
      }
    }
    // orgs(기관) 데이터 - Firebase에 있으면 로컬 병합
    if(orgs && orgs.length){
      try{
        const localOrgs = JSON.parse(localStorage.getItem(SK_ORGS)||'[]');
        // Firebase orgs와 localOrgs 병합 (id 기준, Firebase 우선)
        const fbOrgIds = new Set(orgs.map(o=>String(o.id)));
        const mergedOrgs = [...orgs, ...localOrgs.filter(o=>!fbOrgIds.has(String(o.id)))];
        localStorage.setItem(SK_ORGS, JSON.stringify(mergedOrgs));
      }catch(e){}
    }
    dbS(SK, ST.students); dbS(SKT, ST.teachers); dbS(SK_TEST, ST.tests);
    saveAccounts();
    return true;
  }catch(e){
    console.warn('FB 전체 로드 실패:', e.message);
    return false;
  }
}

function fmtMock(val){

}

// 주차 시작/종료 날짜 계산 (월요일 기준)
function getWeekRange(year, month, week){
  const firstDay = new Date(year, month-1, 1).getDay(); // 0=일,1=월,...6=토
  const firstMonday = 1 - (firstDay===0?6:firstDay-1);
  const startDate = new Date(year, month-1, firstMonday + (week-1)*7);
  const endDate = new Date(year, month-1, firstMonday + (week-1)*7 + 6);
  const fmt = (d) => `${d.getMonth()+1}/${d.getDate()}`;
  return `${fmt(startDate)}~${fmt(endDate)}`;
}
// 특정 날짜의 주차 번호 (월요일 기준)
function getWeekOfMonth(year, month, day){
  const firstDay = new Date(year, month-1, 1).getDay();
  const firstMonStart = 1 - (firstDay===0?6:firstDay-1);
  return Math.ceil((day - firstMonStart + 1) / 7);
}

async function deleteStudent(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid));
  if(!s) return;
  if(!confirm('학생 ['+s.name+']을 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.')) return;
  if(!ST._savingIds) ST._savingIds=new Set();
  ST._savingIds.add(String(sid));  // 이 학생 onSnapshot 차단
  ST.students = ST.students.filter(x=>String(x.id)!==String(sid));
  ST.sel = null; ST.adminSel = null;
  // localStorage 즉시 저장
  try{ localStorage.setItem(SK, JSON.stringify(ST.students)); }catch(e){}
  // Firebase에서 삭제
  if(FB_USE()){
    try{
      await window._fb.delete('students', sid);
    }catch(e){ console.warn('Firebase 삭제 실패:', e); }
  }
  if(ST._savingIds) ST._savingIds.delete(String(sid));
  render();
}

// ── 주간플랜 초기화 (안전) ──
function clearWeeklyPlan(){
  const s = ST.sel || ST.adminSel;
  if(!s){ return; }
  // 현재 보는 주차 계산
  const now=new Date();
  const cy=now.getFullYear(), cm=now.getMonth()+1, cw=getWeekOfMonth(cy,cm,now.getDate());
  const wy=ST.weekYear||cy, wm=ST.weekMonth||cm, ww=ST.weekWeek||cw;
  const isCurrentWeek=(wy===cy&&wm===cm&&ww===cw);
  const wLabel=wy+'년 '+wm+'월 '+ww+'주차';
  if(!confirm(wLabel+' 타임테이블을 모두 지울까요?\n(주간이력은 보존됩니다)')) return;
  if(isCurrentWeek){
    // 현재 주차 초기화
    upd(Object.assign({}, s, {
      weeklyPlan: {},
      weeklyBookMap: {},
      _planWeek: ''
    }));
  } else {
    // 선택된 다른 주차 이력 초기화
    const curKey=getWeekNum(wy,wm,ww);
    const hist=(s.weeklyHistory||[]).map(h=>{
      if(getWeekNum(h.year,h.month,h.weekNum)===curKey){
        return Object.assign({},h,{plan:{},bookMap:{}});
      }
      return h;
    });
    upd(Object.assign({}, s, {weeklyHistory: hist}));
  }
}
function upd(s){
  // 이 학생 ID만 일시적으로 onSnapshot 차단 (race condition 방지)
  if(!ST._savingIds) ST._savingIds=new Set();
  ST._savingIds.add(String(s.id));
  ST.students=ST.students.map(x=>String(x.id)===String(s.id)?s:x);
  if(String(ST.sel?.id)===String(s.id))ST.sel=s;
  if(String(ST.adminSel?.id)===String(s.id))ST.adminSel=s;
  // Firebase에 즉시 저장 (이 학생만)
  if(FB_USE()) fbSave('students', s.id, s);
  save();render();
  // 3초 후 onSnapshot 차단 해제
  const sid=String(s.id);
  setTimeout(()=>{if(ST._savingIds) ST._savingIds.delete(sid);},2000);
}

// ── 모바일 뒤로가기 History API ──
let _historyPushing = false;

function _getNavState(){
  return {
    sel: ST.sel?.id || null,
    adminSel: ST.adminSel?.id || null,
    tab: ST.tab || 'overview',
    adminTab: ST.adminTab || 'report',
    page: ST.page || 'main',
    ts: Date.now()
  };
}

function _pushHistory(){
  if(_historyPushing) return;
  const state = _getNavState();
  const cur = history.state;
  if(cur &&
     cur.sel===state.sel &&
     cur.tab===state.tab &&
     cur.adminSel===state.adminSel &&
     cur.page===state.page &&
     cur.adminTab===state.adminTab) return;
  history.pushState(state, '');
}

window.addEventListener('popstate', function(e){
  const st = e.state;
  const cur = _getNavState();

  // 로그인 상태 + 첫화면(기본탭, 학생미선택)인지 판단
  const isFirstScreen = ST.currentUser && (
    cur.tab === 'overview' || cur.tab === 'report'
  ) && !cur.adminSel;

  if(isFirstScreen){
    if(window.confirm('SG상담플랫폼을 종료하시겠습니까?')){
      // 확인 → 히스토리를 완전히 소진해서 이탈
      history.go(-(history.length));
      setTimeout(function(){ window.close(); }, 300);
    } else {
      // 취소 → 현재 상태 재등록해서 유지
      history.pushState(_getNavState(), '');
    }
    return;
  }

  _historyPushing = true;

  if(st && ST.currentUser){
    if(st.page)     ST.page     = st.page;
    if(st.tab)      ST.tab      = st.tab;
    if(st.adminTab) ST.adminTab = st.adminTab;
    if(st.sel){
      const found = ST.students.find(x=>String(x.id)===String(st.sel));
      if(found) ST.sel = found;
    }
    if(st.adminSel){
      const found2 = ST.students.find(x=>String(x.id)===String(st.adminSel));
      if(found2) ST.adminSel = found2;
    }
  }

  // 현재 상태 히스토리 재등록 (이탈 방지)
  history.pushState(_getNavState(), '');

  _historyPushing = false;
  render();
});

function render(){
  const app=document.getElementById('app');
  // ── 화면 그리기 전 counselor 항상 최신 선생님 이름으로 재매핑 ──
  if(ST.teachers && ST.teachers.length>0 && ST.students && ST.students.length>0){
    ST.students = ST.students.map(s=>{
      if(!s.counselor) return s;
      const tc = ST.teachers.find(t=>t.name===s.counselor);
      // counselor 이름이 teachers에 있으면 최신 이름 유지 (이미 최신이면 그대로)
      // 이름이 변경됐다면 teacherId로 찾아서 새 이름 적용
      const tcById = s.teacherId ? ST.teachers.find(t=>String(t.id)===String(s.teacherId)) : null;
      if(tcById && tcById.name !== s.counselor){
        return {...s, counselor: tcById.name,
          counselors: (s.counselors||[]).map(c=>c===s.counselor?tcById.name:c)};
      }
      return s;
    });
    if(ST.sel) ST.sel = ST.students.find(x=>String(x.id)===String(ST.sel.id))||ST.sel;
    if(ST.adminSel) ST.adminSel = ST.students.find(x=>String(x.id)===String(ST.adminSel.id))||ST.adminSel;
  }
  // 탭 전환 여부 감지
  const isTabSwitch=ST._prevTab!==ST.tab;
  ST._prevTab=ST.tab;
  // 상태 변화 시 history push (뒤로가기 지원)
  if(!_historyPushing) _pushHistory();
  // main-area 스크롤 저장 (타임테이블 등 위치 유지)
  const ma=document.querySelector('.main-area');
  const sy=ma?ma.scrollTop:0;
  // 주간플랜 탭이면 scrollTop이 DOM 교체로 0이 됐을 때 저장값 유지
  const _isWeekly=(ST.tab==='weekly'||ST.weekTab==='tt'||ST.weekTab==='plan');
  if(!isTabSwitch){
    if(_isWeekly && sy===0 && (ST._mainScrollY||0)>0){
      // DOM 교체로 인한 강제 0 - 저장값 그대로 유지
    } else {
      ST._mainScrollY=sy;
    }
  }
  const restoreY=isTabSwitch?0:(ST._mainScrollY||0);
  if(!ST.currentUser){
    // 정적 로그인 화면 표시
    const ls=document.getElementById('login-screen');
    if(ls){ ls.style.display='flex'; app.style.display='none'; }
    else { app.innerHTML=renderLogin(); }
    // 플랫폼명 업데이트
    const pn=document.getElementById('login-platform-name');
    if(pn) pn.textContent=getPlatformName(true);
    // Enter 키 이벤트
    const pw=document.getElementById('login_pw');
    if(pw && !pw._bound){ pw._bound=true; pw.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();}); }
    const id_=document.getElementById('login_id');
    if(id_ && !id_._bound){ id_._bound=true; id_.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login_pw')?.focus();}); }
    bindEvents(); return;
  }
  // 앱 화면 표시 시 로그인 화면 숨기기
  const ls2=document.getElementById('login-screen');
  if(ls2){ ls2.style.display='none'; app.style.display=''; }
  // 앱 화면 렌더링
  try{
    app.innerHTML=ST.page==='admin'?renderAdmin():renderMain();
  }catch(e){
    console.error('[render 에러]', e.message, e.stack);
    app.innerHTML='<div style="padding:40px;text-align:center;color:#e53935"><h3>⚠️ 화면 오류</h3><p style="margin:10px 0">'+e.message+'</p><button onclick="location.reload()" style="background:#3b5bdb;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px">🔄 새로고침</button></div>';
  }
  bindEvents();
  // 스크롤 복원 + 검색창 포커스 복원
  if(restoreY>0){
    requestAnimationFrame(()=>{
      const nma=document.querySelector('.main-area');
      if(nma){
        if(isTabSwitch){ nma.scrollTop=0; }
        else { nma.scrollTop=restoreY; }
      }
      // 검색창 포커스 복원 (입력 중이었으면 커서 위치도 복원)
      if(ST._searchFocused){
        const si=document.getElementById('search_input');
        if(si){ si.focus(); const l=si.value.length; si.setSelectionRange(l,l); }
        ST._searchFocused=false;
      }
    });
    setTimeout(()=>{
      const nma2=document.querySelector('.main-area');
      if(nma2 && !isTabSwitch) nma2.scrollTop=restoreY;
    },50);
  } else {
    requestAnimationFrame(()=>{
      const nma=document.querySelector('.main-area');
      if(nma && isTabSwitch) nma.scrollTop=0;
      // 검색창 포커스 복원
      if(ST._searchFocused){
        const si2=document.getElementById('search_input');
        if(si2){ si2.focus(); const l2=si2.value.length; si2.setSelectionRange(l2,l2); }
        ST._searchFocused=false;
      }
    });
  }
}

function doLogin(){
  var id = (document.getElementById('login_id').value||'').trim();
  var pw = (document.getElementById('login_pw').value||'').trim();
  var err = document.getElementById('login_err');

  if(!id||!pw){ if(err)err.textContent='아이디와 비밀번호를 입력하세요.'; return; }
  if(err) err.textContent='';

  // 최종관리자
  if(id==='admin' && pw==='admin1234'){
    ST.currentUser={id:'admin',name:'최종관리자',role:'admin',teacherId:null};
    ST.currentOrg=null;
    sessionStorage.setItem('sg_session', JSON.stringify({user:ST.currentUser, org:null}));
    ST.page='admin'; render();
    // Firebase에서 최신 데이터 로드
    if(FB_USE()){ setTimeout(async()=>{ await fbLoadAll_all(); render(); startRealtimeSync(); },500); }
    return;
  }

  // 기관관리자 로그인
  try{
    const orgs=JSON.parse(localStorage.getItem(SK_ORGS)||'[]');
    const org=orgs.find(o=>String(o.loginId||'').trim()===id&&String(o.password||'').trim()===pw);
    if(org){
      ST.currentUser={id:'org_'+org.id,name:org.name+'(기관관리자)',role:'orgAdmin',teacherId:null};
      ST.currentOrg=org;
      // 기관 데이터 필터
      try{
        const allStu=dbL(SK)||[];
        ST.students=allStu.filter(s=>s.orgId===org.id);
        const allTea=JSON.parse(localStorage.getItem(SKT)||'[]');
        ST.teachers=allTea.filter(t=>t.orgId===org.id);
      }catch(e){}
      sessionStorage.setItem('sg_session', JSON.stringify({user:ST.currentUser, org:ST.currentOrg}));
      ST.page='admin'; ST.adminTab='report'; render(); return;
    }
  }catch(e){}

  // 모든 키에서 검색
  var keys = ['sg_accounts_v1','susi_t_v2','susi_t_v1'];
  var found = null;
  for(var i=0; i<keys.length; i++){
    try{
      var raw = localStorage.getItem(keys[i]);
      if(!raw) continue;
      var arr = JSON.parse(raw);
      for(var j=0; j<arr.length; j++){
        var a = arr[j];
        if(String(a.loginId||'').trim()===id && String(a.password||'').trim()===pw){
          found = a; break;
        }
      }
      if(found) break;
    }catch(e2){}
  }

  // ST.teachers에서도 검색
  if(!found){
    var ts = ST.teachers||[];
    for(var k=0; k<ts.length; k++){
      if(String(ts[k].loginId||'').trim()===id && String(ts[k].password||'').trim()===pw){
        found = ts[k]; break;
      }
    }
  }

  if(found){
    ST.currentUser={id:found.id, name:found.name, role:'teacher', teacherId:found.id, orgId:found.orgId||null};
    if(found.orgId){
      try{
        const orgs=JSON.parse(localStorage.getItem(SK_ORGS)||'[]');
        const foundOrg=orgs.find(o=>o.id===found.orgId)||null;
        ST.currentOrg=foundOrg;
        if(foundOrg){
          // 기관 소속 학생/선생님만 로드 (localStorage 우선, Firebase로 최신화)
          const allStudents=JSON.parse(localStorage.getItem(SK)||'[]');
          const allTeachers=JSON.parse(localStorage.getItem(SKT)||'[]');
          // 본인 기관 + 본인 담당 학생만
          ST.students=allStudents.filter(s=>{
            if(s.orgId!==foundOrg.id) return false;
            const sc=[...(s.counselors||[])];
            if(s.counselor&&!sc.includes(s.counselor)) sc.unshift(s.counselor);
            return sc.includes(found.name);
          });
          ST.teachers=allTeachers.filter(t=>t.orgId===foundOrg.id);
        }
      }catch(e){ console.warn('기관 데이터 로드 오류:',e); }
    } else {
      ST.currentOrg=null;
    }
    sessionStorage.setItem('sg_session', JSON.stringify({user:ST.currentUser, org:ST.currentOrg}));
    ST.page='main'; render();
    // Firebase에서 최신 데이터로 갱신 (비동기)
    if(FB_USE()){
      setTimeout(async()=>{
        const loaded = await fbLoadAll_all();
        if(loaded) render();
      }, 500);
    }
    return;
  }

  if(err) err.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';
  // 로그인 실패 시 초기화 박스 표시
  const _erb = document.getElementById('emergency_reset_box');
  if(_erb) _erb.style.display = 'block';
}

function restoreSession(){
  const sess=dbL(SK_AUTH);
  if(!sess) return render();
  const user=sess.user||sess;
  const org=sess.org||null;
  if(user?.name){
    ST.currentUser=user;
    ST.currentOrg=org;
    ST.page=user.role==='admin'||user.role==='orgAdmin'?'admin':'main';
    render();
  }
}
function clearSession(){
  sessionStorage.removeItem('sg_session');
  ST.currentUser=null;
  ST.currentOrg=null;
  // 초기 로그인 화면 강제 표시
  try{
    const _ls=document.getElementById('login-screen');
    const _app=document.getElementById('app');
    if(_ls) _ls.style.display='flex';
    if(_app) _app.style.display='none';
  }catch(e){}
  render();
}
function doLogout(){
  sessionStorage.removeItem('sg_session');
  ST.currentUser=null;ST.currentOrg=null;ST.sel=null;ST.adminSel=null;ST.page='main';render();
}

// ══ 학생 상세 ══
function renderDetail(s){
  if(!s || !s.id){ return '<div style="padding:40px;text-align:center;color:#aaa">학생 데이터를 불러오는 중...</div>'; }
  // ── 상위 탭 정의 (하위탭 보유 여부 표시) ──
  const isAdmin2 = ST.currentUser?.role==='admin';
  const isOrgAdmin2 = ST.currentUser?.role==='orgAdmin';
  const teacher2 = (isAdmin2||isOrgAdmin2) ? null : ST.teachers.find(t=>String(t.id)===String(ST.currentUser?.teacherId));
  const teacherPerms = (isAdmin2||isOrgAdmin2) ? null : (teacher2?.permissions||[]);
  // 기관 권한 조회 (기관관리자 or 선생님 모두 해당 기관 permissions 적용)
  const _orgPerms2 = (()=>{
    const oid = ST.currentOrg?.id || ST.currentUser?.orgId || null;
    if(!oid) return null; // 기관 없으면 전체 허용
    try{
      const allOrgs=JSON.parse(localStorage.getItem(SK_ORGS)||'[]');
      const fo=allOrgs.find(o=>String(o.id)===String(oid));
      return fo?.permissions||null; // null이면 전체 허용
    }catch(e){return null;}
  })();
  const hasPerm = (key)=>{
    if(isAdmin2) return true; // 최종관리자: 전체 허용
    if(_orgPerms2 && !_orgPerms2.includes(key)) return false; // 기관 미허용 기능 차단
    if(isOrgAdmin2) return true; // 기관관리자: 기관 허용 기능은 모두 가능
    return teacherPerms!==null && teacherPerms.includes(key); // 선생님: 개인 권한
  };
  const mainTabs = [
    {id:'overview',  label:'개요',       icon:'📋', sub:false,  perm:null},
    {id:'grade',     label:'성적',       icon:'📊', sub:false,  perm:'grade'},
    {id:'weekly',    label:'주간플랜',   icon:'📅', sub:true,   perm:'weekly'},
    {id:'test',      label:'테스트',     icon:'📝', sub:false,  perm:'test'},
    {id:'consult',   label:'상담',       icon:'💬', sub:false,  perm:'consult'},
    {id:'susi',      label:'수시',       icon:'🏫', sub:true,   perm:'susi'},
    {id:'jeongsi',   label:'정시',       icon:'🎯', sub:false,  perm:'jeongsi'},
    {id:'apex',       label:'APEX진단',   icon:'🏆', sub:false,  perm:'apex'},
  ].filter(tab=>!tab.perm||hasPerm(tab.perm));
  // susi 계열, weekly 계열 판단
  const isSusiGroup  = ST.tab==='susi' || ST.tab==='susi_print';
  const isWeekGroup  = ST.tab==='weekly';
  const isJeongsiGroup = ST.tab==='jeongsi';
  const activeMain   = isSusiGroup ? 'susi' : isWeekGroup ? 'weekly' : ST.tab;

  const printBtns = {
    overview:   '',
    grade:      `<button onclick="printGrade(${s.id})" style="background:#8b5cf618;color:#8b5cf6;border:1.5px solid #8b5cf640;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">🖨️ 성적 인쇄/PDF</button>
                 <button onclick="exportGradeXls(${s.id})" style="background:#10b98118;color:#10b981;border:1.5px solid #10b98140;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">📊 엑셀 저장</button>`,
    susi:       `<button onclick="printSusiReport(${s.id})" style="background:#f59e0b18;color:#f59e0b;border:1.5px solid #f59e0b40;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">🖨️ 수시 인쇄/PDF</button>`,
    susi_print: `<button onclick="printSusiReport(${s.id})" style="background:#3b5bdb;color:#fff;border:none;border-radius:8px;padding:6px 16px;font-size:11px;font-weight:700">🖨️ 상담자료 인쇄/PDF</button>`,
    weekly:     `<button onclick="printTab(${s.id},'weekly')" style="background:#10b98118;color:#10b981;border:1.5px solid #10b98140;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">🖨️ 학습플랜 인쇄/PDF</button>`,
    achieve:    `<button onclick="printAchieve(${s.id})" style="background:#8b5cf618;color:#8b5cf6;border:1.5px solid #8b5cf640;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">🖨️ 점검표 인쇄/PDF</button>
                 <button onclick="exportAchieveXls(${s.id})" style="background:#10b98118;color:#10b981;border:1.5px solid #10b98140;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">📊 엑셀</button>`,
    consult:    `<button onclick="printTab(${s.id},'consult')" style="background:#8b5cf618;color:#8b5cf6;border:1.5px solid #8b5cf640;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">🖨️ 상담이력 인쇄/PDF</button>`,
    jeongsi:    `<button onclick="saveJeongsiSnapshot('${s.id}')" style="background:#3b5bdb18;color:#3b5bdb;border:1.5px solid #3b5bdb40;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">💾 분석결과 저장</button>
                 <button onclick="printJeongsi('${s.id}')" style="background:#ef444418;color:#ef4444;border:1.5px solid #ef444440;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">🖨️ 정시 인쇄/PDF</button>
                 <button onclick="exportJeongsiXls('${s.id}')" style="background:#10b98118;color:#10b981;border:1.5px solid #10b98140;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">📊 엑셀</button>`,
    apex:       `<button onclick="printApexResult('${s.id}')" style="background:#1A237E18;color:#1A237E;border:1.5px solid #1A237E40;border-radius:8px;padding:6px 13px;font-size:11px;font-weight:700">🖨️ APEX 리포트 인쇄</button>`,
  };
  const curPrintBtn = printBtns[ST.tab]||'';

  return`<div class="fade">
    <!-- 학생 헤더 -->
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
      <div style="width:46px;height:46px;border-radius:13px;background:${s.color};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0;box-shadow:0 2px 8px ${s.color}55">${esc(s.avatar)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:17px;font-weight:900;color:#1a1a2e">${esc(s.name)}</div>
        <div style="font-size:11px;color:#777;margin-top:1px">${esc(s.school)} · ${esc(s.grade)}${s.className?' · '+esc(s.className):''} · 담당: ${esc(s.counselor)}</div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button class="btn-g" style="font-size:10px;padding:5px 11px" onclick="openSForm(ST.students.find(x=>String(x.id)==='${s.id}'))">✏️ 수정</button>
        <button class="btn-r" style="font-size:10px;padding:5px 9px" onclick="deleteStudent('${s.id}')">🗑 삭제</button>
      </div>
    </div>

    <!-- ① 상위 탭 바 -->
    <div style="background:#fff;border-radius:14px;border:1.5px solid #e8eaf6;margin-bottom:${isSusiGroup||isWeekGroup?'0':'14px'};overflow:hidden">
      <div style="display:flex;align-items:stretch">
        ${mainTabs.map(({id,label,icon,sub})=>{
          const isAct = activeMain===id;
          return`<button onclick="ST.tab='${id}';${id==='weekly'?'ST.weekYear=null;ST.weekMonth=null;ST.weekWeek=null;':''}ST._eraseMode=false;render()"
            style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:12px 4px 10px;border:none;cursor:pointer;transition:all .15s;
              background:${isAct?'#3b5bdb':'transparent'};
              color:${isAct?'#fff':'#666'};
              border-right:1.5px solid #e8eaf6;">
            <div style="display:flex;align-items:center;gap:5px">
              <span style="font-size:16px;line-height:1">${icon}</span>
              <span style="font-size:13px;font-weight:${isAct?800:700};white-space:nowrap;letter-spacing:-0.3px">${label}</span>
            </div>
            ${sub?`<span style="font-size:8px;${isAct?'color:#c5d3ff':'color:#bbb'};font-weight:500">▼ 세부메뉴</span>`:'<span style="font-size:8px;opacity:0">ㅡ</span>'}
          </button>`;
        }).join('')}
      </div>
    </div>

    <!-- ② 하위 탭 바 (수시 계열) -->
    ${isSusiGroup?`<div style="background:#f4f6fb;border:1.5px solid #e8eaf6;border-top:none;border-radius:0 0 12px 12px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-size:9px;color:#aaa;font-weight:600;white-space:nowrap">🏫 수시</span>
      <span style="color:#e0e3ef;font-size:12px">›</span>
      <button onclick="ST.tab='susi';render()"
        style="background:${ST.tab==='susi'?'#3b5bdb':'#fff'};color:${ST.tab==='susi'?'#fff':'#555'};border:1.5px solid ${ST.tab==='susi'?'#3b5bdb':'#dde1f0'};border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;cursor:pointer">
        🏫 수시 분석
      </button>
      <button onclick="ST.tab='susi_print';render()"

        📄 출력용
      </button>
      ${curPrintBtn?`<div style="margin-left:auto">${curPrintBtn}</div>`:''}
    </div>`:''}

    <!-- ② 하위 탭 바 (주간플랜 계열) - renderWeekly 내에서 처리 -->
    ${!isSusiGroup&&isWeekGroup?`<div style="background:#f4f6fb;border:1.5px solid #e8eaf6;border-top:none;border-radius:0 0 12px 12px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
      <span style="font-size:9px;color:#aaa;font-weight:600;white-space:nowrap">📅 주간플랜</span>
      <span style="color:#e0e3ef;font-size:12px">›</span>
      <span style="font-size:10px;color:#bbb;font-style:italic">아래에서 세부 탭 선택</span>
      ${curPrintBtn?`<div style="margin-left:auto">${curPrintBtn}</div>`:''}
    </div>`:''}

    <!-- ③ 성적·상담·개요: 인쇄 버튼만 우측에 -->
    ${!isSusiGroup&&!isWeekGroup&&curPrintBtn?`<div style="display:flex;justify-content:flex-end;margin-bottom:10px;gap:6px">${curPrintBtn}</div>`:''}

    ${ST.tab==='overview'?renderOverview(s):ST.tab==='grade'?renderGrade(s):ST.tab==='susi'?renderSusi(s):ST.tab==='susi_print'?renderSusiPrint(s):ST.tab==='weekly'?renderWeekly(s):ST.tab==='test'?renderStudentTest(s):ST.tab==='jeongsi'?renderJeongsi(s):ST.tab==='apex'?renderApex(s):renderConsult(s)}
  </div>`;
}

// ══ 개요 탭 ══
function renderOverview(s){
  const a=gAvg(s.subjects);
  const mg=s.mockGrades||{};
  return`
  <div class="g4" style="margin-bottom:12px">
    <div class="stat"><div class="sv" style="color:${gc(a)}">${a.toFixed(2)}</div><div class="sl">내신평균</div></div>
    <div class="stat"><div class="sv" style="color:#f59e0b">${(s.targets||[]).length}</div><div class="sl">지원대학</div></div>
    <div class="stat"><div class="sv" style="color:#10b981">${Object.keys(s.weeklyPlan||{}).length}h</div><div class="sl">주간플랜</div></div>
    <div class="stat"><div class="sv" style="color:#8b5cf6">${(s.consultations||[]).length}</div><div class="sl">상담횟수</div></div>
  </div>
  <div class="box" style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:12px;font-weight:700;color:#555">📚 내신 성적 요약</span>
      <button onclick="ST.tab='grade';render()" style="background:transparent;color:#3b82f6;border:1px solid #3b82f640;border-radius:6px;padding:2px 9px;font-size:10px;font-weight:700">상세 →</button>
    </div>
    ${GRADE_SUBJS.map(([k,lb])=>{
  const raw=s.subjects[k];
  const v=(raw===null||raw===undefined||raw==='')?null:(isNaN(+raw)?null:+raw);
  const c=v?gc(v):'#cbd5e1';
  const pct=v?((6-v)/5*100).toFixed(0):'0';
  const label=(v!==null)?v+'등급':'미입력';
  return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="font-size:11px;color:#555;width:36px;flex-shrink:0">${lb}</span><div class="bb" style="flex:1"><div class="bf" style="width:${pct}%;background:${c}"></div></div><span style="font-size:12px;font-weight:700;color:${c};min-width:36px;text-align:right">${label}</span></div>`;}).join('')}
  </div>
  <div class="box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:12px;font-weight:700;color:#555">📝 모의고사 요약</span>
      <button onclick="ST.tab='grade';render();setTimeout(()=>openMockForm(ST.sel?.id||ST.adminSel?.id),100)" style="background:transparent;color:#f59e0b;border:1px solid #f59e0b40;border-radius:6px;padding:2px 9px;font-size:10px;font-weight:700">상세 →</button>
    </div>
    ${Object.values(mg).some(v=>Object.values(v||{}).some(x=>x))?
      ['국어','수학','영어','탐구1','탐구2'].map(subj=>{
        const latest=MOCK_TESTS.slice().reverse().find(t=>(mg[subj]||{})[t]);
        const raw=latest?(mg[subj]||{})[latest]:null;
        if(!raw)return'';
        const gv=typeof raw==='object'?raw.grade:raw;
        const c=gv&&!isNaN(+gv)&&+gv>=1&&+gv<=9?gc(+gv):'#aaa';
        const display=fmtMock(raw);
        return`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #e8eaf6"><span style="color:#555">${subj}</span><span style="color:${c};font-weight:700">${display}${latest?'<span style="font-size:9px;color:#888;font-weight:400;margin-left:4px">('+latest+')</span>':''}</span></div>`;
      }).filter(Boolean).join('')||'<div style="color:#888;font-size:12px">성적 없음</div>'
    :`<div style="text-align:center;color:#888;padding:14px 0;font-size:12px">모의고사 성적 미입력<br><button onclick="ST.tab='grade';render();setTimeout(()=>openMockForm(ST.sel?.id),100)" style="margin-top:8px;background:#f59e0b18;color:#f59e0b;border:1px solid #f59e0b40;border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700">입력하기</button></div>`}
    ${s.mockMemo?`<div style="margin-top:8px;font-size:11px;color:#777;border-top:1px solid #e8eaf6;padding-top:6px">${esc(s.mockMemo)}</div>`:''}
  </div>`;
}

// ══ 성적 탭 ══
function renderGrade(s){
  const a=gAvg(s.subjects);
  const gd=s.gradeDetail||{};
  const mg=s.mockGrades||{};
  const activeCols=MOCK_TESTS.filter(t=>MOCK_SUBJS.some(sb=>(mg[sb]||{})[t]));
  const SGRADE_SUBJS=getStudentGradeSubjs(s); // 학생별 커스텀 과목명 적용
  const extraSubjs=s.extraSubjs||[];
  const allDetailSubjs=[...SGRADE_SUBJS.map(([,lb])=>lb),...extraSubjs];
  const hasDetail=allDetailSubjs.some(lb=>Object.keys(gd[lb]||{}).length>0);

  // 추가 과목 대표 등급 (학기별 세부 내신에서 최신 학기 값 사용)
  function getExtraGrade(lb){
    const d=gd[lb]||{};
    for(const sem of ['3-1','2-2','2-1','1-2','1-1']){
      const entry=d[sem];
      if(!entry) continue;
      const val=typeof entry==='object'?(entry.grade??entry):entry;
      if(val!==null&&val!==undefined&&val!==''&&!isNaN(+val)&&+val>0) return +val;
    }
    return null;
  }
  return`
  <!-- 액션 버튼 바 -->
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    <button onclick="openGradeForm(${s.id})" style="background:#3b82f618;color:#3b5bdb;border:1px solid #3b82f640;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700">✏️ 내신 입력/수정</button>
    <button onclick="openMockForm(${s.id})" style="background:#f59e0b18;color:#f59e0b;border:1px solid #f59e0b40;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700">✏️ 모의고사 입력/수정</button>
  </div>

  <!-- 내신 성적 -->
  <div class="box" style="margin-bottom:12px">
    <div style="font-size:13px;font-weight:800;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <span>📚 내신 성적 (학생부교과)</span>
      <span style="font-size:20px;font-weight:900;color:${gc(a)}">${a.toFixed(2)}등급</span>
    </div>
    <div class="g3" style="margin-bottom:14px">
      <div class="stat"><div class="sv" style="color:${gc(a)}">${a.toFixed(2)}</div><div class="sl">평균등급</div></div>
      <div class="stat"><div class="sv" style="color:${(()=>{const _vs=Object.values(s.subjects||{}).filter(v=>v!==null&&v!==undefined&&!isNaN(+v)&&+v>0);return _vs.length?gc(Math.min(..._vs)):'#aaa';})()}">${(()=>{const _vs=Object.values(s.subjects||{}).filter(v=>v!==null&&v!==undefined&&!isNaN(+v)&&+v>0);return _vs.length?Math.min(..._vs)+'등급':'미입력';})()}</div><div class="sl">최고등급</div></div>

function saveGradeForm(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  const SGRADE_SUBJS = getStudentGradeSubjs(s); // 학생별 커스텀 과목명 (s 선언 후 사용)

  // 학기별 세부 내신 - 등급+원점수 객체로 저장
  const gd = {};
  const allSubjs = [...SGRADE_SUBJS.map(([,lb])=>lb), ..._gradeExtraSubjs];

  allSubjs.forEach((lb, idx)=>{
    const finalName = idx >= SGRADE_SUBJS.length
      ? (document.getElementById(`gd_name_${idx}`)?.value?.trim() || lb)
      : lb;
    if(!finalName) return;
    gd[finalName] = {};
    SEMS.forEach(sem=>{
      const g = document.getElementById(`gd_${idx}_${sem}_grade`)?.value?.trim();
      const r = document.getElementById(`gd_${idx}_${sem}_raw`)?.value?.trim();
      const legacy = document.getElementById(`gd_${idx}_${sem}`)?.value?.trim();
      if(g||r||legacy){
        gd[finalName][sem] = {
          grade: g ? +g : (legacy ? +legacy : null),
          raw:   r ? +r : null
        };
      }
    });
  });

  // 대표 등급: 학기별 입력값에서만 계산 (hidden input 기존값 무시)
  // 학기 모두 비우면 → null (성적 없음), 잠금 해제
  const subjects = {};
  SGRADE_SUBJS.forEach(([k, lb])=>{
    let autoGrade = null;
    for(const sem of ['3-1','2-2','2-1','1-2','1-1']){
      const cv = (gd[lb]||{})[sem];
      const g = fmtGrade(cv);
      if(g !== null){ autoGrade = g; break; }
    }
    // 학기 입력 있으면 그 값, 없으면 null (0도 null로 간주 → 미입력 처리)
    subjects[k] = autoGrade;
  });
  // 기존 subjects에 있지만 SGRADE_SUBJS에 없는 키는 유지 (추가 과목 등)
  Object.keys(s.subjects||{}).forEach(k=>{
    if(!(k in subjects)) subjects[k] = s.subjects[k];
  });

  const extraSubjs = _gradeExtraSubjs.map((lb, i)=>{
    return document.getElementById(`gd_name_${SGRADE_SUBJS.length+i}`)?.value?.trim() || lb;
  }).filter(Boolean);

  upd({...s, subjects, gradeDetail:gd, extraSubjs});
  document.querySelector('.grade-overlay')?.remove();
}

  const extraSubjs=s.extraSubjs||[];
  const allDetailSubjs=[...SGRADE_SUBJS.map(([,lb])=>lb),...extraSubjs];
  const activeCols=MOCK_TESTS.filter(t=>MOCK_SUBJS.some(sb=>(mg[sb]||{})[t]));
  const activeSubjs=MOCK_SUBJS.filter(sb=>mg[sb]&&Object.values(mg[sb]).some(v=>v));
  const gc2=v=>v<=1.5?'#1967d2':v<=2.5?'#0f9d58':v<=3.5?'#e37400':'#c5221f';

  // 추가 과목 대표 등급 (최신 학기 우선)
  function getExtraGrade(lb){
    const d=gd[lb]||{};
    for(const sem of ['3-1','2-2','2-1','1-2','1-1']){
      const entry=d[sem];
      if(!entry) continue;
      const val=typeof entry==='object'?(entry.grade??entry):entry;
      if(val!==null&&val!==undefined&&val!==''&&!isNaN(+val)&&+val>0) return +val;
    }
    return null;
  }

  let body=`<div class="info-box" style="margin-bottom:18px">
    <div class="info-box-main">
      <div class="info-box-name">${esc(s.name)}</div>
      <div class="info-box-sub">${esc(s.school)} · ${esc(s.grade)}${s.className?' · '+esc(s.className):''} · 담당: ${esc(s.counselor)}</div>
    </div>
  </div>
  <h3>📚 내신 성적</h3>
  <div class="g2" style="margin-bottom:12px">
    <div class="stat"><div class="sv" style="color:${(()=>{const _vs=Object.values(s.subjects||{}).filter(v=>v!==null&&v!==undefined&&!isNaN(+v)&&+v>0);return _vs.length?gc2(Math.min(..._vs)):'#aaa';})()}">${(()=>{const _vs=Object.values(s.subjects||{}).filter(v=>v!==null&&v!==undefined&&!isNaN(+v)&&+v>0);return _vs.length?Math.min(..._vs)+'등급':'미입력';})()}</div><div class="sl">최고 등급</div></div>
    <div class="stat"><div class="sv" style="color:${(()=>{const _vs=Object.values(s.subjects||{}).filter(v=>v!==null&&v!==undefined&&!isNaN(+v)&&+v>0);return _vs.length?gc2(Math.max(..._vs)):'#aaa';})()}">${(()=>{const _vs=Object.values(s.subjects||{}).filter(v=>v!==null&&v!==undefined&&!isNaN(+v)&&+v>0);return _vs.length?Math.max(..._vs)+'등급':'미입력';})()}</div><div class="sl">최저 등급</div></div>
  </div>
  ${SGRADE_SUBJS.map(([k,lb])=>{const rv=s.subjects[k];const v=(rv===null||rv===undefined||isNaN(+rv))?null:+rv;if(v===null)return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><span style="font-size:12px;width:52px;color:#555;font-weight:600">${lb}</span><div class="bar-bg" style="flex:1"></div><span style="font-size:12px;color:#bbb;min-width:48px;text-align:right">미입력</span></div>`;const c=gc2(v),pct=((6-v)/5*100).toFixed(0);return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><span style="font-size:12px;width:52px;color:#555;font-weight:600">${lb}</span><div class="bar-bg" style="flex:1"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div><span style="font-size:13px;font-weight:900;color:${c};min-width:48px;text-align:right">${v}등급</span></div>`;}).join('')}
  ${extraSubjs.map(lb=>{const v=getExtraGrade(lb);if(v===null)return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><span style="font-size:12px;width:52px;color:#555;font-weight:600">${esc(lb)}</span><div class="bar-bg" style="flex:1"></div><span style="font-size:12px;color:#bbb;min-width:48px;text-align:right">미입력</span></div>`;const c=gc2(v),pct=((6-v)/5*100).toFixed(0);return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><span style="font-size:12px;width:52px;color:#555;font-weight:600">${esc(lb)}</span><div class="bar-bg" style="flex:1"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div><span style="font-size:13px;font-weight:900;color:${c};min-width:48px;text-align:right">${v}등급</span></div>`;}).join('')}`;

  // 학기별 세부 내신 (추가 과목 포함, 동일 스타일)
  if(allDetailSubjs.some(lb=>Object.keys(gd[lb]||{}).length>0)){
    const detailRows=allDetailSubjs
      .filter(lb=>Object.keys(gd[lb]||{}).length>0)
      .map(lb=>`<tr><td class="lbl">${esc(lb)}</td>${SEMS.map(sem=>{const cv=(gd[lb]||{})[sem];const g=fmtGrade(cv);const r=fmtGradeRaw(cv);return`<td style="color:${g?gc2(g):'#aaa'};font-weight:${g?700:400}">${g||'–'}${r?`<br><small style='font-size:9px;color:#aaa'>${r}점</small>`:''}</td>`;}).join('')}</tr>`)
      .join('');
    body+=`<h3>📖 학기별 세부 내신</h3><table><tr><th style="text-align:left">과목</th>${SEMS.map(s2=>`<th>${s2}</th>`).join('')}</tr>${detailRows}</table>`;
  }
  if(activeCols.length>0){
    body+=`<h3>📝 모의고사 성적</h3><table><tr><th style="text-align:left">과목</th>${activeCols.map(t=>`<th style="font-size:10px">${t}</th>`).join('')}</tr>${activeSubjs.map(sb=>`<tr><td class="lbl">${sb}</td>${activeCols.map(t=>{const raw=(mg[sb]||{})[t];const isG=raw?.grade&&!isNaN(+raw.grade);return`<td style="color:${isG?gc2(+raw.grade):'#333'};font-weight:700">${fmtMock(raw)}</td>`;}).join('')}</tr>`).join('')}</table>`;
    if(s.mockMemo)body+=`<div style="padding:9px 12px;background:#fffbeb;border-radius:6px;border-left:3px solid #f59e0b;font-size:11px;line-height:1.7">${esc(s.mockMemo)}</div>`;
  }
  popPrint(`${s.name} 성적 리포트`,body);
}

// ── 성적 엑셀 ──
function exportGradeXls(sid){
  const s=ST.students.find(x=>String(x.id)===String(sid));if(!s)return;
  const gd=s.gradeDetail||{};const mg=s.mockGrades||{};
  const extraSubjs=s.extraSubjs||[];
  const allDetailSubjs=[...GRADE_SUBJS.map(([,lb])=>lb),...extraSubjs];
  const activeCols=MOCK_TESTS.filter(t=>MOCK_SUBJS.some(sb=>(mg[sb]||{})[t]));
  let c=`학생,${s.name}\r\n학교,${s.school}\r\n학년,${s.grade}\r\n담당,${s.counselor}\r\n내신평균,${gAvg(s.subjects).toFixed(2)}등급\r\n\r\n`;
  c+=`[내신 성적 - 주요과목]\r\n과목,현재등급\r\n`;
  GRADE_SUBJS.forEach(([k,lb])=>{c+=`${lb},${s.subjects[k]}\r\n`;});
  if(allDetailSubjs.some(lb=>Object.keys(gd[lb]||{}).length>0)){
    c+=`\r\n[학기별 세부 내신]\r\n과목,${SEMS.join(',')},비고\r\n`;
    allDetailSubjs.forEach(lb=>{
      if(!Object.keys(gd[lb]||{}).length) return;
      const isExtra=!GRADE_SUBJS.some(([,l])=>l===lb);
      c+=`${lb},${SEMS.map(sem=>{const cv=(gd[lb]||{})[sem];const g=fmtGrade(cv);const r=fmtGradeRaw(cv);return g||(r?`${r}점`:'');}).join(',')},${isExtra?'추가과목':''}\r\n`;
    });
  }
  if(activeCols.length>0){
    c+=`\r\n[모의고사 성적]\r\n과목,${activeCols.join(',')}\r\n`;
    MOCK_SUBJS.filter(sb=>mg[sb]&&Object.values(mg[sb]).some(v=>v)).forEach(sb=>{c+=`${sb},${activeCols.map(t=>(mg[sb]||{})[t]||'').join(',')}\r\n`;});
    if(s.mockMemo)c+=`\r\n메모,${s.mockMemo}\r\n`;
  }
  csv_dl(c,`${s.name}_성적`);
}

// ══ 수시 탭 ══
const CC_BG={하향:'#10b98122',안정:'#3b82f622',적정:'#f59e0b22',상향:'#ef444422'};
// ══ 수시(출력용) 탭 ══
if(!window._susiPrintEdits) window._susiPrintEdits = {};
if(!window._susiPrintExtra) window._susiPrintExtra = {}; // 직접 추가 대학 목록

function renderSusiPrint(s){
  const tgts = s.targets||[];
  const a = gAvg(s.subjects);
  const sid = s.id;
  if(!window._susiPrintEdits[sid]) window._susiPrintEdits[sid] = {};
  if(!window._susiPrintExtra[sid]) window._susiPrintExtra[sid] = [];

    {key:'sn',       label:'수능최저', ph:'예) 3합6 또는 없음'},

  // ── 카드 렌더 함수 (수시탭 데이터 + 직접추가 공용) ──
  function renderEditCard(cardData, cardIdx, isExtra){

    const cid = isExtra ? `ex_${cardIdx}` : cardData.id;

    return`<div class="box" id="susi-card-${cid}" style="border-left:4px solid ${col};margin-bottom:14px">
      <!-- 헤더 -->

            <span class="chip" style="background:#eef1ff;color:#3b5bdb">${tgts.length+extras.indexOf(cardData)+1>0&&isExtra?`추가${extras.indexOf(cardData)+1}`:`${tgts.indexOf(cardData)+1}순위`}</span>
            ${isExtra
              ? `<input id="sp_univ_${cid}" value="${esc(univ||'')}" placeholder="대학명 입력"
                  oninput="window._susiPrintExtra[${sid}][${cardIdx}].univ=this.value"
                  style="font-size:15px;font-weight:900;color:#1a1a2e;border:none;border-bottom:2px solid #3b5bdb;outline:none;background:transparent;width:140px">`
              : `<span style="font-size:15px;font-weight:900">${esc(univ)}</span>`}
            ${rg==='지역인재'?'<span class="chip" style="background:#8b5cf622;color:#8b5cf6;border:1px solid #8b5cf644">지역인재</span>':''}
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            ${isExtra
              ? `<input id="sp_dept_${cid}" value="${esc(dept||'')}" placeholder="학과명 입력"
                  oninput="window._susiPrintExtra[${sid}][${cardIdx}].dept=this.value"
                  style="font-size:12px;color:#555;font-weight:600;border:none;border-bottom:1px solid #dde1f0;outline:none;background:transparent;width:140px">
                 <input id="sp_jeon_${cid}" value="${esc(jeon||'')}" placeholder="전형명"
                  oninput="window._susiPrintExtra[${sid}][${cardIdx}].jeon=this.value"
                  style="font-size:12px;color:#3b5bdb;font-weight:600;border:none;border-bottom:1px solid #c5cae9;outline:none;background:transparent;width:120px">`
              : `<span style="font-size:12px;color:#555;font-weight:600">${esc(dept)}</span>
                 <span style="font-size:11px;color:#3b5bdb;font-weight:600">· ${esc(jeon)}</span>`}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <select onchange="
            ${isExtra
              ? `window._susiPrintExtra[${sid}][${cardIdx}].chance=this.value;`
              : `if(!window._susiPrintEdits[${sid}][${cid}])window._susiPrintEdits[${sid}][${cid}]={};window._susiPrintEdits[${sid}][${cid}].chance=this.value;`}
            this.closest('.box').style.borderLeftColor=(window.CC||{hasOwnProperty:()=>false})[this.value]||'#64748b'"
            style="background:#fff;border:1.5px solid #dde1f0;color:#1a1a2e;border-radius:7px;padding:5px 8px;font-size:12px;font-weight:700;cursor:pointer">
            ${['하향','안정','적정','상향','미정'].map(c=>`<option value="${c}" ${(ev.chance||chance)===c?'selected':''}>${c}</option>`).join('')}
          </select>
          ${isExtra?`<button onclick="if(confirm('이 항목을 삭제하시겠습니까?')){window._susiPrintExtra[${sid}].splice(${cardIdx},1);ST.tab='susi_print';render();}"
            style="background:#fff0f0;color:#e53935;border:1px solid #fecaca;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer">삭제</button>`:''}
        </div>
      </div>

      <!-- 전형별 데이터 -->
      ${displayResults.map((r,ri)=>{
        const rKey = `r${ri}`;
        if(!ev[rKey]) ev[rKey] = {};
        const rv = ev[rKey];
        const isMulti = displayResults.length > 1;

        return`<div style="${ri>0?'border-top:1.5px dashed #e8eaf6;padding-top:12px;margin-top:12px':''}">
          ${isMulti?`<div style="display:inline-flex;align-items:center;gap:6px;background:#eef1ff;border-radius:7px;padding:4px 12px;font-size:11px;font-weight:700;color:#3b5bdb;margin-bottom:10px">
            ${isExtra
              ? `<input value="${esc(r.jeonName||'')}" placeholder="전형명"
                  oninput="window._susiPrintExtra[${sid}][${cardIdx}].aiResults[${ri}].jeonName=this.value"
                  style="border:none;background:transparent;color:#3b5bdb;font-weight:700;font-size:11px;outline:none;width:120px">`
              : esc(r.jeonName||jeon)}
          </div>`:''}

          <!-- 6칸 데이터 그리드 -->
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px">
            ${FIELDS.map(f=>{
              const aiVal = String(r[f.key]||ai[f.key]||'');

              const edited = rv[f.key]!==undefined && rv[f.key]!==aiVal;

                <div style="font-size:9px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between">

                  <span style="${edited?'color:#3b5bdb':'color:#bbb'};font-size:8px">${edited?'✏️수정됨':'AI추정'}</span>
                </div>
                <input value="${esc(curVal)}" placeholder="${f.ph}"
                  oninput="if(!window._susiPrintEdits[${sid}]['${cid}'])window._susiPrintEdits[${sid}]['${cid}']={};if(!window._susiPrintEdits[${sid}]['${cid}']['${rKey}'])window._susiPrintEdits[${sid}]['${cid}']['${rKey}']={};window._susiPrintEdits[${sid}]['${cid}']['${rKey}']['${f.key}']=this.value"
                  style="width:100%;background:transparent;border:none;color:#1a1a2e;font-size:12px;font-weight:700;outline:none;padding:0">

            <div style="font-size:9px;color:#888;margin-bottom:4px;font-weight:600;display:flex;justify-content:space-between">

          <!-- 지원 전략 -->
          <div style="background:#fff8e1;border-radius:8px;padding:9px 10px;border:1.5px solid #ffe082">
            <div style="font-size:9px;color:#b45309;margin-bottom:4px;font-weight:700">💡 지원 전략 <span style="font-weight:400">(직접 작성)</span></div>
            <textarea placeholder="이 전형 지원 전략, 준비사항, 조언..."

          </div>
        </div>`;
      }).join('')}

      <!-- 상담 메모 -->
      <div style="margin-top:10px;background:#f4f6fb;border-radius:8px;padding:9px 10px;border:1px solid #e8eaf6">

        <textarea placeholder="학부모·학생 상담 추가 메모..."

          style="width:100%;background:transparent;border:none;color:#333;font-size:12px;outline:none;resize:vertical;min-height:36px;font-family:inherit;line-height:1.7;padding:0">${esc(ev.memo||'')}</textarea>
      </div>

  // ── 메인 렌더 ──
  return`<div>
    <!-- 안내 + 직접 추가 버튼 -->
    <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap">
      <div style="background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:11px 14px;flex:1;min-width:200px">
        <div style="font-size:12px;color:#1e40af;line-height:1.8">
          <strong>📋 수시 출력용 상담 자료</strong><br>
          ✅ <strong>고정</strong>: 대학·학과·전형명 (수시 탭 연동)&nbsp;
          ✏️ <strong>편집</strong>: 모집인원·입결·전략 등 직접 수정<br>

        </div>
      </div>
      <button onclick="window._susiPrintExtra[${sid}].push({univ:'',dept:'',jeon:'',rg:'전국',chance:'적정',aiData:{},aiResults:null});ST.tab='susi_print';render()"
        style="background:#3b5bdb;color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">

    <!-- 학생 현황 -->
    <div class="box" style="margin-bottom:14px;border-left:4px solid #3b5bdb">
      <div style="font-size:12px;font-weight:700;color:#3b5bdb;margin-bottom:10px">학생 현황</div>
      <div class="g4">
        <div class="stat"><div class="sv" style="color:${gc(a)}">${a.toFixed(2)}</div><div class="sl">내신 평균</div></div>
        <div class="stat"><div class="sv" style="color:#3b5bdb">${tgts.length+extras.length}개</div><div class="sl">지원 대학</div></div>
        <div class="stat"><div class="sv" style="color:#0f9d58">${tgts.filter(t=>t.chance==='하향'||t.chance==='안정').length}개</div><div class="sl">안정·하향</div></div>
        <div class="stat"><div class="sv" style="color:#e37400">${tgts.filter(t=>t.chance==='상향'||t.chance==='적정').length}개</div><div class="sl">적정·상향</div></div>
      </div>

// ── 수시 출력용 인쇄 함수 ──
function printSusiReport(sid){
  const s = ST.students.find(x=>String(x.id)===String(sid)); if(!s) return;
  const tgts = s.targets||[];
  const extras = window._susiPrintExtra?.[sid]||[];
  const allCards = [
    ...tgts.map((t,i)=>({...t, _isExtra:false, _idx:i})),
    ...extras.map((ex,i)=>({...ex, id:'ex_'+i, _isExtra:true, _idx:i}))
  ];
  const a = gAvg(s.subjects);
  const edits = window._susiPrintEdits?.[sid]||{};
  const overallEl = document.getElementById(`susi-print-overall-${sid}`);
  const overall = overallEl?.value || edits._overall || '';

  // 지원 대학이 없으면 안내 메시지만 출력
  if(!allCards.length){
    popPrint(`${esc(s.name)} - 수시 상담 자료`,
      `<div style="text-align:center;padding:60px 20px;color:#888"><div style="font-size:40px;margin-bottom:16px">🏫</div><div style="font-size:16px;font-weight:700;margin-bottom:10px">등록된 수시 지원 대학이 없습니다</div><div style="font-size:13px">수시 탭에서 지원 대학을 먼저 등록해주세요.</div></div>`
    );
    return;
  }

  let body = `
  <div class="info-box" style="margin-bottom:18px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
      <div class="info-box-main" style="flex:1">
        <div class="info-box-name">${esc(s.name)}</div>
        <div class="info-box-sub">${esc(s.school)} · ${esc(s.grade)}${s.className?' · '+esc(s.className):''} · 담당: ${esc(s.counselor)}</div>
      </div>
      <div style="display:flex;gap:14px;flex-shrink:0;align-items:center;padding-top:2px">
        <div style="text-align:center">
          <div style="font-size:16px;font-weight:900;color:#1a1a1a">${allCards.length}개</div>
          <div style="font-size:9px;color:#999;margin-top:1px">지원 대학</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:16px;font-weight:900;color:#1a1a1a">${allCards.filter(t=>{const c=edits[t.id]?.chance||t.chance;return c==='하향'||c==='안정';}).length}개</div>
          <div style="font-size:9px;color:#999;margin-top:1px">안정·하향</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:16px;font-weight:900;color:#1a1a1a">${allCards.filter(t=>{const c=edits[t.id]?.chance||t.chance;return c==='상향'||c==='적정';}).length}개</div>
          <div style="font-size:9px;color:#999;margin-top:1px">적정·상향</div>
        </div>
      </div>
    </div>
  </div>`;

  allCards.forEach((t,i)=>{
    const ai = t.aiData||{};
    const deletedJeons = t._deletedJeons||[];
    const ar = ((t.aiResults||[]).filter(r=>r&&r.jeonName&&!deletedJeons.includes(r.jeonName)));
    const cid = t.id;
    const ev = edits[cid]||{};
    const col = CC[ev.chance||t.chance]||'#64748b';
    const finalChance = ev.chance||t.chance||'미정';
    const displayResults = ar.length ? ar : (ai.comment?[{...ai, jeonName:t.jeon||''}]:[]);
    if(!displayResults.length) return; // 표시할 전형 없으면 생략
    const finalUniv = t._isExtra ? (t.univ||'대학명 미입력') : t.univ;
    const finalDept = t._isExtra ? (t.dept||'학과 미입력') : t.dept;
    const finalJeon = t._isExtra ? (t.jeon||'전형 미입력') : t.jeon;
    const rankLabel = t._isExtra ? `추가${t._idx+1}` : `${t._idx+1}순위`;

    body += `<div class="card" style="border-left:4px solid ${col};margin-bottom:16px;page-break-inside:avoid">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:3px">
            <span style="background:#eef1ff;color:#3b5bdb;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700">${rankLabel}</span>
            <span style="font-size:16px;font-weight:900">${esc(finalUniv)}</span>
            <span style="background:${col}22;color:${col};border:1px solid ${col}44;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700">${finalChance}</span>
            ${t.rg==='지역인재'?'<span style="background:#8b5cf622;color:#8b5cf6;border:1px solid #8b5cf644;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700">지역인재</span>':''}
            ${t._isExtra?'<span style="background:#fff3e0;color:#f59e0b;border:1px solid #ffe0b2;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700">직접추가</span>':''}
          </div>
          <div style="font-size:12px;color:#555;font-weight:600">${esc(finalDept)} · ${esc(finalJeon)}</div>
        </div>
      </div>
      ${displayResults.map((r,ri)=>{
        const rKey = `r${ri}`;
        const rv = ev[rKey]||{};
        const get = key => {
          if(rv[key]!==undefined) return rv[key];
          // 신형 키 우선
          const newKeyMap = {n:'mojipStr',rate:'competition',c50:'grade50',c70:'grade70',sn:'suneungChoi',method:'evalMethod',strategy:'tip'};
          const newKey = newKeyMap[key];
          if(newKey && r[newKey] && r[newKey]!=='-') return r[newKey];
          // 구형 키
          if(r[key] && r[key]!=='-') return r[key];
          if(ai[key] && ai[key]!=='-') return ai[key];
          return '-';
        };
        return`
        ${displayResults.length>1?`<div style="display:inline-block;background:#eef1ff;color:#3b5bdb;border-radius:5px;padding:2px 10px;font-size:11px;font-weight:700;margin-bottom:8px">${esc(r.jeonName||finalJeon)}</div>`:''}
        <table style="margin-bottom:8px">
          <tr>${['모집인원','경쟁률','수능최저','50%컷','70%컷','면접'].map(l=>`<th style="width:16.6%">${l}</th>`).join('')}</tr>
          <tr>${[get('n'),get('rate'),get('sn'),get('c50'),get('c70'),get('interview')].map(v=>`<td style="font-weight:700;font-size:12px">${esc(String(v))}</td>`).join('')}</tr>
        </table>
        ${get('method')&&get('method')!=='-'?`<div style="background:#eef1ff;border-radius:6px;padding:6px 10px;font-size:11px;color:#3b5bdb;font-weight:600;margin-bottom:6px">전형방법 · ${esc(get('method'))}</div>`:''}
        ${(r.chance&&r.chance!=='-')?`<div style="background:#f0fdf4;border-radius:6px;padding:5px 10px;font-size:11px;color:#15803d;font-weight:700;margin-bottom:6px">판정: ${esc(r.chance)}${r.passRate?' (합격가능성 '+r.passRate+'%)':''}</div>`:''}
        ${(rv.comment||(r.comment||ai.comment))?`<div style="background:#fffbeb;border-radius:6px;padding:7px 10px;font-size:11px;color:#333;line-height:1.7;border-left:3px solid #fbbf24;margin-bottom:6px"><strong style="color:#b45309">💡 분석</strong> ${esc(rv.comment||(r.comment||ai.comment||''))}</div>`:''}
        ${(rv.tip||(r.tip||ai.tip))?`<div style="background:#eff6ff;border-radius:6px;padding:7px 10px;font-size:11px;color:#1d4ed8;line-height:1.7;border-left:3px solid #3b5bdb;margin-bottom:6px"><strong>📌 전략</strong> ${esc(rv.tip||(r.tip||ai.tip||''))}</div>`:''}
        ${(rv.strategy||(r.strategy||ai.strategy))?`<div style="background:#fffbeb;border-radius:6px;padding:7px 10px;font-size:11px;color:#333;line-height:1.7;border-left:3px solid #f59e0b;margin-bottom:6px"><strong style="color:#b45309">💡 전략</strong> ${esc(rv.strategy||(r.strategy||ai.strategy||''))}</div>`:''}
        ${ri<displayResults.length-1?'<hr style="border:none;border-top:1px dashed #e8eaf6;margin:10px 0">':''}`;
      }).join('')}
      ${ev.memo?`<div style="background:#f4f6fb;border-radius:6px;padding:7px 10px;font-size:11px;color:#444;line-height:1.7;border-left:3px solid #c5cae9;margin-top:6px"><strong>📝 메모</strong> ${esc(ev.memo)}</div>`:''}
    </div>`;
  });

  if(overall){
    body += `<div class="card" style="border-left:4px solid #f59e0b;margin-top:4px">
      <div style="font-size:12px;font-weight:700;color:#b45309;margin-bottom:6px">📌 종합 상담 의견</div>
      <div style="font-size:12px;color:#333;line-height:1.8;white-space:pre-wrap">${esc(overall)}</div>
    </div>`;
  }
  body += `<div style="margin-top:20px;padding:10px 14px;background:#fff8e1;border:1px solid #fde68a;border-radius:8px;font-size:10px;color:#92400e;line-height:1.6">
    ⚠️ 본 자료의 모집인원·경쟁률·수능최저·입결 데이터는 참고용이며, 실제 수치는 각 대학 입학처 공식 모집요강 및 대학어디가(adiga.kr)에서 반드시 확인하시기 바랍니다.
  </div>`;
  popPrint(`${s.name} - 수시 상담 자료`, body);
}

// 탐구 원점수→표준점수 조회 (범위 보간 포함)
function getTankuStd(subj, raw){
  const tbl = TANKU_STD_2025[subj];
  if(!tbl) return null;
  const r = Math.round(+raw);
  if(tbl[r] !== undefined) return tbl[r];
  // 범위 외 보간
  const keys = Object.keys(tbl).map(Number).sort((a,b)=>a-b);
  if(r >= keys[keys.length-1]) return tbl[keys[keys.length-1]];
  if(r <= keys[0]) return tbl[keys[0]];
  // 선형 보간
  for(let i=0;i<keys.length-1;i++){
    if(r>=keys[i]&&r<=keys[i+1]){
      const lo=tbl[keys[i]], hi=tbl[keys[i+1]];
      return Math.round(lo+(hi-lo)*(r-keys[i])/(keys[i+1]-keys[i]));
    }
  }
  return null;
}

// 탐구 표준점수→백분위 조회 (stdToPct 공식 기반)
function getTankuPct(subj, std){
  if(!std || isNaN(+std)) return null;
  const sdStd = TANKU_SD_STD[subj] || TANKU_SD_STD['_default'];
  // 탐구 만점 표준점수 (TANKU_STD_2025에서 50점의 값)
  const tbl = TANKU_STD_2025[subj];
  const maxStd = tbl ? tbl[50] : undefined;
  return stdToPct(+std, 50, sdStd, maxStd);
}

// 원점수→표준점수 변환
function rawToStd(raw, mean, sd, maxStd){
  if(!raw||isNaN(+raw)) return null;
  const std = Math.round(20 * ((+raw - mean) / sd) + (maxStd===150?100:50));
  return Math.max(1, Math.min(maxStd||150, std));
}

// 원점수→백분위 (정규분포 근사)
function rawToPct(raw, mean, sd, maxRaw){
  if(!raw||isNaN(+raw)) return null;
  const z = (+raw - mean) / sd;
  // 정규분포 누적 함수 근사 (abramowitz & stegun)
  const normCDF = z => {
    const t = 1/(1+0.2316419*Math.abs(z));
    const d = 0.3989423*Math.exp(-z*z/2);
    const p = d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));
    return z>0 ? 1-p : p;
  };
  return Math.max(1, Math.min(99, Math.round(normCDF(z)*100)));
}

// 백분위→등급
// ── 표준점수→백분위 변환 함수 ──
function stdToPct(std, meanStd, sdStd, maxStd){
  if(!std || isNaN(+std)) return null;
  const s = +std;
  // 만점(maxStd) 이상이면 99%, 최저 기준 미만이면 1%
  if(maxStd !== undefined && s >= maxStd) return 99;
  const z = (s - meanStd) / sdStd;
  const normCDF2 = function(z2){
    const t = 1/(1+0.2316419*Math.abs(z2));
    const d = 0.3989423*Math.exp(-z2*z2/2);
    const p = d*t*(0.3193815+t*(-0.3565638+t*(1.7814779+t*(-1.8212560+t*1.3302744))));
    return z2>0 ? 1-p : p;
  };
  return Math.max(1, Math.min(99, Math.round(normCDF2(z)*100)));
}

  if(pct>=40) return 5;
  if(pct>=23) return 6;
  if(pct>=11) return 7;
  if(pct>=4)  return 8;

}

// 표준점수→등급 (국·수)

// 전체 환산 점수 계산 (대학별 반영비율 적용)
function calcTotalScore(scores, ratio, calc){
  // ratio: {국어:r, 수학:r, 영어:r, 탐구:r, 한국사:r}
  // calc: {국어:{std,pct}, 수학:{std,pct}, 영어:{pct}, 탐구:{std,pct}, 한국사:{grade}}
  let total = 0, base = 0;
  if(ratio['국어'] && calc['국어']?.std){
    total += calc['국어'].std * (ratio['국어']/100);
    base += ratio['국어'];
  }
  if(ratio['수학'] && calc['수학']?.std){
    const bonus = (calc['수학'].선택가산||0);
    total += (calc['수학'].std + bonus) * (ratio['수학']/100);
    base += ratio['수학'];
  }
  if(ratio['탐구'] && (calc['탐구1']?.std||calc['탐구2']?.std)){
    const t1 = calc['탐구1']?.std||0, t2 = calc['탐구2']?.std||0;
    const cnt = (calc['탐구1']?.std?1:0)+(calc['탐구2']?.std?1:0);
    total += (cnt>0?(t1+t2)/cnt:0) * (ratio['탐구']/100);
    base += ratio['탐구'];
  }
  // 영어 가산점 방식 (절대평가)
  if(ratio['영어'] && calc['영어']?.pct){
    const engBonus = {1:10,2:8,3:6,4:4,5:2,6:0,7:0,8:0,9:0}[calc['영어'].grade]||0;
    total += engBonus * (ratio['영어']/100);
    base += ratio['영어'];
  }
  return base>0 ? Math.round(total*10)/10 : null;
}

// 단일 시험 성적 조회
function getLatestMockScores(s, testName){
  const mg = s.mockGrades||{};
  const exSubj = s.mockExtraSubjs||{};
  const tests = testName ? [testName] : [...MOCK_TESTS].reverse();
  for(const t of tests){
    const hasData = MOCK_SUBJS.some(sb=>(mg[sb]||{})[t]?.raw||(mg[sb]||{})[t]?.std||(mg[sb]||{})[t]?.grade);
    if(hasData){
      const res = {testName:t};
      ['국어','수학','탐구1','탐구2','영어','한국사'].forEach(sb=>{
        const d = (mg[sb]||{})[t]||{};
        const subjName = sb==='탐구1'||sb==='탐구2'
          ? ((exSubj[sb]||{})[t]||exSubj[sb]?.name||'') : sb;
        res[sb] = {raw:d.raw||'',grade:d.grade||'',pct:d.pct||'',std:d.std||'',subjName};
      });
      return res;
    }
  }
  return null;
}

// 복수 시험 평균 성적 조회 (mockTests 배열 기준)
function getAvgMockScores(s, mockTests){
  const mg = s.mockGrades||{};
  const exSubj = s.mockExtraSubjs||{};
  const tests = (mockTests&&mockTests.length) ? mockTests : null;
  if(!tests) return null;

  // 각 시험별 데이터 수집
  const validTests = tests.filter(t=>MOCK_SUBJS.some(sb=>(mg[sb]||{})[t]?.raw||(mg[sb]||{})[t]?.std||(mg[sb]||{})[t]?.grade));
  if(!validTests.length) return null;
  if(validTests.length===1) return getLatestMockScores(s, validTests[0]);

  // 평균 계산
  const res = {testName: validTests.join('+')+'평균'};
  ['국어','수학','탐구1','탐구2','영어','한국사'].forEach(sb=>{
    const rows = validTests.map(t=>(mg[sb]||{})[t]).filter(Boolean);
    if(!rows.length){ res[sb]={raw:'',grade:'',pct:'',std:'',subjName:''}; return; }
    // subjName: 가장 최근 시험 기준
    const lastT = validTests[validTests.length-1];
    const subjName = sb==='탐구1'||sb==='탐구2'
      ? ((exSubj[sb]||{})[lastT]||exSubj[sb]?.name||'') : sb;
    // 수치 평균
    const avgField = (fk) => {
      const vals = rows.map(d=>d[fk]).filter(v=>v&&!isNaN(+v)).map(Number);
      return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) : '';
    };
    res[sb] = {
      raw:   avgField('raw'),
      std:   avgField('std'),
      pct:   avgField('pct'),
      grade: avgField('grade')||'',
      subjName,
    };
  });
  return res;
}

// 수능 환산 계산
function calcCsatScores(jst, s){
  // 성적 소스 결정: manual > 복수시험평균 > 단일시험 > 최근자동
  let src;
  if(jst.mockSrc==='manual'){
    src = jst.manualScores;
  } else if(jst.mockTests&&jst.mockTests.length>0){
    src = getAvgMockScores(s, jst.mockTests) || getLatestMockScores(s, null);
  } else {
    src = getLatestMockScores(s, jst.mockTest);
  }
  if(!src) return null;

  const calc = {};

  // 국어
  const ko = src['국어']||{};
  if(ko.raw||ko.std){
    const sel = jst.국어선택||ko.subjName||'화법과작문';
    const p = CSAT_PARAMS['국어'][sel]||CSAT_PARAMS['국어']['_default'];
    const std = ko.std ? +ko.std : (ko.raw ? Math.max(1,Math.round((+ko.raw-p.mean)/(p.maxRaw-p.mean)*(p.maxStd-50)+50)) : null);
    const pct = ko.pct ? +ko.pct : stdToPct(std, 100, 20, p.maxStd);
    calc['국어'] = {raw:ko.raw, std, pct, grade: stdToGrade(std, (KO_GRADE_CUTS[sel]||KO_GRADE_CUTS['_default'])), 선택:sel};
  }

  // 수학
  const ma = src['수학']||{};
  if(ma.raw||ma.std){
    const sel = jst.수학선택||ma.subjName||'확률과통계';
    const p = CSAT_PARAMS['수학'][sel]||CSAT_PARAMS['수학']['_default'];
    const std = ma.std ? +ma.std : (ma.raw ? Math.max(1,Math.round((+ma.raw-p.mean)/(p.maxRaw-p.mean)*(p.maxStd-50)+50)) : null);
    const pct = ma.pct ? +ma.pct : stdToPct(std, 100, 20, p.maxStd);
    // 미적분·기하 가산점 (대학별로 다르나 기본 3~5%)
    const 가산 = (sel==='미적분'||sel==='기하')?3:0;
    calc['수학'] = {raw:ma.raw, std, pct, grade: stdToGrade(std, (MA_GRADE_CUTS[sel]||MA_GRADE_CUTS['_default'])), 선택:sel, 선택가산:가산};
  }

  // 탐구1/2 (2025학년도 실제 변환표 사용)
  ['탐구1','탐구2'].forEach(function(sb){
    const tk = src[sb]||{};
    if(tk.raw||tk.std){
      const subjName = (sb==='탐구1'?jst.탐구1과목:jst.탐구2과목)||tk.subjName||'생활과윤리';
      let std, pct;
      if(tk.std){
        // 이미 표준점수가 있으면 그대로 사용, 백분위만 테이블로 조회
        std = +tk.std;
        pct = tk.pct ? +tk.pct : (getTankuPct(subjName, std) || rawToPct(std, 50, 15));
      } else if(tk.raw) {
        // 원점수→표준점수: 실제 변환표 우선, 없으면 공식 근사
        std = getTankuStd(subjName, +tk.raw);
        if(std === null){
          const p = CSAT_PARAMS['탐구']['_default'];
          std = rawToStd(+tk.raw, p.mean, p.sd, p.maxStd);
        }
        // 표준점수→백분위: 과목별 표준편차 기반 정규분포 근사 (만점=99%)
        const _tkSdStd = TANKU_SD_STD[subjName] || 8.5;
        const _tkMaxStd = (TANKU_STD_2025[subjName]||{})[50];
        pct = stdToPct(std, 50, _tkSdStd, _tkMaxStd);
      }
      calc[sb] = {raw:tk.raw, std, pct, grade: stdToGrade(std, (TK_GRADE_CUTS[subjName]||TK_GRADE_CUTS['_default'])), subjName};
    }
  });

  // 영어 (절대평가)
  const eng = src['영어']||{};
  if(eng.grade){
    const grade = +eng.grade;
    const pct = ENG_GRADE_PCT[grade]||50;
    calc['영어'] = {grade, pct, 등급:grade};
  }

  // 한국사
  const hk = src['한국사']||{};
  if(hk.raw||hk.grade){
    calc['한국사'] = {raw:hk.raw, grade: hk.grade||1};
  }

  // 환산 총점 (단순 표준점수 합산 기준)
  calc._std합 = (calc['국어']?.std||0)+(calc['수학']?.std||0)+
    ((calc['탐구1']?.std||0)+(calc['탐구2']?.std||0))/2;
  const _pctArr = [calc['국어']?.pct, calc['수학']?.pct, calc['탐구1']?.pct, calc['탐구2']?.pct].filter(v=>v!=null);
  calc._pct평균 = _pctArr.length ? _pctArr.reduce((a,b)=>a+b,0)/_pctArr.length : 0;
  calc._pct합 = [calc['국어']?.pct, calc['수학']?.pct,
    ((calc['탐구1']?.pct||0)+(calc['탐구2']?.pct||0)) / ((calc['탐구1']?.pct?1:0)+(calc['탐구2']?.pct?1:0)||1)
  ].filter(v=>v!=null).reduce((a,b)=>a+b,0);

  return calc;
}

// 지원 가능성 판정
function classifyChance(myStd합, cut50, cut70){
  if(!cut50||!cut70) return '참고';
  if(myStd합 >= cut50+5) return '하향';
  if(myStd합 >= cut50)   return '안정';
  if(myStd합 >= cut70)   return '적정';
  if(myStd합 >= cut70-8) return '상향';
  return '도전';
}
